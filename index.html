                                        </div>
                                    </td>`;
                            } else {
                                let cellContent = displaySlots.map(slot => {
                                    let displaySub = '';
                                    if (window.interactiveViewMode === 'student') {
                                        let teacherName = String(slot['ชื่อครูผู้สอน'] || '');
                                        displaySub = teacherName.split(',').map(name => {
                                            let cleanName = name.trim().replace(/^(นาย|นางสาว|นาง|น\.ส\.|ว่าที่\s?ร\.ต\.|ว่าที่ร้อยตรี|ครู)\s*/g, '').trim();
                                            return cleanName ? 'ครู' + cleanName.split(' ')[0] : '';
                                        }).filter(n => n).join(', ');
                                    } else {
                                        if (slot.allRooms && slot.allRooms.length > 0) {
                                            displaySub = slot.allRooms.includes('-') ? 'กิจกรรม' : 'ชั้น ' + slot.allRooms.join(', ');
                                        } else {
                                            displaySub = slot['ห้องเรียน'] === '-' ? 'กิจกรรม' : 'ชั้น ' + slot['ห้องเรียน'];
                                        }
                                    }

                                    let creator = slot['ผู้บันทึก'] || '';
                                    let isOwner = (creator === currentUser) || (currentRole === 'admin') || (!creator);
                                    
                                    if (slot['ประเภท'] === 'ล็อค') {
                                        isOwner = false;
                                        creator = 'ระบบ (ต้องแก้ไขที่หน้าล๊อครายวิชาเท่านั้น)';
                                    }

                                    let overlayIcon = isOwner ? '<i class="fas fa-edit text-navy text-lg drop-shadow-md"></i>' : '<i class="fas fa-lock text-red-100 text-lg drop-shadow-md"></i>';

                                    let onClickAction = isOwner ? `onclick="openSchModal('${day}', ${i}, '${slot.originalIndex}'); event.stopPropagation();"` : `onclick="showPermissionAlert('${creator}'); event.stopPropagation();"`;
                                    
                                    let slotBgClass = isOwner ? 'bg-blue-50 hover:bg-blue-100' : 'bg-gray-100 hover:bg-gray-200';
                                    if (slot['ประเภท'] === 'ล็อค') slotBgClass = 'bg-purple-50 hover:bg-purple-100';

                                    return `
                                        <div class="relative group p-2 border-b border-gray-300 last:border-0 ${slotBgClass} cursor-pointer transition text-center flex-1 flex flex-col justify-center" ${onClickAction}>
                                            <div class="font-bold text-xs ${slot['ประเภท'] === 'ล็อค' ? 'text-purple-700' : 'text-navy'}">${slot['รหัสวิชา']} ${slot['ประเภท'] === 'ล็อค' ? '<i class="fas fa-lock text-[10px] ml-1"></i>' : ''}</div>
                                            <div class="text-[11px] text-gray-700 truncate w-full overflow-hidden" title="${slot['ชื่อวิชา']}">${slot['ชื่อวิชา']}</div>
                                            <div class="text-[11px] font-medium text-blue-700 mt-1">${displaySub}</div>
                                            ${slot['สถานที่เรียน'] ? `<div class="text-[10px] text-gray-600 mt-0.5">${slot['สถานที่เรียน']}</div>` : ''}
                                            <div class="absolute inset-0 ${overlayBg} bg-opacity-10 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                                                ${overlayIcon}
                                            </div>
                                        </div>
                                    `;
                                }).join('');

                                tds += `
                                    <td colspan="${colspan}" class="border border-gray-300 p-0 align-top bg-white">
                                        <div class="flex flex-col h-full min-h-[5rem]">
                                            ${cellContent}
                                        </div>
                                    </td>`;
                            }
                        } else {
                            tds += `
                                <td colspan="${colspan}" class="border border-gray-300 p-0 text-center align-middle cursor-pointer hover:bg-gray-100 transition group h-20" 
                                    onclick="openSchModal('${day}', ${i}, null)">
                                    <div class="w-full h-full flex items-center justify-center min-h-[5rem]">
                                        <i class="fas fa-plus text-gray-300 group-hover:text-green-500 text-xl transition transform group-hover:scale-125"></i>
                                    </div>
                                </td>`;
                        }
                        
                        i += colspan;
                    }
                    trs += '<tr><td class="border border-gray-400 p-2 font-bold text-center bg-lightgold text-navy shadow-sm align-middle">' + day + '</td>' + tds + '</tr>';
                });

                document.getElementById('gridTbody').innerHTML = trs;

                let completeCount = 0;
                let summaryCourses = []; 
                let targetCourses = [];
                let totalTarget = 0;
                let scheduledCounts = {};

                if (window.interactiveViewMode === 'student') {
                    targetCourses = window.interactiveCourses.filter(c => {
                        let cRooms = (c['ชั้นที่เปิดสอน'] || c['ชั้นที่สอน'] || '').split(',').map(r => r.trim()).filter(r => r);
                        let cPlans = (c['แผนการเรียน'] || '').split(',').map(p => p.trim()).filter(p => p);
                        let cTerm = String(c['ภาคเรียนที่'] || '').trim();
                        
                        let matchPlan = cPlans.includes(plan);
                        let isRoomInPlanSettings = window.planMappings[plan] && window.planMappings[plan].includes(room);
                        let matchTerm = cTerm === String(window.interactiveCurrentTerm).trim();

                        if (!matchTerm) return false;
                        
                        if (cRooms.length > 0) return matchPlan && cRooms.includes(room);
                        else if (Object.keys(window.planMappings).length > 0) return matchPlan && isRoomInPlanSettings;
                        else return matchPlan;
                    });

                    targetData.forEach(slot => {
                        let code = String(slot['รหัสวิชา'] || '').trim();
                        if (!scheduledCounts[code]) scheduledCounts[code] = 0;
                        scheduledCounts[code]++;
                    });

                    targetCourses.forEach(c => {
                        let code = String(c['รหัสวิชา'] || '').trim();
                        let creditStr = String(c['หน่วยกิต'] || '').trim();
                        let credit = parseFloat(creditStr);
                        let required = (!isNaN(credit) && credit > 0) ? (credit * 2) : 0; 
                        let scheduled = scheduledCounts[code] || 0;

                        if (required > 0) {
                            if (scheduled >= required) {
                                completeCount++;
                                summaryCourses.push({ code: code, name: c['ชื่อวิชา'], target: c['ชื่อครูผู้สอน'], required: required, scheduled: scheduled, isComplete: true });
                            } else {
                                summaryCourses.push({ code: code, name: c['ชื่อวิชา'], target: c['ชื่อครูผู้สอน'], required: required, scheduled: scheduled, isComplete: false });
                            }
                        } else {
                            if (scheduled > 0) {
                                completeCount++;
                                summaryCourses.push({ code: code, name: c['ชื่อวิชา'], target: c['ชื่อครูผู้สอน'], required: 'ไม่ระบุ', scheduled: scheduled, isComplete: true });
                            } else {
                                summaryCourses.push({ code: code, name: c['ชื่อวิชา'], target: c['ชื่อครูผู้สอน'], required: 'ไม่ระบุ', scheduled: scheduled, isComplete: false });
                            }
                        }
                    });
                    totalTarget = targetCourses.length;
                } else {
                    let targetTeacherName = String(teacher || '').replace(/\s+/g, ' ').trim();
                    let targetTeacherMatch = targetTeacherName.replace(/\s+/g, '');
                    let currentTerm = String(window.interactiveCurrentTerm || '').trim();
                    
                    targetCourses = window.interactiveCourses.filter(c => {
                        let cTeachers = String(c['ชื่อครูผู้สอน'] || '').split(',').map(t => t.replace(/\s+/g, ''));
                        let cTerm = String(c['ภาคเรียนที่'] || '').trim();
                        return cTeachers.includes(targetTeacherMatch) && cTerm === currentTerm;
                    });
                    
                    targetCourses.forEach(c => {
                        let code = String(c['รหัสวิชา'] || '').trim();
                        
                        let exactRoomText = String(c['ชั้นที่เปิดสอน'] || c['ชั้นที่สอน'] || '').trim();
                        let exactPlanText = String(c['แผนการเรียน'] || '').trim();
                        
                        let cRooms = exactRoomText.split(',').map(r => r.trim()).filter(r => r);
                        let cPlans = exactPlanText.split(',').map(p => p.trim()).filter(p => p);
                        
                        let numRooms = cRooms.length;

                        let displayTarget = exactRoomText;
                        if (!displayTarget) {
                            displayTarget = exactPlanText ? exactPlanText : 'ไม่ระบุชั้น/ห้อง';
                        }

                        if (numRooms === 0 && cPlans.length > 0) {
                            let tempRooms = [];
                            cPlans.forEach(p => {
                                if (window.planMappings[p]) tempRooms.push(...window.planMappings[p]);
                            });
                            let uniqueTempRooms = [...new Set(tempRooms)];
                            numRooms = uniqueTempRooms.length;
                        }
                        if (numRooms === 0) numRooms = 1;

                        let creditStr = String(c['หน่วยกิต'] || '').trim();
                        let credit = parseFloat(creditStr);
                        let required = (!isNaN(credit) && credit > 0) ? (credit * 2 * numRooms) : 0;
                        
                        let scheduled = window.interactiveSchData.filter(s => {
                            let sTeachers = String(s['ชื่อครูผู้สอน'] || '').split(',').map(t => t.replace(/\s+/g, ''));
                            return sTeachers.includes(targetTeacherMatch) && String(s['รหัสวิชา'] || '').trim() === code;
                        }).length;
                        
                        if (required > 0) {
                            if (scheduled >= required) {
                                completeCount++;
                                summaryCourses.push({ code: code, name: c['ชื่อวิชา'], target: displayTarget, required: required, scheduled: scheduled, isComplete: true });
                            } else {
                                summaryCourses.push({ code: code, name: c['ชื่อวิชา'], target: displayTarget, required: required, scheduled: scheduled, isComplete: false });
                            }
                        } else {
                            if (scheduled > 0) {
                                completeCount++;
                                summaryCourses.push({ code: code, name: c['ชื่อวิชา'], target: displayTarget, required: 'ไม่ระบุ', scheduled: scheduled, isComplete: true });
                            } else {
                                summaryCourses.push({ code: code, name: c['ชื่อวิชา'], target: displayTarget, required: 'ไม่ระบุ', scheduled: scheduled, isComplete: false });
                            }
                        }
                    });
                    totalTarget = targetCourses.length;
                }

                let missingCount = summaryCourses.filter(c => !c.isComplete).length;

                let missingHtml = `
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 shadow-sm">
                        <h4 class="font-bold text-navy flex flex-wrap items-center mb-3">
                            <i class="fas fa-clipboard-list mr-2"></i> สรุปรายวิชาของ ${window.interactiveViewMode === 'student' ? ('ห้อง '+room) : ('ครู '+teacher)}
                            <span class="ml-auto mt-2 sm:mt-0 text-sm font-normal bg-white px-3 py-1 rounded-full border shadow-sm">
                                ทั้งหมด: <span class="font-bold">${totalTarget}</span> | 
                                จัดครบ: <span class="text-green-600 font-bold">${completeCount}</span> | 
                                ขาด: <span class="text-red-500 font-bold">${missingCount}</span>
                            </span>
                        </h4>
                `;

                if (summaryCourses.length > 0) {
                    missingHtml += `
                        <div class="overflow-x-auto rounded border border-blue-100">
                            <table class="w-full text-sm text-left border-collapse bg-white overflow-hidden">
                                <thead class="bg-blue-100 text-navy border-b border-blue-200">
                                    <tr>
                                        <th class="p-2 w-24">รหัสวิชา</th>
                                        <th class="p-2">ชื่อวิชา</th>
                                        <th class="p-2">${window.interactiveViewMode === 'student' ? 'ครูผู้สอน' : 'ชั้น/ห้อง'}</th>
                                        <th class="p-2 text-center w-28 whitespace-nowrap">ต้องการ (คาบ)</th>
                                        <th class="p-2 text-center w-28 whitespace-nowrap">จัดแล้ว (คาบ)</th>
                                        <th class="p-2 text-center w-24 whitespace-nowrap">สถานะ</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    summaryCourses.sort((a, b) => (a.isComplete === b.isComplete) ? 0 : a.isComplete ? 1 : -1).forEach(ic => {
                        let trClass = ic.isComplete ? 'bg-green-50/50 hover:bg-green-50' : 'hover:bg-red-50';
                        let statusHtml = '';
                        if (ic.isComplete) {
                            statusHtml = '<span class="text-green-600 font-bold text-xs"><i class="fas fa-check-circle"></i> ครบแล้ว</span>';
                        } else {
                            let diff = ic.required === 'ไม่ระบุ' ? 'ไม่ระบุ' : (ic.required - ic.scheduled);
                            statusHtml = `<span class="text-red-600 font-bold bg-red-50 px-2 py-1 rounded">ขาด ${diff}</span>`;
                        }

                        missingHtml += `
                                    <tr class="border-b last:border-0 ${trClass} transition">
                                        <td class="p-2 font-semibold ${ic.isComplete ? 'text-green-700' : 'text-navy'}">${ic.code}</td>
                                        <td class="p-2 ${ic.isComplete ? 'text-gray-500' : 'text-gray-800'}">${ic.name}</td>
                                        <td class="p-2 text-gray-600">${ic.target}</td>
                                        <td class="p-2 text-center">${ic.required}</td>
                                        <td class="p-2 text-center text-blue-600 font-semibold">${ic.scheduled}</td>
                                        <td class="p-2 text-center">${statusHtml}</td>
                                    </tr>
                        `;
                    });
                    missingHtml += `
                                </tbody>
                            </table>
                        </div>
                    `;
                } else {
                    missingHtml += `<div class="text-center py-6 text-gray-500 bg-white rounded shadow-sm border border-gray-200"><i class="fas fa-info-circle text-3xl mb-2 text-gray-300"></i><br>ไม่มีข้อมูลรายวิชาที่ต้องลงในตาราง<br><span class="text-xs">(กรุณาตรวจสอบการตั้งค่าในเมนู "บันทึกอัตรากำลังรายวิชา")</span></div>`;
                }
                missingHtml += `</div>`;

                document.getElementById('missingCoursesContainer').innerHTML = missingHtml;
            };

            window.updateModalDropdowns = (existingData = null) => {
                const room = document.getElementById('m_room').value;
                const plan = document.getElementById('m_plan').value;
                const day = document.getElementById('m_day').value;
                const periodChks = Array.from(document.querySelectorAll('.m-period-chk:checked')).map(c => parseInt(c.value));
                
                let currentTeacherMatch = '';
                if (window.interactiveViewMode === 'teacher') {
                    currentTeacherMatch = String(document.getElementById('grid_t_name').value || '').replace(/\s+/g, '');
                }

                if(periodChks.length === 0) {
                    document.getElementById('dl_m_code').innerHTML = '';
                    document.getElementById('m_location').value = '';
                    window.modalLocationHtml = '<div class="col-span-full text-center text-gray-500 py-8 flex flex-col items-center"><i class="fas fa-exclamation-circle text-4xl text-gray-300 mb-3"></i><p>กรุณาระบุคาบเรียนให้ครบถ้วนก่อน</p></div>';
                    if(!existingData) {
                        document.getElementById('m_name').value = '';
                        document.getElementById('m_teacher').value = window.interactiveViewMode === 'teacher' ? document.getElementById('grid_t_name').value : '';
                    }
                    return;
                }

                let targetCourses = window.interactiveCourses.filter(c => {
                    let matchTerm = String(c['ภาคเรียนที่'] || '').trim() === String(window.interactiveCurrentTerm).trim();
                    if (!matchTerm) return false;
                    
                    if (window.interactiveViewMode === 'teacher') {
                        // แก้ไข: รองรับการเช็คชื่อครูในวิชาที่สอนคู่กัน
                        let cTeachers = String(c['ชื่อครูผู้สอน'] || '').split(',').map(t => t.replace(/\s+/g, ''));
                        if (!cTeachers.includes(currentTeacherMatch)) return false;
                        if (room) {
                             let cRooms = (c['ชั้นที่เปิดสอน'] || c['ชั้นที่สอน'] || '').split(',').map(r => r.trim()).filter(r => r);
                             let cPlans = (c['แผนการเรียน'] || '').split(',').map(p => p.trim()).filter(p => p);
                             
                             let isRoomInPlanSettings = false;
                             cPlans.forEach(p => {
                                  if(window.planMappings[p] && window.planMappings[p].includes(room)) isRoomInPlanSettings = true;
                             });
                             
                             if (cRooms.length > 0) {
                                 if (!cRooms.includes(room)) return false;
                             } else if (cPlans.length > 0) {
                                 if (!isRoomInPlanSettings) return false;
                             }
                        }
                        return true;
                    } else {
                        let cRooms = (c['ชั้นที่เปิดสอน'] || c['ชั้นที่สอน'] || '').split(',').map(r => r.trim()).filter(r => r);
                        let cPlans = (c['แผนการเรียน'] || '').split(',').map(p => p.trim()).filter(p => p);
                        let matchPlan = cPlans.includes(plan);
                        let isRoomInPlanSettings = window.planMappings[plan] && window.planMappings[plan].includes(room);
                        
                        if (cRooms.length > 0) return matchPlan && cRooms.includes(room);
                        else if (Object.keys(window.planMappings).length > 0) return matchPlan && isRoomInPlanSettings;
                        else return matchPlan;
                    }
                });

                let scheduledCounts = {};
                let roomData = [];
                if (window.interactiveViewMode === 'student') {
                    roomData = window.interactiveSchData.filter(d => d['ห้องเรียน'] === room && d['แผนการเรียน'] === plan);
                    roomData.forEach(slot => {
                        let code = String(slot['รหัสวิชา'] || '').trim();
                        if (existingData && slot.originalIndex === existingData.originalIndex) return;
                        if (!scheduledCounts[code]) scheduledCounts[code] = 0;
                        scheduledCounts[code]++;
                    });
                } else {
                    // แก้ไข: นับคาบของครูรายคน (รองรับสอนคู่)
                    roomData = window.interactiveSchData.filter(d => {
                        let dTeachers = String(d['ชื่อครูผู้สอน'] || '').split(',').map(t => t.replace(/\s+/g, ''));
                        return dTeachers.includes(currentTeacherMatch);
                    });
                    roomData.forEach(slot => {
                        let code = String(slot['รหัสวิชา'] || '').trim();
                        if (existingData && slot.originalIndex === existingData.originalIndex) return;
                        let key = code + (slot['ห้องเรียน'] ? '_' + slot['ห้องเรียน'] : '');
                        if (!scheduledCounts[key]) scheduledCounts[key] = 0;
                        scheduledCounts[key]++;
                        
                        if (!scheduledCounts[code]) scheduledCounts[code] = 0;
                        scheduledCounts[code]++;
                    });
                }

                let busyTeachers = new Set();
                window.interactiveSchData.forEach(slot => {
                    if (slot['วัน'] === day && periodChks.includes(parseInt(slot['คาบที่']))) {
                        if (existingData && slot.originalIndex === existingData.originalIndex) return;
                        if (slot['ชื่อครูผู้สอน']) {
                            String(slot['ชื่อครูผู้สอน']).split(',').forEach(t => busyTeachers.add(t.replace(/\s+/g, '')));
                        }
                    }
                });
                
                let optionsHtml = '';
                targetCourses.forEach(c => {
                    let code = String(c['รหัสวิชา'] || '').trim();
                    let name = String(c['ชื่อวิชา'] || '').trim();
                    let teacherList = String(c['ชื่อครูผู้สอน'] || '').split(',').map(t => t.replace(/\s+/g, ''));
                    let creditStr = String(c['หน่วยกิต'] || '').trim();
                    let credit = parseFloat(creditStr);
                    let required = (!isNaN(credit) && credit > 0) ? (credit * 2) : 0; 
                    
                    let scheduled = 0;
                    if (window.interactiveViewMode === 'student') {
                        scheduled = scheduledCounts[code] || 0;
                    } else {
                        if (room) {
                            scheduled = scheduledCounts[code + '_' + room] || 0;
                        } else {
                            scheduled = scheduledCounts[code] || 0;
                            let cRooms = (c['ชั้นที่เปิดสอน'] || c['ชั้นที่สอน'] || '').split(',').map(r => r.trim()).filter(r => r);
                            let numRooms = cRooms.length > 0 ? cRooms.length : 1;
                            required = required * numRooms;
                        }
                    }
                    
                    let remaining = required - scheduled;
                    let isBusy = teacherList.some(t => busyTeachers.has(t));
                    let isEditingThis = existingData && existingData['รหัสวิชา'] === code;

                    if (window.interactiveViewMode === 'teacher' && teacherList.includes(currentTeacherMatch)) {
                        isBusy = false; 
                    }

                    if (required === 0 || remaining > 0 || isEditingThis) {
                        if (isBusy && !isEditingThis) {
                            optionsHtml += `<option value="${code}" disabled>${code} - ${name} (ครูติดสอน)</option>`;
                        } else {
                            if (required === 0) {
                                optionsHtml += `<option value="${code}">${code} - ${name}</option>`;
                            } else {
                                optionsHtml += `<option value="${code}">${code} - ${name} (เหลือ ${remaining} คาบ)</option>`;
                            }
                        }
                    }
                });
                document.getElementById('dl_m_code').innerHTML = optionsHtml;
                window.autoFillModalCourse(); 
                
                let allLocations = (window.interactiveSettings.teaching_rooms || '').split(',').map(r => r.trim()).filter(r => r);
                let busyLocations = new Set();
                
                window.interactiveSchData.forEach(slot => {
                    if (slot['วัน'] === day && periodChks.includes(parseInt(slot['คาบที่']))) {
                        if (existingData && slot.originalIndex === existingData.originalIndex) return;
                        let loc = String(slot['สถานที่เรียน'] || '').trim();
                        if (loc && loc !== '-') busyLocations.add(loc);
                    }
                });

                if (existingData && existingData['สถานที่เรียน'] && existingData['สถานที่เรียน'] !== '-') {
                    let extLoc = String(existingData['สถานที่เรียน']).trim();
                    if (!allLocations.includes(extLoc)) {
                        allLocations.push(extLoc);
                    }
                }

                let gridHtml = '';
                if (allLocations.length === 0) {
                    gridHtml = '<div class="col-span-full text-center py-6 text-gray-500">ไม่มีข้อมูลสถานที่เรียนในระบบ (กรุณาเพิ่มในการตั้งค่า)</div>';
                } else {
                    let groupedLocs = {};
                    allLocations.forEach(loc => {
                        let cleanLoc = String(loc).trim();
                        if (!cleanLoc) return;
                        let firstChar = cleanLoc.charAt(0);
                        let groupName = "ห้องปฏิบัติการ";
                        if (/[0-9]/.test(firstChar)) {
                            groupName = "อาคาร " + firstChar;
                        }
                        if (!groupedLocs[groupName]) groupedLocs[groupName] = [];
                        groupedLocs[groupName].push(cleanLoc);
                    });

                    let groupKeys = Object.keys(groupedLocs).sort((a, b) => {
                        if (a === "ห้องปฏิบัติการ") return 1;
                        if (b === "ห้องปฏิบัติการ") return -1;
                        return a.localeCompare(b);
                    });

                    gridHtml = '<div class="flex flex-wrap items-stretch justify-center gap-3 w-full">';
                    groupKeys.forEach(gKey => {
                        let gridColsClass = gKey === "ห้องปฏิบัติการ" 
                            ? "grid grid-cols-[repeat(auto-fit,minmax(110px,1fr))] gap-2" 
                            : "grid grid-cols-[repeat(auto-fit,minmax(75px,1fr))] gap-1.5";
                            
                        gridHtml += `<div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 flex-auto min-w-[180px] max-w-full flex flex-col">
                            <h4 class="font-bold text-navy border-b border-gold pb-1.5 mb-3 text-center text-sm">${gKey}</h4>
                            <div class="${gridColsClass}">`;
                        
                        groupedLocs[gKey].sort((a, b) => String(a).localeCompare(String(b), undefined, {numeric: true, sensitivity: 'base'})).forEach(loc => {
                            let isEditingThisLoc = existingData && existingData['สถานที่เรียน'] === loc;
                            
                            // ลบ isLockMode ออก เนื่องจากหน้าจัดตารางสอนไม่มีระบบล็อค ต้องเช็คสถานะชนเสมอ
                            if (busyLocations.has(loc) && !isEditingThisLoc) {
                                gridHtml += `
                                    <button type="button" disabled class="p-1.5 bg-red-50 border border-red-200 rounded text-red-400 font-medium cursor-not-allowed opacity-60 flex flex-col items-center justify-center min-h-[40px] shadow-sm relative overflow-hidden">
                                        <span class="line-through z-10 text-[11px] whitespace-normal break-words w-full px-1 text-center leading-snug">${loc}</span>
                                        <span class="text-[9px] mt-1 text-red-600 bg-red-100 px-1.5 py-0.5 rounded z-10 leading-none">ไม่ว่าง</span>
                                    </button>`;
                            } else {
                                gridHtml += `
                                    <button type="button" onclick="selectLocation('${loc.replace(/'/g, "\\'")}')" class="p-1.5 bg-white border border-gray-300 hover:border-gold hover:bg-lightgold hover:bg-opacity-20 hover:text-navy rounded text-gray-700 font-semibold transition duration-200 flex items-center justify-center min-h-[40px] shadow-sm hover:shadow-md text-[11px] whitespace-normal break-words w-full px-1 text-center leading-snug">
                                        ${loc}
                                    </button>`;
                            }
                        });
                        gridHtml += `</div></div>`;
                    });
                    gridHtml += '</div>';
                }
                window.modalLocationHtml = gridHtml;
                
                if (existingData) {
                    document.getElementById('m_location').value = existingData['สถานที่เรียน'] || '';
                }
            };

            window.openSchModal = (day, period, existingDataId) => {
                let existingData = existingDataId ? window.interactiveSchData.find(d => String(d.originalIndex) === String(existingDataId)) : null;

                if (window.interactiveViewMode === 'student') {
                    document.getElementById('m_room_plan_container').classList.add('hidden');
                    document.getElementById('m_room').value = document.getElementById('grid_room').value;
                    document.getElementById('m_plan').value = document.getElementById('grid_plan').value;
                } else {
                    document.getElementById('m_room_plan_container').classList.remove('hidden');
                    document.getElementById('m_teacher').value = document.getElementById('grid_t_name').value;
                    
                    let currentTeacherMatch = String(document.getElementById('grid_t_name').value || '').replace(/\s+/g, '');
                    let teacherRooms = new Set();
                    
                    window.interactiveCourses.forEach(c => {
                        let cTeachers = String(c['ชื่อครูผู้สอน'] || '').split(',').map(t => t.replace(/\s+/g, ''));
                        let courseTerm = String(c['ภาคเรียนที่'] || '').trim();
                        
                        if (cTeachers.includes(currentTeacherMatch) && courseTerm === String(window.interactiveCurrentTerm).trim()) {
                            let cRooms = (c['ชั้นที่สอน'] || c['ชั้นที่เปิดสอน'] || '').split(',').map(r => r.trim()).filter(r => r);
                            let cPlans = (c['แผนการเรียน'] || '').split(',').map(p => p.trim()).filter(p => p);
                            
                            cRooms.forEach(r => teacherRooms.add(r));
                            
                            if (cRooms.length === 0) {
                                cPlans.forEach(p => {
                                    if (window.planMappings[p]) {
                                        window.planMappings[p].forEach(r => teacherRooms.add(r));
                                    }
                                });
                            }
                        }
                    });
                    
                    let mRoomSelect = document.getElementById('m_room');
                    let optionsHtml = '<option value="">-- เลือกห้องเรียน --</option>';
                    if (teacherRooms.size > 0) {
                        Array.from(teacherRooms).sort((a, b) => a.localeCompare(b, undefined, {numeric: true})).forEach(r => {
                            optionsHtml += `<option value="${r}">${r}</option>`;
                        });
                    } else {
                        optionsHtml += '<option value="" disabled>-- ไม่มีห้องที่กำหนดในรายวิชา --</option>';
                    }
                    mRoomSelect.innerHTML = optionsHtml;
                    
                    if (existingData && existingData['ห้องเรียน']) {
                        let existingRoom = existingData['ห้องเรียน'];
                        if (!teacherRooms.has(existingRoom)) {
                             mRoomSelect.innerHTML += `<option value="${existingRoom}">${existingRoom}</option>`;
                        }
                    }
                }

                document.getElementById('m_day_display').innerText = day;
                document.getElementById('m_day').value = day;

                let periodChecksHtml = Array.from({length: window.interactivePeriods}, (_, i) => `
                    <label class="flex items-center space-x-1 cursor-pointer bg-white px-2 py-1 rounded border border-gray-300 hover:bg-gray-100 transition">
                        <input type="checkbox" value="${i+1}" class="m-period-chk w-4 h-4 text-gold border-gray-300 rounded focus:ring-gold" onchange="window.updateModalDropdowns(${existingData ? 'window.currentEditingData' : 'null'})">
                        <span class="text-sm text-navy">${i+1}</span>
                    </label>
                `).join('');
                document.getElementById('m_period_container').innerHTML = periodChecksHtml;

                const pChk = document.querySelector(`.m-period-chk[value="${period}"]`);
                if(pChk) pChk.checked = true;

                if (existingData) {
                    window.currentEditingData = existingData; 
                    document.getElementById('modalTitle').innerText = 'แก้ไขตารางสอน';
                    document.getElementById('m_original_id').value = existingData.originalIndex;
                    document.getElementById('m_creator').value = existingData['ผู้บันทึก'] || currentUser;
                    
                    if (window.interactiveViewMode === 'teacher') {
                        document.getElementById('m_room').value = existingData['ห้องเรียน'];
                        document.getElementById('m_plan').value = existingData['แผนการเรียน'];
                    }

                    window.updateModalDropdowns(existingData);
                    document.getElementById('m_code').value = existingData['รหัสวิชา'];
                    window.autoFillModalCourse(); 
                    document.getElementById('m_location').value = existingData['สถานที่เรียน'] || '';
                    document.getElementById('m_btn_delete').classList.remove('hidden');
                } else {
                    window.currentEditingData = null;
                    document.getElementById('modalTitle').innerText = 'เพิ่มรายวิชาในตาราง';
                    document.getElementById('m_original_id').value = '';
                    document.getElementById('m_creator').value = currentUser; 
                    
                    if (window.interactiveViewMode === 'teacher') {
                        document.getElementById('m_room').value = '';
                        document.getElementById('m_plan').value = '';
                    }

                    window.updateModalDropdowns();
                    document.getElementById('m_code').value = '';
                    document.getElementById('m_name').value = '';
                    document.getElementById('m_location').value = '';
                    document.getElementById('m_btn_delete').classList.add('hidden');
                }

                document.getElementById('schModal').classList.remove('hidden');
                setTimeout(() => document.getElementById('m_code').focus(), 100);
            };

            window.closeSchModal = () => {
                document.getElementById('schModal').classList.add('hidden');
            };

            window.autoFillModalCourse = () => {
                let code = document.getElementById('m_code').value.trim();
                let c = window.interactiveCourses.find(x => x['รหัสวิชา'] === code);
                if(c) {
                    document.getElementById('m_name').value = c['ชื่อวิชา'];
                    if (window.interactiveViewMode === 'student') {
                        document.getElementById('m_teacher').value = c['ชื่อครูผู้สอน'];
                    }
                } else {
                    document.getElementById('m_name').value = '';
                    if (window.interactiveViewMode === 'student') {
                        document.getElementById('m_teacher').value = '';
                    }
                }
                
                if (window.interactiveViewMode === 'teacher' && c) {
                    let cRooms = (c['ชั้นที่สอน'] || c['ชั้นที่เปิดสอน'] || '').split(',').map(r => r.trim()).filter(r => r);
                    let cPlans = (c['แผนการเรียน'] || '').split(',').map(p => p.trim()).filter(p => p);
                    if (cRooms.length === 1 && !document.getElementById('m_room').value) {
                        document.getElementById('m_room').value = cRooms[0];
                        window.autoSelectModalPlan();
                    }
                    if (cPlans.length === 1 && !document.getElementById('m_plan').value) {
                        document.getElementById('m_plan').value = cPlans[0];
                    }
                }
            };

            window.deleteSchModalSlot = async () => {
                const rowIdStr = document.getElementById('m_original_id').value;
                const rowIndex = rowIdStr;

                if(await Swal.fire({title: 'ยืนยันการลบรายวิชานี้?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ลบเลย'}).then(r => r.isConfirmed)){
                    closeSchModal();
                    
                    let itemToDelete = window.interactiveSchData.find(item => String(item.originalIndex) === String(rowIndex));
                    if(!itemToDelete) return Swal.fire('ข้อผิดพลาด', 'ไม่พบข้อมูลที่จะลบ', 'error');

                    window.interactiveSchData = window.interactiveSchData.filter(item => String(item.originalIndex) !== String(rowIndex));
                    refreshSchGrid();

                    if (String(rowIndex).startsWith('temp_')) return;

                    window.pendingSyncCount++;
                    window.updateSyncStatus();

                    // คลีนข้อมูลก่อนส่ง
                    let cleanData = { ...itemToDelete };
                    delete cleanData.originalIndex;
                    delete cleanData.isPending;
                    delete cleanData.allRooms;      // เอาออกกรณีโหมดครู
                    delete cleanData.allTeachers;   // เอาออกกรณีโหมดนักเรียน

                    try {
                        await callAPI('deleteData', { sheetName: 'กำหนดตารางสอน', rowData: cleanData }, true);
                        
                        window.pendingSyncCount--;
                        if(window.pendingSyncCount === 0) {
                            let newData = await getCachedData('กำหนดตารางสอน', true, true);
                            window.interactiveSchData = newData.map((d, index) => ({...d, originalIndex: index}));
                            refreshSchGrid();
                        }
                        window.updateSyncStatus();
                        Swal.fire({icon: 'success', title: 'ลบสำเร็จ', text: 'ลบรายวิชาในตารางเรียบร้อยแล้ว', timer: 1500, showConfirmButton: false});
                    } catch(err) {
                        window.pendingSyncCount--;
                        window.updateSyncStatus();
                        Swal.fire('ข้อผิดพลาด', err.message || 'การลบข้อมูลขัดข้อง', 'error');
                        window.forceRefreshSchGrid(true);
                    }
                }
            };

            const processSaveDataAsync = async (data, rowId) => {
                if (rowId !== null) {
                    let index = window.interactiveSchData.findIndex(item => String(item.originalIndex) === String(rowId));
                    if(index !== -1) window.interactiveSchData[index] = { ...data, originalIndex: rowId, isPending: true };
                } else {
                    window.interactiveSchData.push({ ...data, originalIndex: 'temp_' + Date.now() + Math.random(), isPending: true });
                }
                window.refreshSchGrid();

                window.pendingSyncCount++;
                window.updateSyncStatus();

                try {
                    await callAPI('saveData', { sheetName: 'กำหนดตารางสอน', rowId: (rowId !== null && !String(rowId).startsWith('temp_')) ? parseInt(rowId) : null, data: data }, true);
                    
                    window.pendingSyncCount--;
                    if(window.pendingSyncCount === 0) {
                        let newData = await getCachedData('กำหนดตารางสอน', true, true);
                        window.interactiveSchData = newData.map((d, index) => ({...d, originalIndex: index}));
                        window.refreshSchGrid();
                    }
                    window.updateSyncStatus();
                } catch(err) {
                    window.pendingSyncCount--;
                    window.updateSyncStatus();
                    Swal.fire('ข้อผิดพลาด', err.message || 'การบันทึกข้อมูลล้มเหลว', 'error');
                    window.forceRefreshSchGrid(true); 
                    throw err; 
                }
            };

            document.getElementById('modalSchForm').onsubmit = async (e) => {
                e.preventDefault();
                
                const periodChks = Array.from(document.querySelectorAll('.m-period-chk:checked')).map(c => parseInt(c.value));
                if (periodChks.length === 0) {
                    return Swal.fire('แจ้งเตือน', 'กรุณาติ๊กเลือกคาบเรียนอย่างน้อย 1 คาบ', 'warning');
                }
                
                const room = document.getElementById('m_room').value.trim();
                const plan = document.getElementById('m_plan').value.trim();
                
                if (window.interactiveViewMode === 'teacher') {
                    if (!room) {
                        return Swal.fire('แจ้งเตือน', 'กรุณาเลือระดับชั้น/ห้องให้ถูกต้อง', 'warning');
                    }
                    if (!plan) {
                        return Swal.fire('แจ้งเตือน', 'กรุณาเลือกแผนการเรียน', 'warning');
                    }
                }

                if(!document.getElementById('m_name').value) {
                    return Swal.fire('แจ้งเตือน', 'ไม่พบรหัสวิชานี้ในระบบ กรุณาตรวจสอบอีกครั้ง', 'warning');
                }

                const rowIdStr = document.getElementById('m_original_id').value;
                const rowId = rowIdStr !== "" ? rowIdStr : null;
                const day = document.getElementById('m_day').value.trim();
                const teacher = document.getElementById('m_teacher').value.trim();
                const locationVal = document.getElementById('m_location').value.trim();
                const code = document.getElementById('m_code').value.trim();

                // --- ตรวจสอบข้อมูลซ้ำซ้อนทันที (ใช้ข้อมูลในหน้าจอเพื่อไม่ให้ต้องรอโหลด) ---
                let latestData = window.interactiveSchData;
                let conflictMsg = [];
                let currentCourseCount = 0;

                for (let i = 0; i < latestData.length; i++) {
                    let s = latestData[i];
                    if (rowId !== null && String(s.originalIndex) === String(rowId)) continue;
                    // แก้ไขจุดที่ 1: ตรวจสอบจำนวนคาบแยกตาม ห้อง + แผนการเรียน
                    if (String(s['ห้องเรียน'] || '').trim() === room && String(s['แผนการเรียน'] || '').trim() === plan && String(s['รหัสวิชา'] || '').trim() === code) {
                        currentCourseCount++;
                    }
                }

                let courseInfo = window.interactiveCourses.find(c => String(c['รหัสวิชา'] || '').trim() === code);
                if (courseInfo) {
                    let creditStr = String(courseInfo['หน่วยกิต'] || '').trim();
                    let credit = parseFloat(creditStr);
                    let maxPeriods = (!isNaN(credit) && credit > 0) ? (credit * 2) : 0;
                    if (maxPeriods > 0 && (currentCourseCount + periodChks.length) > maxPeriods) {
                        conflictMsg.push(`- <b>วิชา ${code}</b> ต้องการจัดเพิ่ม ${periodChks.length} คาบ แต่จะเกินกำหนดของห้องนี้ (${maxPeriods} คาบ/สัปดาห์)`);
                    }
                }

                periodChks.forEach(p => {
                    latestData.forEach(slot => {
                        if (rowId !== null && String(slot.originalIndex) === String(rowId)) return;

                        if (String(slot['วัน'] || '').trim() === day && parseInt(slot['คาบที่']) === p) {
                            let sRoom = String(slot['ห้องเรียน'] || '').trim();
                            let sPlan = String(slot['แผนการเรียน'] || '').trim();

                            // [แก้ไขล่าสุด]: อนุญาตให้ห้องเดียวกันแต่คนละแผนการเรียน จัดลงในคาบเดียวกันได้ 
                            // (ระบบจะข้ามการเช็คครูชนและห้องชนให้ทันที สำหรับกรณีเรียนรวมแผน)
                            if (sRoom !== '' && sRoom !== '-' && sRoom === room && sPlan !== plan) {
                                return; 
                            }

                            let sTeacher = String(slot['ชื่อครูผู้สอน'] || '').trim();
                            let sLocation = String(slot['สถานที่เรียน'] || '').trim();

                            let inputTeacherList = teacher.split(',').map(t => t.replace(/\s+/g, ''));
                            let sTeacherList = sTeacher.split(',').map(t => t.replace(/\s+/g, ''));
                            let hasCommonTeacher = inputTeacherList.some(t => sTeacherList.includes(t) && t !== '');

                            if (hasCommonTeacher) {
                                let shortTeacher = teacher.split(',').map(t => t.replace(/^(นาย|นางสาว|นาง|น\.ส\.|ว่าที่\s?ร\.ต\.|ว่าที่ร้อยตรี|ครู)\s*/g, '').trim().split(' ')[0]).join(', ');
                                if (String(slot['รหัสวิชา'] || '').trim() === 'กิจกรรม' || sRoom === '-') {
                                    conflictMsg.push(`- คาบ ${p}: <b>ครู${shortTeacher}</b> ติดภารกิจ "${slot['ชื่อวิชา']}"`);
                                } else {
                                    conflictMsg.push(`- คาบ ${p}: <b>ครู${shortTeacher}</b> มีสอนวิชา ${slot['รหัสวิชา']} (ชั้น ${sRoom}) อยู่แล้ว`);
                                }
                            }
                            
                            if (locationVal !== '' && sLocation === locationVal && sLocation !== '-') {
                                conflictMsg.push(`- คาบ ${p}: <b>สถานที่ "${locationVal}"</b> มีการใช้งานโดยชั้น ${sRoom} อยู่แล้ว`);
                            }
                            
                            // เช็คชั้นเรียนชน โดยยึด "ห้อง + แผนการเรียน"
                            if (sRoom !== '' && sRoom !== '-' && sRoom === room && sPlan === plan) {
                                let planText = plan ? ` (แผนฯ ${plan})` : '';
                                conflictMsg.push(`- คาบ ${p}: <b>ชั้น ${room}${planText}</b> มีการจัดวิชาอื่นในคาบนี้ไปแล้ว`);
                            }
                        }
                    });
                });

                if (conflictMsg.length > 0) {
                    Swal.fire({
                        title: 'พบข้อมูลชนกัน!',
                        html: '<div class="text-left text-sm mt-2 text-red-600 space-y-2"><b>ระบบตรวจพบการซ้ำซ้อน:</b><br>' + conflictMsg.join('<br>') + '</div>',
                        icon: 'error',
                        confirmButtonColor: '#1A2942',
                        confirmButtonText: 'กลับไปแก้ไข'
                    });
                    return; 
                }

                if (locationVal) {
                    let currentRooms = (window.interactiveSettings.teaching_rooms || '').split(',').map(r => r.trim()).filter(r => r);
                    if (!currentRooms.includes(locationVal)) {
                        currentRooms.push(locationVal);
                        window.interactiveSettings.teaching_rooms = currentRooms.join(',');
                        window.interactiveLocationOpts = currentRooms.map(r => `<option value="${r}">${r}</option>`).join('');
                        callAPI('saveData', { sheetName: 'การตั้งค่า', rowId: 0, data: { 'JSON_DATA': JSON.stringify(window.interactiveSettings) }, isSettings: true }, true);
                    }
                }

                window.closeSchModal(); 
                
                // รันแบบเบื้องหลัง (Background Task) โชว์สถานะหมุนเฉพาะในช่องตาราง
                (async () => {
                    let tempIdx = 0;
                    let hasError = false;
                    
                    let d = day;
                    for (const p of periodChks) {
                        if (hasError) break; 

                        const data = {
                            'ห้องเรียน': room, 'แผนการเรียน': plan,
                            'วัน': d, 'คาบที่': p,
                            'รหัสวิชา': code, 'ชื่อวิชา': document.getElementById('m_name').value,
                            'ชื่อครูผู้สอน': teacher, 'สถานที่เรียน': locationVal,
                            'ประเภท': 'ปกติ', // <--- แก้ไขตรงนี้ให้บันทึกเป็นค่า 'ปกติ' เสมอ
                            'ผู้บันทึก': currentUser
                        };
                        const currentRowId = (tempIdx === 0) ? rowId : null;
                        
                        try {
                            await processSaveDataAsync(data, currentRowId);
                            tempIdx++;
                        } catch (err) {
                            hasError = true;
                        }
                    }
                })();
            };
        }

        /// --- 6. ประมวลผลตารางสอน ---
        function renderProcess(container) {
            container.innerHTML = `
                <div class="bg-white p-10 rounded-xl shadow-md text-center max-w-lg mx-auto mt-10">
                    <i class="fas fa-cogs text-6xl text-navy mb-6"></i>

                    <button onclick="executeProcess()" class="bg-gold text-navy font-bold text-lg px-8 py-3 rounded-full hover:bg-opacity-80 shadow-lg transform transition hover:scale-105">

                    </button>
                </div>
            `;

                try {
                    showLoading(true, 'กำลังเตรียมข้อมูลและจัดกลุ่มตารางสอน...');
                    
                    // ดึงตารางล่าสุดมาอัปเดตแคช (ประมวลผลข้อมูลที่ฝั่งหน้าเว็บแทน เพื่อลดภาระเซิร์ฟเวอร์และแก้ปัญหาข้อมูลเกิน 50k ตัวอักษร)
                    await getCachedData('กำหนดตารางสอน', true, true); 
                    
                    // หน่วงเวลาเล็กน้อยเพื่อให้ผู้ใช้ทราบว่าระบบทำงานเสร็จแล้ว
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    showLoading(false);
                    Swal.fire('สำเร็จ', 'ประมวลผลและจัดเตรียมตารางสอนเสร็จสมบูรณ์ สามารถไปดูได้ที่หน้าดาวน์โหลด', 'success');
                } catch (error) {
                    showLoading(false);
                    console.error('Process Timetable Error:', error);
                    let errMsg = error.message || 'การเชื่อมต่อขัดข้อง';
                    Swal.fire({
                        icon: 'error',
                        title: 'เกิดข้อผิดพลาด',
                        text: 'ไม่สามารถประมวลผลตารางสอนได้: ' + errMsg
                    });
                }
            }
        }


         // --- 7. ดาวน์โหลดตารางสอน ---
        async function renderDownload(container) {
            // โหลดข้อมูลดิบจาก 'กำหนดตารางสอน' แล้วนำมาประมวลผลที่หน้าเว็บโดยตรง
            let [settingsArr, teachers, rawData] = await Promise.all([
                getCachedData('การตั้งค่า'),
                getCachedData('ข้อมูลครู'),
                getCachedData('กำหนดตารางสอน')
            ]);
            
            let settings = settingsArr.length > 0 ? JSON.parse(settingsArr[0]['JSON_DATA'] || '{}') : {periods: 8, term: '1', year: '2568'};
            let currentTerm = settings.term || '1';
            let currentYear = settings.year || '2568';
            let schoolName = settings.school_name || 'โรงเรียนนราสิกขาลัย';
            let rooms = (settings.rooms || '').split(',').map(r => r.trim()).filter(r => r);
            let plans = learningPlans;

            // Helper: แปลงข้อความให้ลบเว้นวรรคทั้งหมด เพื่อเปรียบเทียบชื่อครูได้แม่นยำ
            const normalizeStr = (str) => String(str || '').replace(/\s+/g, '');

            // Helper: แปลงชื่อครูจากที่พิมพ์ (อาจเว้นวรรคผิด) ให้ตรงกับฐานข้อมูลครูเป๊ะๆ
            const getStandardTeacherName = (rawName) => {
                let matchName = normalizeStr(rawName);
                let found = teachers.find(t => normalizeStr(t['ชื่อ-สกุล']) === matchName);
                return found ? found['ชื่อ-สกุล'] : String(rawName).trim();
            };

            // ประมวลผลและจัดกลุ่มข้อมูลตารางสอน (Client-side Processing)
            let processedData = { student: {}, teacher: {} };
            if (rawData && rawData.length > 0) {
                rawData.forEach(slot => {
                    let room = String(slot['ห้องเรียน'] || '').trim();
                    let teacherStr = String(slot['ชื่อครูผู้สอน'] || '').trim();
                    
                    if (room !== '' && room !== '-') {
                        if (!processedData.student[room]) processedData.student[room] = [];
                        processedData.student[room].push(slot);
                    }
                    if (teacherStr !== '' && teacherStr !== '-') {
                        let teacherList = teacherStr.split(',').filter(t => t.trim());
                        teacherList.forEach(t => {
                            let stdName = getStandardTeacherName(t);
                            if (!processedData.teacher[stdName]) processedData.teacher[stdName] = [];
                            processedData.teacher[stdName].push(slot);
                        });
                    }
                });
            }

            container.innerHTML = `
                <div class="mb-4 flex flex-wrap items-center justify-between gap-2">
                     <h3 class="text-xl font-bold text-navy flex items-center">
                        <i class="fas fa-download mr-2 text-gold"></i> ดาวน์โหลดตารางสอน
                        <span class="bg-blue-100 text-blue-800 text-sm font-semibold px-3 py-1 rounded-full ml-3 border border-blue-200 shadow-sm">ภาคเรียนที่ ${currentTerm}/${currentYear}</span>
                    </h3>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-md mb-4 flex flex-col lg:flex-row gap-4 items-end">
                    
                    <div class="flex-1 w-full">
                        <label class="block text-xs font-medium text-gray-600 mb-1">ประเภทตาราง</label>
                        <select id="dl_type" class="border border-gray-300 focus:border-gold outline-none p-2 rounded-lg text-sm w-full transition" onchange="toggleDlSelectors()">
                            <option value="student">ตารางเรียน (นักเรียน)</option>
                            <option value="teacher">ตารางสอน (ครู)</option>
                        </select>
                    </div>
                    
                    <div id="wrapper_dl_room" class="flex-1 w-full">
                        <label class="block text-xs font-medium text-gray-600 mb-1">ชั้น/ห้อง</label>
                        <select id="dl_room" class="border border-gray-300 focus:border-gold outline-none p-2 rounded-lg text-sm w-full transition">
                            <option value="">-- เลือกห้องเรียน --</option>
                            <option value="all">ทุกชั้น/ห้อง</option>
                            ${rooms.map(r => `<option value="${r}">${r}</option>`).join('')}
                        </select>
                    </div>

                    <div id="wrapper_dl_plan" class="flex-1 w-full">
                        <label class="block text-xs font-medium text-gray-600 mb-1">แผนการเรียน</label>
                        <select id="dl_plan" class="border border-gray-300 focus:border-gold outline-none p-2 rounded-lg text-sm w-full transition">
                            <option value="all">ทุกแผนการเรียน</option>
                            ${plans.map(p => `<option value="${p}">${p}</option>`).join('')}
                        </select>
                    </div>

                    <div id="wrapper_dl_group" class="flex-1 w-full hidden">
                        <label class="block text-xs font-medium text-gray-600 mb-1">กลุ่มสาระการเรียนรู้</label>
                        <select id="dl_group" class="border border-gray-300 focus:border-gold outline-none p-2 rounded-lg text-sm w-full transition" onchange="updateTeacherOptions()">
                            <option value="all">ทุกกลุ่มสาระ</option>
                            ${subjectGroups.map(g => `<option value="${g}">${g}</option>`).join('')}
                        </select>
                    </div>

                    <div id="wrapper_dl_teacher" class="flex-1 w-full hidden">
                        <label class="block text-xs font-medium text-gray-600 mb-1">ครูผู้สอน</label>
                        <select id="dl_teacher" class="border border-gray-300 focus:border-gold outline-none p-2 rounded-lg text-sm w-full transition">
                            <option value="all">ทุกคนในกลุ่มสาระ</option>
                            ${teachers.map(t => `<option value="${t['ชื่อ-สกุล']}">${t['ชื่อ-สกุล']}</option>`).join('')}
                        </select>
                    </div>

                    <div class="flex flex-wrap gap-2 w-full lg:w-auto mt-2 lg:mt-0">
                        <button onclick="previewTimetable()" class="bg-navy text-white px-4 py-2 rounded-lg hover:bg-opacity-90 h-[38px] flex items-center justify-center text-sm flex-1 lg:flex-none shadow-sm transition"><i class="fas fa-search mr-2"></i> แสดงตาราง</button>
                        <button onclick="downloadAsJPG()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 h-[38px] flex items-center justify-center text-sm flex-1 lg:flex-none shadow-sm transition"><i class="fas fa-download mr-2"></i> ดาวน์โหลด JPG</button>
                        <button onclick="forceRefreshDownload()" class="bg-gray-200 text-gray-700 px-3 py-2 rounded-lg hover:bg-gray-300 h-[38px] flex items-center justify-center text-sm shadow-sm transition" title="ดึงข้อมูลล่าสุดจากระบบ"><i class="fas fa-sync-alt"></i></button>
                    </div>

                </div>

                <!-- พื้นที่วาดตารางสำหรับ Download -->
                <div class="overflow-x-auto bg-gray-200 p-4 rounded w-full" style="min-height: 500px;">
                    <!-- ใช้ min-w-[1050px] เพื่อป้องกันปัญหาตารางโดนตัดขอบด้านซ้ายเมื่อดูผ่านหน้าจอขนาดเล็ก -->
                    <div id="timetableCanvas" class="flex flex-col gap-8 items-center min-w-[1050px] w-full py-4 mx-auto">
                        <div class="bg-white p-8 w-[1000px] shadow-lg relative text-center text-gray-400 mt-10 rounded-xl">
                            <i class="fas fa-table text-4xl mb-2"></i><br>กรุณาเลือกตารางและกดแสดงตาราง
                        </div>
                    </div>
                </div>
            `;

            window.toggleDlSelectors = () => {
                const type = document.getElementById('dl_type').value;
                if(type === 'student') {
                    document.getElementById('wrapper_dl_room').classList.remove('hidden');
                    document.getElementById('wrapper_dl_plan').classList.remove('hidden');
                    document.getElementById('wrapper_dl_group').classList.add('hidden');
                    document.getElementById('wrapper_dl_teacher').classList.add('hidden');
                } else {
                    document.getElementById('wrapper_dl_room').classList.add('hidden');
                    document.getElementById('wrapper_dl_plan').classList.add('hidden');
                    document.getElementById('wrapper_dl_group').classList.remove('hidden');
                    document.getElementById('wrapper_dl_teacher').classList.remove('hidden');
                    updateTeacherOptions();
                }
            }

            window.updateTeacherOptions = () => {
                const group = document.getElementById('dl_group').value;
                const teacherSelect = document.getElementById('dl_teacher');
                let filteredTeachers = teachers;
                
                if (group !== 'all') {
                    filteredTeachers = teachers.filter(t => t['กลุ่มสาระการเรียนรู้'] === group);
                }
                
                teacherSelect.innerHTML = `
                    <option value="all">ทุกคนในกลุ่มสาระ</option>
                    ${filteredTeachers.map(t => `<option value="${t['ชื่อ-สกุล']}">${t['ชื่อ-สกุล']}</option>`).join('')}
                `;
            }

            window.forceRefreshDownload = async () => {
                showLoading(true);
                await Promise.all([
                    getCachedData('กำหนดตารางสอน', true),
                    getCachedData('ข้อมูลครู', true)
                ]);
                showLoading(false);
                Swal.fire({icon: 'success', title: 'รีเฟรชสำเร็จ', text: 'ดึงข้อมูลล่าสุดจากระบบแล้ว', timer: 1500, showConfirmButton: false}).then(() => {
                    loadPage('download');
                });
            };

            window.previewTimetable = () => {
                const type = document.getElementById('dl_type').value;
                let tablesToRender = []; // เก็บข้อมูลแต่ละตารางแยกกัน

                if (type === 'student') {
                    const selectedRoom = document.getElementById('dl_room').value;
                    const selectedPlan = document.getElementById('dl_plan').value;
                    
                    if (!selectedRoom) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกชั้น/ห้อง', 'warning');

                    // 1. ดึงข้อมูลห้องที่จะนำมาแสดง
                    let roomsToProcess = selectedRoom === 'all' ? Object.keys(processedData.student) : (processedData.student[selectedRoom] ? [selectedRoom] : []);

                    roomsToProcess.forEach(roomKey => {
                        let roomData = processedData.student[roomKey] || [];
                        
                        // 2. จัดกลุ่มข้อมูลในแต่ละห้องตาม 'แผนการเรียน'
                        let planGroups = {};
                        roomData.forEach(slot => {
                            let plan = slot['แผนการเรียน'] || '-';
                            if (!planGroups[plan]) planGroups[plan] = [];
                            planGroups[plan].push(slot);
                        });

                        // 3. กรองตามแผนการเรียนที่เลือกใน Select (ถ้าไม่ได้เลือกทุกแผน)
                        let plansToProcess = Object.keys(planGroups);
                        if (selectedPlan !== 'all') {
                            plansToProcess = plansToProcess.filter(p => p === selectedPlan);
                        }

                        // 4. นำเข้าตารางที่จะวาดแยกกัน
                        plansToProcess.forEach(planKey => {
                            let pText = planKey === '-' ? 'ทั่วไป' : planKey;
                            tablesToRender.push({
                                type: 'student',
                                subtitle: `ชั้น/ห้อง: ${roomKey} &nbsp;|&nbsp; แผนการเรียน: ${pText}`,
                                scheduleMap: planGroups[planKey],
                                sortKey: roomKey + planKey
                            });
                        });
                    });

                } else {
                    const selectedGroup = document.getElementById('dl_group').value;
                    const selectedTeacher = document.getElementById('dl_teacher').value;

                    // สร้าง Lookup สำหรับหากลุ่มสาระของครู (คีย์เป็นชื่อมาตรฐานแล้ว)
                    const teacherGroupMap = {};
                    teachers.forEach(t => {
                        teacherGroupMap[t['ชื่อ-สกุล']] = t['กลุ่มสาระการเรียนรู้'];
                    });

                    let teachersToProcess = [];

                    if (selectedTeacher !== 'all') {
                        if (processedData.teacher[selectedTeacher]) {
                            teachersToProcess = [selectedTeacher];
                        }
                    } else {
                        // เลือก "ทุกคนในกลุ่มสาระ"
                        teachersToProcess = Object.keys(processedData.teacher).filter(teacherKey => {
                            if (selectedGroup === 'all') return true;
                            let tGroup = teacherGroupMap[teacherKey];
                            return tGroup === selectedGroup;
                        });
                    }

                    if (teachersToProcess.length === 0) {
                        document.getElementById('timetableCanvas').innerHTML = `
                            <div class="bg-white p-8 w-[1000px] shadow-lg relative text-center text-gray-400 mt-10 rounded-xl">
                                <i class="fas fa-search text-4xl mb-2"></i><br>ไม่พบข้อมูลตารางสอนของครูในกลุ่มสาระที่เลือก
                                <p class="text-sm mt-3 text-red-400">*หากท่านเพิ่งจัดตารางสอนเสร็จ กรุณาไปที่เมนู <b>"ประมวลผลตารางสอน"</b> ก่อนกดดูตารางครับ</p>
                            </div>
                        `;
                        return Swal.fire('แจ้งเตือน', 'ไม่พบข้อมูลตารางสอน (อาจยังไม่ได้ประมวลผล หรือไม่มีคาบสอน)', 'info');
                    }

                    teachersToProcess.forEach(teacherKey => {
                        let tGroup = teacherGroupMap[teacherKey] || 'ไม่ระบุกลุ่มสาระ';
                        let scheduleMap = processedData.teacher[teacherKey] || [];
                        
                        // คำนวณจำนวนคาบต่อสัปดาห์ (นับเฉพาะคาบที่ไม่ซ้ำกัน เผื่อกรณีสอนควบห้องในคาบเดียวกัน)
                        let uniquePeriods = new Set(scheduleMap.map(s => s['วัน'] + '_' + s['คาบที่'])).size;

                        tablesToRender.push({
                            type: 'teacher',
                            subtitle: `ครูผู้สอน: ${teacherKey} &nbsp;|&nbsp; กลุ่มสาระฯ: ${tGroup} &nbsp;|&nbsp; รวม: ${uniquePeriods} คาบ/สัปดาห์`,
                            scheduleMap: scheduleMap,
                            sortKey: tGroup + '_' + teacherKey // เรียงตามกลุ่มสาระแล้วตามด้วยชื่อครู
                        });
                    });
                }
                
                if (tablesToRender.length === 0) {
                    document.getElementById('timetableCanvas').innerHTML = `
                        <div class="bg-white p-8 w-[1000px] shadow-lg relative text-center text-gray-400 mt-10 rounded-xl">
                            <i class="fas fa-search text-4xl mb-2"></i><br>ไม่พบข้อมูลตารางตามเงื่อนไขที่เลือก
                        </div>
                    `;
                    return Swal.fire('แจ้งเตือน', 'ไม่พบข้อมูลตารางตามเงื่อนไขที่เลือก', 'info');
                }

                // เรียงลำดับตารางให้เป็นระเบียบตามชื่อห้องและแผน
                tablesToRender.sort((a,b) => a.sortKey.localeCompare(b.sortKey));

                // คำนวณหาคาบสูงสุดในข้อมูล เผื่อกรณีข้อมูลมีคาบ 9 แต่ตั้งค่าระบบไว้แค่ 8
                let basePeriods = settings.periods || 8;
                let maxPeriod = basePeriods;
                tablesToRender.forEach(table => {
                    table.scheduleMap.forEach(d => {
                        let p = parseInt(d['คาบที่']);
                        if (p > maxPeriod) maxPeriod = p;
                    });
                });

                // คำนวณเวลาและคาบพักสำหรับสร้างหัวตาราง (เหมือนกันทุกตาราง)
                let breakPeriod = parseInt(settings.break_period || 4);
                let breakDuration = parseInt(settings.break_duration || 60);
                let periodDuration = parseInt(settings.duration || 50);
                let startParts = (settings.start || '08:30').split(':');
                let initialTimeMin = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);

                let thsTemplate = '';
                let currentTimeMinHeader = initialTimeMin;
                for(let i=1; i<=maxPeriod; i++) {
                    let isBreak = (i === breakPeriod);
                    let currentDur = isBreak ? breakDuration : periodDuration;
                    let startStr = Math.floor(currentTimeMinHeader/60).toString().padStart(2,'0') + ':' + (currentTimeMinHeader%60).toString().padStart(2,'0');
                    currentTimeMinHeader += currentDur;
                    let endStr = Math.floor(currentTimeMinHeader/60).toString().padStart(2,'0') + ':' + (currentTimeMinHeader%60).toString().padStart(2,'0');
                    
                    if (isBreak) {
                         thsTemplate += `<th class="border border-navy p-2 bg-gray-300 text-gray-700 w-16 align-middle">
                                    พัก<br><span class="text-[9px] font-normal">${startStr}-${endStr}</span>
                                </th>`;
                    } else {
                        thsTemplate += `<th class="border border-navy p-2 bg-lightgold text-navy w-24 align-middle">
                                    คาบ ${i}<br><span class="text-[10px] font-normal text-gray-700">${startStr}-${endStr}</span>
                                </th>`;
                    }
                }

                const days = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์'];
                let allHtml = '';
                
                // วนลูปวาดตารางทีละหน้าตามข้อมูลที่จัดกลุ่มมาได้
                tablesToRender.forEach((tableData) => {
                    let trs = '';
                    days.forEach(day => {
                        let tds = '';
                        let i = 1;
                        while(i <= maxPeriod) {
                            if (i === breakPeriod) {
                                tds += `<td class="border border-navy p-2 text-center align-middle bg-gray-100 text-gray-500 text-xs w-16">
                                            <i class="fas fa-utensils mb-1"></i><br>พัก
                                        </td>`;
                                i++;
                                continue;
                            }

                            // Find matching slots
                            let slots = tableData.scheduleMap.filter(s => s['วัน'] === day && parseInt(s['คาบที่']) === i);
                            let colspan = 1;

                            if (slots.length > 0) {
                                let nextI = i + 1;
                                while (nextI <= maxPeriod && nextI !== breakPeriod) {
                                    let nextSlots = tableData.scheduleMap.filter(s => s['วัน'] === day && parseInt(s['คาบที่']) === nextI);
                                    if (window.areSlotsEqual(slots, nextSlots)) {
                                        colspan++;
                                        nextI++;
                                    } else {
                                        break;
                                    }
                                }
                            }
                                
                            if(slots.length > 0) {
                                let displaySlots = slots;
                                if (type === 'teacher') {
                                        let grouped = {};
                                        slots.forEach(slot => {
                                            let key = `${slot['รหัสวิชา']}_${slot['สถานที่เรียน']}`;
                                            if (!grouped[key]) {
                                                grouped[key] = { ...slot, allRooms: [slot['ห้องเรียน']] };
                                            } else {
                                                if (slot['ห้องเรียน'] !== '-' && !grouped[key].allRooms.includes(slot['ห้องเรียน'])) {
                                                    grouped[key].allRooms.push(slot['ห้องเรียน']);
                                                }
                                            }
                                        });
                                        displaySlots = Object.values(grouped);
                                    } else if (type === 'student') {
                                        let grouped = {};
                                        slots.forEach(slot => {
                                            let key = `${slot['รหัสวิชา']}_${slot['สถานที่เรียน']}`;
                                            if (!grouped[key]) {
                                                grouped[key] = { ...slot, allTeachers: [slot['ชื่อครูผู้สอน']] };
                                            } else {
                                                if (!grouped[key].allTeachers.includes(slot['ชื่อครูผู้สอน'])) {
                                                    grouped[key].allTeachers.push(slot['ชื่อครูผู้สอน']);
                                                }
                                            }
                                        });
                                        displaySlots = Object.values(grouped);
                                    }

                                    let cellContent = displaySlots.map(slot => {
                                        let innerHtml = '';
                                        if(settings.show_code) innerHtml += `<div class="font-bold text-xs">${slot['รหัสวิชา']}</div>`;

                                    tds += `<td colspan="${colspan}" class="border border-navy p-1 text-center align-top bg-blue-50">${cellContent}</td>`;
                                } else {
                                    tds += `<td colspan="${colspan}" class="border border-navy p-2 text-center text-gray-300 align-middle">-</td>`;

                            i += colspan;

                            </div>

            window.downloadAsJPG = async () => {

                try {
                    for (let i = 0; i < pages.length; i++) {

                        const canvas = await html2canvas(page, {
                            scale: 2, 
                            backgroundColor: '#ffffff',
                            useCORS: true 
                        });
                        
                        const link = document.createElement('a');
