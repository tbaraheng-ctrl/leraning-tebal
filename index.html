<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดตารางสอน - โรงเรียนนราสิกขาลัย</title>
    <!-- Google Fonts: Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2canvas สำหรับดาวน์โหลดตารางเป็นภาพ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- SweetAlert2 สำหรับแจ้งเตือน -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: {
                        navy: '#1A2942',
                        gold: '#D4AF37',
                        lightgold: '#F3E5AB'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f3f4f6; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #1A2942; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
        
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #D4AF37;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex flex-col justify-center items-center hidden">
        <div class="loader mb-4"></div>
        <p class="text-white font-semibold text-lg">กำลังประมวลผล...</p>
    </div>

    <!-- Login Page -->
    <div id="page-login" class="flex items-center justify-center min-h-screen bg-navy p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md border-t-4 border-gold">
            <div class="text-center mb-6">
                <img src="https://www.ns.ac.th/wp-content/uploads/2024/12/cropped-logo-sq.png" alt="โลโก้โรงเรียน" class="w-32 h-32 mx-auto object-contain app-logo">
                <h1 class="text-2xl font-bold text-navy mt-4">ระบบจัดตารางสอน</h1>
                <p class="text-gold font-semibold app-school-name">โรงเรียนนราสิกขาลัย</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fas fa-user"></i></span>
                        <input type="text" id="username" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="fas fa-lock"></i></span>
                        <input type="password" id="password" class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold" required>
                        <span class="absolute inset-y-0 right-0 flex items-center pr-3 cursor-pointer text-gray-400 hover:text-navy" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>
                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="rememberMe" class="form-checkbox text-gold focus:ring-gold rounded">
                        <span class="ml-2 text-sm text-gray-600">จำรหัสผ่าน</span>
                    </label>
                </div>
                <button type="submit" class="w-full bg-navy hover:bg-opacity-90 text-white font-bold py-2 px-4 rounded-lg transition duration-200 shadow-md">
                    เข้าสู่ระบบ
                </button>
            </form>
            <div class="mt-6 border-t border-gray-200 pt-4 text-center text-xs text-gray-400">
                พัฒนาโดย ครูมูฮัมหมัดตัซกีน บาราเฮง<br>ครูโรงเรียนนราสิกขาลัย
            </div>
        </div>
    </div>

    <!-- Main Application (Hidden initially) -->
    <div id="page-main" class="flex-1 flex flex-col md:flex-row min-h-screen relative overflow-hidden" style="display: none;">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden" onclick="toggleSidebar()"></div>

        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-50 w-64 bg-navy text-white flex flex-col shadow-2xl transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-4 flex items-center justify-between border-b border-gray-700">
                <div class="flex items-center">
                    <img src="https://www.ns.ac.th/wp-content/uploads/2024/12/cropped-logo-sq.png" alt="Logo" class="w-10 h-10 mr-2 object-contain app-logo">
                    <div>
                        <h2 class="font-bold text-gold text-base leading-tight app-school-name">โรงเรียนนราสิกขาลัย</h2>
                        <p class="text-[10px] text-gray-300">Timetable System</p>
                    </div>
                </div>
                <!-- Close Button for Mobile -->
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white focus:outline-none">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <div class="p-4 text-sm text-center border-b border-gray-700 bg-black bg-opacity-20">
                <p>ผู้ใช้งาน: <span id="displayUser" class="font-semibold text-gold"></span></p>
                <p>บทบาท: <span id="displayRole" class="text-gray-300"></span></p>
            </div>

            <nav class="flex-1 overflow-y-auto py-4">
                <ul class="space-y-1" id="navMenu">
                    <!-- เมนูจะถูกสร้างด้วย JS ตามสิทธิ์ -->
                </ul>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded transition duration-200 mb-3">
                    <i class="fas fa-sign-out-alt mr-2"></i> ออกจากระบบ
                </button>
                <div class="text-center text-[10px] text-gray-400 leading-tight">
                    พัฒนาโดย ครูมูฮัมหมัดตัซกีน บาราเฮง<br>ครูโรงเรียนนราสิกขาลัย
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="flex-1 flex flex-col bg-gray-100 h-screen overflow-hidden w-full">
            <!-- Topbar mobile toggle -->
            <header class="md:hidden bg-navy text-white p-4 flex justify-between items-center shadow-md z-30 relative">
                <span class="font-bold text-gold truncate flex-1">ระบบจัดตารางสอน</span>
                <button onclick="toggleSidebar()" class="text-white flex items-center gap-2 hover:text-gold transition whitespace-nowrap ml-4">
                    <span class="text-sm font-semibold">เมนู</span>
                    <i class="fas fa-bars text-xl"></i>
                </button>
            </header>

            <!-- Dynamic Content Container -->
            <div id="contentArea" class="flex-1 overflow-y-auto p-4 md:p-8">
                <!-- เนื้อหาแต่ละหน้าจะถูก Inject ที่นี่ -->
            </div>
        </main>
    </div>

    <!-- Location Picker Modal (Global) -->
    <div id="locationPickerModal" class="fixed inset-0 bg-black bg-opacity-60 z-[80] flex items-center justify-center hidden backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden transform transition-all flex flex-col max-h-[85vh] m-4">
            <div class="bg-navy text-white px-6 py-4 flex justify-between items-center shrink-0 border-b-4 border-gold">
                <h3 class="font-bold text-lg flex items-center"><i class="fas fa-map-marker-alt text-gold mr-2"></i> เลือกสถานที่เรียน</h3>
                <button onclick="closeLocationPicker()" class="text-gray-300 hover:text-white transition focus:outline-none bg-white bg-opacity-10 hover:bg-opacity-20 rounded-full w-8 h-8 flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto bg-gray-50 flex-1" id="locationGridContainer">
                <!-- Grid items injected here -->
            </div>
            <div class="bg-white px-6 py-4 flex justify-between border-t border-gray-200 shrink-0">
                 <button type="button" onclick="selectLocation('')" class="text-red-500 hover:text-red-700 hover:bg-red-50 px-4 py-2 rounded-lg font-medium transition flex items-center">
                    <i class="fas fa-eraser mr-2"></i> ล้างข้อมูล (ไม่ระบุ)
                 </button>
                 <button type="button" onclick="closeLocationPicker()" class="bg-navy text-white px-6 py-2 rounded-lg hover:bg-opacity-90 shadow-md transition">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        // นำ URL ของ Web App ที่ได้จาก Google Apps Script มาใส่ที่นี่
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpFVCZiJ-3ToorA9gAJ_2xuZAP6vAMe1YONk6FoQMdNfvgel-nTGNbuDLz_s9dKR3mRg/exec';
        
        let currentUser = null;
        let currentRole = null;
        let cachePromises = {}; // เปลี่ยนจาก cachedData เป็น cachePromises เพื่อกันการโหลดซ้ำซ้อน

        const subjectGroups = ['วิทยาศาสตร์และเทคโนโลยี', 'คณิตศาสตร์', 'ภาษาไทย', 'ภาษาต่างประเทศ', 'สังคมศึกษา ศาสนาและวัฒนธรรม', 'การงานอาชีพ', 'สุขศึกษาและพลศึกษา', 'ศิลปะ'];
        let learningPlans = ['ทั่วไป', 'วิทย์-คณิต', 'SMTE', '(วิทย์-คณิต) พลังสิบ', '(วิทย์-คณิต)เตรียมสี่เหล่าทัพ', 'IEP', 'ภาษาจีน', 'อาชีพ', 'ศิลป์-กีฬา']; // เปลี่ยนเป็น let เพื่อรองรับการตั้งค่าผ่านระบบ

        // Global variables for location picker
        window.currentLocTarget = '';
        window.baseLocationHtml = '';
        window.modalLocationHtml = '';
        window.currentEditingData_base = null;

        window.openLocationPicker = (targetId, context) => {
            window.currentLocTarget = targetId;
            let html = '';
            
            if(context === 'base') {
                window.updateMainFormDropdowns(window.currentEditingData_base); // Refresh state
                html = window.baseLocationHtml || '<div class="text-center text-gray-500 py-8 flex flex-col items-center"><i class="fas fa-exclamation-circle text-4xl text-gray-300 mb-3"></i><p>กรุณาระบุข้อมูล ระดับชั้น, แผน, วัน และ คาบเรียน ให้ครบถ้วนก่อน</p></div>';
            } else if (context === 'modal') {
                window.updateModalDropdowns(window.currentEditingData); // Refresh state
                html = window.modalLocationHtml || '<div class="text-center text-gray-500 py-8 flex flex-col items-center"><i class="fas fa-exclamation-circle text-4xl text-gray-300 mb-3"></i><p>กรุณาระบุคาบเรียนให้ครบถ้วนก่อน</p></div>';
            }
            
            document.getElementById('locationGridContainer').innerHTML = html;
            document.getElementById('locationPickerModal').classList.remove('hidden');
        };

        window.closeLocationPicker = () => {
            document.getElementById('locationPickerModal').classList.add('hidden');
        };

        window.selectLocation = (loc) => {
            if(window.currentLocTarget) {
                document.getElementById(window.currentLocTarget).value = loc;
            }
            window.closeLocationPicker();
        };

        // ==========================================
        // INIT & UTILS
        // ==========================================

        // ฟังก์ชันแยกชื่อแผนการเรียนจากข้อความที่อาจมีชั้น/ห้องรวมอยู่ด้วย (พร้อมกรองตัวซ้ำออก)
        function extractPlanNames(planString) {
            if (!planString) return [];
            let plans = [];
            if (planString.includes('\n') || planString.includes(':')) {
                plans = planString.split('\n').map(line => line.split(':')[0].trim()).filter(p => p);
            } else {
                plans = planString.split(',').map(p => p.trim()).filter(p => p);
            }
            return [...new Set(plans)]; // กรองข้อมูลที่ซ้ำกันออกให้เหลือเพียงชื่อเดียว
        }

        window.onload = () => {
            // Check remember me
            const savedUser = localStorage.getItem('ns_timetable_user');
            const savedPass = localStorage.getItem('ns_timetable_pass');
            if (savedUser && savedPass) {
                document.getElementById('username').value = savedUser;
                document.getElementById('password').value = savedPass;
                document.getElementById('rememberMe').checked = true;
            }
        };

        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        window.toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                sidebar.classList.add('translate-x-0');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.remove('translate-x-0');
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        };

        window.updateAllLogos = (logoUrl) => {
            if (!logoUrl) return;
            document.querySelectorAll('.app-logo').forEach(img => {
                img.src = logoUrl;
            });
        };

        window.updateAllSchoolNames = (schoolName) => {
            if (!schoolName) return;
            document.title = 'ระบบจัดตารางสอน - ' + schoolName;
            document.querySelectorAll('.app-school-name').forEach(el => {
                el.innerText = schoolName;
            });
        };

        // ==========================================
        // API COMMUNICATION & ADVANCED CACHING
        // ==========================================
        async function callAPI(action, payload = {}, isBackground = false) {
            // ถ้าเป็นการดึงข้อมูลพื้นหลัง (Background Prefetch) จะไม่แสดง Loader บดบังหน้าจอ
            if (!isBackground) showLoading(true);
            try {
                const formData = new URLSearchParams();
                formData.append('action', action);
                formData.append('payload', JSON.stringify(payload));

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const result = await response.json();
                if (!isBackground) showLoading(false);
                
                if(result.status === 'success') return result.data;
                else throw new Error(result.message);
            } catch (error) {
                if (!isBackground) showLoading(false);
                Swal.fire('ข้อผิดพลาด', error.message || 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้', 'error');
                console.error(error);
                return null;
            }
        }

        // ระบบ Cache ขั้นสูง (เก็บเป็นสถานะ Promise) 
        // ทำให้คำขอโหลดข้อมูลที่มาพร้อมๆ กัน ไม่ถูกส่งไปกวน Server ซ้ำซ้อน
        function getCachedData(sheetName, forceRefresh = false, isBackground = false) {
            if (forceRefresh || !cachePromises[sheetName]) {
                cachePromises[sheetName] = callAPI('getData', { sheetName: sheetName }, isBackground).then(data => {
                    return data || [];
                }).catch(e => {
                    delete cachePromises[sheetName]; // หากเออเร่อ ให้ลบแคชทิ้งเพื่อลองใหม่คราวหน้า
                    return [];
                });
            }
            return cachePromises[sheetName];
        }

        // โหลดข้อมูลทุกอย่างเตรียมไว้ทันทีที่เข้าสู่ระบบสำเร็จ!
        function prefetchAllData() {
            const allSheets = ['ข้อมูลครู', 'ข้อมูลรายวิชา', 'การตั้งค่า', 'ล๊อคตาราง', 'กำหนดตารางสอน', 'ผลการประมวลตารางสอน', 'คำสั่งสอน', 'กำหนดสิทธิ'];
            allSheets.forEach(sheet => getCachedData(sheet, false, true)); // true = isBackground
        }

        // ==========================================
        // AUTHENTICATION
        // ==========================================
        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const remember = document.getElementById('rememberMe').checked;

            const data = await callAPI('login', { username: user, password: pass });
            
            if (data && data.authenticated) {
                currentUser = data.name;
                currentRole = data.role; 
                
                if (remember) {
                    localStorage.setItem('ns_timetable_user', user);
                    localStorage.setItem('ns_timetable_pass', pass);
                } else {
                    localStorage.removeItem('ns_timetable_user');
                    localStorage.removeItem('ns_timetable_pass');
                }

                document.getElementById('displayUser').innerText = currentUser;
                document.getElementById('displayRole').innerText = currentRole === 'admin' ? 'ผู้ดูแลระบบ' : 'ครูผู้สอน';
                
                document.getElementById('page-login').style.display = 'none';
                document.getElementById('page-main').style.display = 'flex';

                buildMenu();
                
                // --- พลังของเวอร์ชันนี้: โหลดข้อมูลล่วงหน้าแบบแอบทำหลังบ้าน ---
                prefetchAllData();
                // โหลดโลโก้, ชื่อโรงเรียน และแผนการเรียนที่ตั้งค่าไว้มาแสดงผล
                getCachedData('การตั้งค่า').then(settingsArr => {
                    if(settingsArr.length > 0) {
                        let settings = JSON.parse(settingsArr[0]['JSON_DATA'] || '{}');
                        if(settings.logo) updateAllLogos(settings.logo);
                        if(settings.school_name) updateAllSchoolNames(settings.school_name);
                        if(settings.learning_plans) {
                            learningPlans = extractPlanNames(settings.learning_plans);
                        }
                    }
                });

                loadPage(currentRole === 'admin' ? 'dashboard' : 'create_table');
            } else {
                Swal.fire('ล้มเหลว', 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', 'error');
            }
        }

        function logout() {
            currentUser = null;
            currentRole = null;
            cachePromises = {}; // เคลียร์ความจำทิ้งเมื่อออกจากระบบ
            document.getElementById('page-main').style.display = 'none';
            document.getElementById('page-login').style.display = 'flex';
        }

        // ==========================================
        // NAVIGATION & RENDERING
        // ==========================================
        const pages = {
            'dashboard': { title: 'หน้าแรก', icon: 'fa-home', roles: ['admin', 'user'], render: renderDashboard },
            'profile': { title: 'ตั้งค่าบัญชี', icon: 'fa-user-cog', roles: ['admin', 'user'], render: renderProfile },
            'teachers': { title: 'จัดการข้อมูลครู', icon: 'fa-chalkboard-teacher', roles: ['admin'], render: renderTeachers },
            'courses': { title: 'จัดการข้อมูลรายวิชา', icon: 'fa-book', roles: ['admin'], render: renderCourses },
            'settings': { title: 'ตั้งค่ารูปแบบตาราง', icon: 'fa-cogs', roles: ['admin'], render: renderSettings },
            'permissions': { title: 'กำหนดสิทธิจัดตาราง', icon: 'fa-user-shield', roles: ['admin'], render: renderPermissions },
            'lock': { title: 'ล๊อครายวิชา', icon: 'fa-lock', roles: ['admin'], render: renderLock },
            'create_table': { title: 'จัดทำตารางสอน', icon: 'fa-calendar-plus', roles: ['admin', 'user'], render: renderCreateTable },
            'process': { title: 'ประมวลผลตารางสอน', icon: 'fa-microchip', roles: ['admin'], render: renderProcess },
            'download': { title: 'ดาวน์โหลดตารางสอน', icon: 'fa-download', roles: ['admin', 'user'], render: renderDownload },
            'orders': { title: 'ประมวลคำสั่งสอน', icon: 'fa-file-signature', roles: ['admin'], render: renderOrders }
        };

        function buildMenu() {
            const menu = document.getElementById('navMenu');
            menu.innerHTML = '';
            for (const [key, page] of Object.entries(pages)) {
                if (page.roles.includes(currentRole)) {
                    // ปรับ href เป็น javascript:void(0) เพื่อป้องกันเบราว์เซอร์รีเฟรชหรือกระตุกหน้าจอ
                    menu.innerHTML += `
                        <li>
                            <a href="javascript:void(0)" onclick="loadPage('${key}')" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gold hover:text-navy transition-colors nav-link" data-page="${key}">
                                <i class="fas ${page.icon} w-6"></i> ${page.title}
                            </a>
                        </li>
                    `;
                }
            }
        }

        async function loadPage(pageKey) {
            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.remove('bg-gold', 'text-navy', 'border-r-4', 'border-white');
                if(el.dataset.page === pageKey) el.classList.add('bg-gold', 'text-navy', 'border-r-4', 'border-white');
            });

            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `<h2 class="text-2xl font-bold text-navy mb-6 border-b-2 border-gold pb-2">${pages[pageKey].title}</h2>`;
            
            const div = document.createElement('div');
            div.id = 'pageContent';
            contentArea.appendChild(div);

            // แสดง Loader ครอบไว้ตอนเรนเดอร์ ถ้ามีแคชแล้วมันจะหายไปทันทีแบบพริบตาเดียว!
            showLoading(true);
            try {
                await pages[pageKey].render(div);
            } catch (e) {
                console.error("Render Error:", e);
            }
            showLoading(false);
            
            // ปิด Sidebar อัตโนมัติเมื่อเลือกเมนู (บนมือถือ)
            if(window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if(sidebar && !sidebar.classList.contains('-translate-x-full')) {
                    window.toggleSidebar();
                }
            }
        }

        function renderDashboard(container) {

                            <tr><th class="p-2 border">รหัส</th><th class="p-2 border">ชื่อวิชา</th><th class="p-2 border">กิต</th><th class="p-2 border">ครู</th><th class="p-2 border">ชั้น</th><th class="p-2 border">แผน</th><th class="p-2 border">กลุ่มสาระ</th><th class="p-2 border text-center">จัดการ</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- ป๊อปอัพฟอร์มข้อมูลรายวิชา -->
                <div id="courseModal" class="fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center hidden">
                    <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl overflow-hidden transform transition-all max-h-[90vh] flex flex-col">
                        <div class="bg-navy text-white px-6 py-4 flex justify-between items-center shrink-0">
                            <h3 class="font-bold text-lg" id="courseModalTitle">เพิ่มข้อมูลรายวิชา</h3>
                            <button onclick="closeCourseModal()" class="text-gray-300 hover:text-white focus:outline-none">
                                <i class="fas fa-times text-xl"></i>
                            </button>
                        </div>
                        <div class="p-6 overflow-y-auto">
                            <form id="courseForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <input type="hidden" id="c_id">
                                <!-- แถวที่ 1 -->
                                <div><label class="block font-medium mb-1">รหัสวิชา</label><input type="text" id="c_code" required class="w-full border border-gray-300 rounded p-2 focus:border-gold outline-none"></div>
                                <div><label class="block font-medium mb-1">ชื่อวิชา</label><input type="text" id="c_name" required class="w-full border border-gray-300 rounded p-2 focus:border-gold outline-none"></div>
                                <!-- แถวที่ 2 -->
                                <div><label class="block font-medium mb-1">หน่วยกิต</label><input type="number" step="0.5" id="c_credit" required class="w-full border border-gray-300 rounded p-2 focus:border-gold outline-none"></div>
                                <div><label class="block font-medium mb-1">ชื่อครูผู้สอน</label><select id="c_teacher" required class="w-full border border-gray-300 rounded p-2 focus:border-gold outline-none"><option value="">เลือก...</option>${teacherOptions}</select></div>
                                <!-- แถวที่ 3 -->
                                <div><label class="block font-medium mb-1">ภาคเรียนที่</label><select id="c_term" required class="w-full border border-gray-300 rounded p-2 focus:border-gold outline-none"><option value="1">1</option><option value="2">2</option></select></div>
                                <div><label class="block font-medium mb-1">กลุ่มสาระ</label><select id="c_group" required class="w-full border border-gray-300 rounded p-2 focus:border-gold outline-none"><option value="">เลือก...</option>${groupOptions}</select></div>
                                
                                <!-- แถวที่ 4 (เต็มความกว้าง) -->
                                <div class="md:col-span-2 bg-gray-50 p-4 rounded border border-gray-200">
                                    <label class="block font-medium mb-2">ชั้นที่เปิดสอน <span class="text-xs text-gray-500 font-normal">(เลือกระดับชั้น ติ๊กห้องที่ต้องการ แล้วกดเพิ่ม)</span></label>
                                    <div class="flex flex-col gap-3 mb-3">
                                        <div class="flex items-center gap-2 flex-wrap">
                                            <span class="font-medium text-gray-700">ระดับชั้น:</span>
                                            <select id="c_grade_sel" class="border border-gray-300 rounded p-1.5 text-sm focus:border-gold outline-none w-24">
                                                ${[1,2,3,4,5,6].map(i => `<option value="${i}">ม.${i}</option>`).join('')}
                                            </select>
                                            <button type="button" onclick="addCourseLevel()" class="bg-green-600 text-white px-3 py-1.5 rounded hover:bg-green-700 shadow-sm ml-auto text-sm whitespace-nowrap" title="เพิ่ม"><i class="fas fa-plus"></i> เพิ่มที่เลือก</button>
                                            <button type="button" onclick="clearCourseLevel()" class="bg-red-500 text-white px-3 py-1.5 rounded hover:bg-red-600 shadow-sm text-sm whitespace-nowrap" title="ล้าง"><i class="fas fa-trash"></i> ล้างข้อมูล</button>
                                        </div>
                                        <div class="flex flex-wrap gap-2 items-center p-2 bg-white border border-gray-300 rounded">
                                            <span class="text-sm font-medium text-gray-600 mr-1">ห้อง:</span>
                                            ${Array.from({length:12},(_,i)=>`
                                                <label class="flex items-center space-x-1 cursor-pointer bg-gray-100 px-2 py-1 rounded hover:bg-gray-200 transition border border-transparent hover:border-gray-300">
                                                    <input type="checkbox" value="${i+1}" class="room-chk w-4 h-4 text-gold border-gray-300 rounded focus:ring-gold">
                                                    <span class="text-sm text-navy">/${i+1}</span>
                                                </label>
                                            `).join('')}
                                        </div>
                                    </div>
                                    <input type="text" id="c_level" required class="w-full border border-gray-300 rounded p-2 text-sm focus:border-gold outline-none" placeholder="เช่น ม.1/1, ม.1/2">
                                </div>

                                <!-- แถวที่ 5 (เต็มความกว้าง) -->
                                <div class="md:col-span-2 bg-gray-50 p-4 rounded border border-gray-200">
                                    <label class="block font-medium mb-2">แผนการเรียน <span class="text-xs text-gray-500 font-normal">(เลือกแล้วกดเพิ่ม หรือพิมพ์เองโดยคั่นด้วยลูกน้ำ)</span></label>
                                    <div class="flex gap-2 mb-2">
                                        <select id="c_plan_sel" class="border border-gray-300 rounded p-2 text-sm flex-1 focus:border-gold outline-none">
                                            <option value="">-- เลือกแผนการเรียน --</option>
                                            ${planOptions}
                                        </select>
                                        <button type="button" onclick="addCoursePlan()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 shadow-sm whitespace-nowrap" title="เพิ่ม"><i class="fas fa-plus"></i> เพิ่ม</button>
                                        <button type="button" onclick="clearCoursePlan()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 shadow-sm whitespace-nowrap" title="ล้าง"><i class="fas fa-trash"></i></button>
                                    </div>
                                    <input type="text" id="c_plan" required class="w-full border border-gray-300 rounded p-2 text-sm focus:border-gold outline-none" placeholder="เช่น วิทย์-คณิต, ทั่วไป">
                                </div>
                                
                                <div class="md:col-span-2 mt-4 flex justify-end space-x-2 border-t pt-4">
                                    <button type="button" onclick="closeCourseModal()" class="bg-gray-200 text-gray-800 px-6 py-2 rounded hover:bg-gray-300 transition">ยกเลิก</button>
                                    <button type="submit" id="c_btn_save" class="bg-navy text-white px-8 py-2 rounded hover:bg-opacity-90 transition shadow-md">บันทึก</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            `;

            // กำหนด index ดั้งเดิมให้กับข้อมูลเพื่อใช้สำหรับ Background Sync
            window.courseDataList = courses.map((c, index) => ({...c, originalIndex: index}));
            window.filteredCourseList = window.courseDataList;
            
            const tbody = container.querySelector('tbody');
            
            window.renderCourseRows = (data) => {
                tbody.innerHTML = data.map((c) => {
                    let origIdx = c.originalIndex;
                    let pendingClass = c.isPending ? 'opacity-50 bg-gray-100' : 'hover:bg-gray-50';
                    return `
                    <tr class="border-b ${pendingClass} transition-colors">
                        <td class="p-2 border">${c['รหัสวิชา']}</td><td class="p-2 border">${c['ชื่อวิชา']}</td><td class="p-2 border">${c['หน่วยกิต']}</td>
                        <td class="p-2 border">${c['ชื่อครูผู้สอน']}</td><td class="p-2 border">${c['ชั้นที่เปิดสอน']}</td><td class="p-2 border">${c['แผนการเรียน']}</td><td class="p-2 border">${c['กลุ่มสาระการเรียนรู้']}</td>
                        <td class="p-2 border text-center whitespace-nowrap">
                            ${c.isPending ? 
                                `<i class="fas fa-spinner fa-spin text-blue-600"></i>` :
                                `<button onclick='editCourse(${origIdx})' class="text-blue-600 hover:text-blue-800 mx-1"><i class="fas fa-edit"></i></button>
                                 <button onclick='deleteCourseRow(${origIdx})' class="text-red-600 hover:text-red-800 mx-1"><i class="fas fa-trash"></i></button>`
                            }
                        </td>
                    </tr>
                    `;
                }).join('');
            };
            window.renderCourseRows(window.filteredCourseList);

            window.updateCourseSyncStatus = () => {
                const statusEl = document.getElementById('courseSyncStatus');
                if(!statusEl) return;
                if(window.pendingCourseSync > 0) {
                    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin text-blue-500"></i> กำลังบันทึก (' + window.pendingCourseSync + ')...';
                    statusEl.classList.remove('text-green-600');
                    statusEl.classList.add('text-blue-600');
                } else {
                    statusEl.innerHTML = '<i class="fas fa-check-circle text-green-500"></i> ข้อมูลล่าสุด';
                    statusEl.classList.remove('text-blue-600');
                    statusEl.classList.add('text-green-600');
                }
            };

            window.openCourseModal = () => {
                document.getElementById('courseForm').reset();
                document.getElementById('c_id').value = '';
                document.querySelectorAll('.room-chk').forEach(chk => chk.checked = false); // เคลียร์ Checkbox
                document.getElementById('courseModalTitle').innerText = 'เพิ่มข้อมูลรายวิชา';
                document.getElementById('courseModal').classList.remove('hidden');
            };

            window.closeCourseModal = () => {
                document.getElementById('courseModal').classList.add('hidden');
            };

            window.refreshCourseTable = async () => {
                showLoading(true);
                let newCourses = await getCachedData('ข้อมูลรายวิชา', true);
                window.courseDataList = newCourses.map((c, index) => ({...c, originalIndex: index}));
                window.filterCourseTable();
                showLoading(false);
                Swal.fire({icon: 'success', title: 'รีเฟรชสำเร็จ', text: 'อัปเดตข้อมูลรายวิชาจากระบบแล้ว', timer: 1500, showConfirmButton: false});
            };

            window.addCourseLevel = () => {
                const grade = document.getElementById('c_grade_sel').value;
                const checkboxes = document.querySelectorAll('.room-chk:checked');
                
                if(checkboxes.length === 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาติ๊กเลือกห้องอย่างน้อย 1 ห้อง', 'warning');
                    return;
                }
                
                let newRooms = [];
                checkboxes.forEach(chk => {
                    newRooms.push(`ม.${grade}/${chk.value}`);
                });

                const input = document.getElementById('c_level');
                let currentRooms = input.value.split(',').map(r => r.trim()).filter(r => r);
                
                newRooms.forEach(r => {
                    if(!currentRooms.includes(r)) currentRooms.push(r);
                });
                
                input.value = currentRooms.join(', ');
                
                // เอาเครื่องหมายติ๊กถูกออกหลังจากกดเพิ่มแล้ว
                document.querySelectorAll('.room-chk').forEach(chk => chk.checked = false);
            };

            window.clearCourseLevel = () => {
                document.getElementById('c_level').value = '';
                document.querySelectorAll('.room-chk').forEach(chk => chk.checked = false);
            };

            window.addCoursePlan = () => {
                const plan = document.getElementById('c_plan_sel').value;
                if (!plan) return;
                const input = document.getElementById('c_plan');
                let currentPlans = input.value.split(',').map(r => r.trim()).filter(r => r);
                if(!currentPlans.includes(plan)) {
                    currentPlans.push(plan);
                }
                input.value = currentPlans.join(', ');
                document.getElementById('c_plan_sel').value = '';
            };

            window.clearCoursePlan = () => {
                document.getElementById('c_plan').value = '';
            };

            const processCourseSave = (data, rowId) => {
                // Optimistic UI Update
                if (rowId !== null) {
                    let index = window.courseDataList.findIndex(item => item.originalIndex === rowId);
                    if(index !== -1) window.courseDataList[index] = { ...data, originalIndex: rowId, isPending: true };
                } else {
                    window.courseDataList.push({ ...data, originalIndex: 'temp_' + Date.now(), isPending: true });
                }
                window.filterCourseTable();

                window.pendingCourseSync++;
                window.updateCourseSyncStatus();

                // Background API Call (no loader)
                callAPI('saveData', { sheetName: 'ข้อมูลรายวิชา', rowId: rowId, data: data }, true)
                .then(async (res) => {
                    window.pendingCourseSync--;
                    if(window.pendingCourseSync === 0) {
                        let newData = await getCachedData('ข้อมูลรายวิชา', true, true);
                        window.courseDataList = newData.map((c, index) => ({...c, originalIndex: index}));
                        window.filterCourseTable();
                    }
                    window.updateCourseSyncStatus();
                }).catch(err => {
                    window.pendingCourseSync--;
                    window.updateCourseSyncStatus();
                    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                    Toast.fire({ icon: 'error', title: 'บันทึกข้อมูลรายวิชาล้มเหลว' });
                });
            };

            window.deleteCourseRow = async (rowIndex) => {
                if(await Swal.fire({title: 'ยืนยันการลบ?', text: "คุณไม่สามารถกู้คืนได้!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ลบเลย'}).then(r => r.isConfirmed)){
                    // Optimistic UI update
                    window.courseDataList = window.courseDataList.filter(item => item.originalIndex !== rowIndex);
                    window.filterCourseTable();

                    window.pendingCourseSync++;
                    window.updateCourseSyncStatus();

                    callAPI('deleteData', { sheetName: 'ข้อมูลรายวิชา', rowIndex: rowIndex }, true)
                    .then(async (res) => {
                        window.pendingCourseSync--;
                        if(window.pendingCourseSync === 0) {
                            let newData = await getCachedData('ข้อมูลรายวิชา', true, true);
                            window.courseDataList = newData.map((c, index) => ({...c, originalIndex: index}));
                            window.filterCourseTable();
                        }
                        window.updateCourseSyncStatus();
                    }).catch(err => {
                        window.pendingCourseSync--;
                        window.updateCourseSyncStatus();
                        const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                        Toast.fire({ icon: 'error', title: 'ลบข้อมูลล้มเหลว' });
                    });
                }
            };

            document.getElementById('courseForm').onsubmit = async (e) => {
                e.preventDefault();
                const rowIdStr = document.getElementById('c_id').value;
                const rowId = rowIdStr !== "" ? parseInt(rowIdStr) : null;
                const data = {
                    'รหัสวิชา': document.getElementById('c_code').value, 'ชื่อวิชา': document.getElementById('c_name').value,
                    'หน่วยกิต': document.getElementById('c_credit').value, 'ชื่อครูผู้สอน': document.getElementById('c_teacher').value,
                    'ชั้นที่เปิดสอน': document.getElementById('c_level').value, 'แผนการเรียน': document.getElementById('c_plan').value,
                    'ภาคเรียนที่': document.getElementById('c_term').value, 'กลุ่มสาระการเรียนรู้': document.getElementById('c_group').value
                };
                
                closeCourseModal();
                processCourseSave(data, rowId);
            };

            window.editCourse = (origIdx) => {
                let data = window.courseDataList.find(c => c.originalIndex === origIdx);
                if(!data) return;
                
                document.getElementById('c_id').value = origIdx;
                document.getElementById('c_code').value = String(data['รหัสวิชา'] || '').trim();
                document.getElementById('c_name').value = String(data['ชื่อวิชา'] || '').trim();
                document.getElementById('c_credit').value = String(data['หน่วยกิต'] || '').trim();
                
                // ดึงชื่อครูผู้สอน และเลือก Dropdown ให้ตรงกัน
                let teacherName = String(data['ชื่อครูผู้สอน'] || '').trim();
                let teacherSelect = document.getElementById('c_teacher');
                teacherSelect.value = teacherName;
                
                // หากชื่อครูไม่มีในลิสต์ตัวเลือก (อาจถูกแก้ไขหรือลบไปแล้ว) ให้เพิ่มเข้าไปชั่วคราวเพื่อให้ฟอร์มแสดงผลครบ
                if (teacherSelect.value !== teacherName && teacherName !== '') {
                    teacherSelect.add(new Option(teacherName, teacherName));
                    teacherSelect.value = teacherName;
                }
                
                document.getElementById('c_term').value = String(data['ภาคเรียนที่'] || '').trim();
                document.getElementById('c_group').value = String(data['กลุ่มสาระการเรียนรู้'] || '').trim();
                document.getElementById('c_level').value = String(data['ชั้นที่เปิดสอน'] || '').trim();
                document.getElementById('c_plan').value = String(data['แผนการเรียน'] || '').trim();
                
                document.querySelectorAll('.room-chk').forEach(chk => chk.checked = false); // เคลียร์ Checkbox
                document.getElementById('courseModalTitle').innerText = 'แก้ไขข้อมูลรายวิชา';
                document.getElementById('courseModal').classList.remove('hidden');
            };

            window.resetCourseForm = () => { document.getElementById('courseForm').reset(); document.getElementById('c_id').value = ''; document.getElementById('c_btn_save').innerText = 'บันทึก'; document.getElementById('c_btn_cancel').classList.add('hidden'); }
            
            window.filterCourseTable = () => {
                const filterGroup = document.getElementById('filter_c_group').value;
                const filterGrade = document.getElementById('filter_c_grade').value;
                const filterTerm = document.getElementById('filter_c_term').value;
                
                window.filteredCourseList = window.courseDataList.filter(c => {
                    let matchGroup = filterGroup === 'all' || c['กลุ่มสาระการเรียนรู้'] === filterGroup;
                    let matchTerm = filterTerm === 'all' || c['ภาคเรียนที่'] == filterTerm;
                    let matchGrade = true;
                    if (filterGrade !== 'all') {
                        let cLevels = (c['ชั้นที่เปิดสอน'] || '').split(',').map(r => r.trim());
                        // เช็คว่าห้องเรียนขึ้นต้นด้วยระดับชั้นที่เลือกหรือไม่ (เช่น เลือก ม.1 ก็จะเจอ ม.1/1, ม.1/2)
                        matchGrade = cLevels.some(l => l.startsWith(filterGrade));
                    }
                    return matchGroup && matchGrade && matchTerm;
                });
                window.renderCourseRows(window.filteredCourseList);
            }

            // --- ฟังก์ชันดาวน์โหลดฟอร์ม CSV ---
            window.downloadCSVTemplate = () => {
                const headers = ['รหัสวิชา', 'ชื่อวิชา', 'หน่วยกิต', 'ชื่อครูผู้สอน', 'ชั้นที่เปิดสอน', 'แผนการเรียน', 'ภาคเรียนที่', 'กลุ่มสาระการเรียนรู้'];
                // ใส่ \uFEFF เพื่อให้ Excel อ่านภาษาไทย (UTF-8) ได้ถูกต้อง
                const csvContent = "\uFEFF" + headers.join(',') + "\n";
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", "Course_Template_นราสิกขาลัย.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // --- ฟังก์ชันนำเข้าข้อมูล CSV ---
            window.handleCSVUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    // แยกบรรทัดและกรองบรรทัดว่างทิ้ง
                    const rows = text.split('\n').filter(row => row.trim().length > 0);
                    if (rows.length <= 1) {
                        Swal.fire('ข้อผิดพลาด', 'ไฟล์ CSV ไม่มีข้อมูล', 'error');
                        event.target.value = '';
                        return;
                    }

                    // ดึงหัวคอลัมน์ (ตัดเครื่องหมายคำพูดและช่องว่าง)
                    const headers = rows[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
                    const expectedHeader = 'รหัสวิชา';

                    // ตรวจสอบความถูกต้องเบื้องต้น
                    if (headers[0] !== expectedHeader) {
                        Swal.fire('ข้อผิดพลาด', 'รูปแบบคอลัมน์ไม่ถูกต้อง กรุณาดาวน์โหลดฟอร์ม CSV จากระบบเพื่อใช้งาน', 'error');
                        event.target.value = '';
                        return;
                    }

                    const dataToUpload = [];
                    // วนลูปอ่านข้อมูลทีละบรรทัด (เริ่มที่บรรทัด 1 เพราะบรรทัด 0 คือหัวข้อ)
                    for (let i = 1; i < rows.length; i++) {
                        // แยกข้อมูลด้วยลูกน้ำ (รองรับกรณีข้อมูลในช่องมีเครื่องหมายคำพูดครอบ)
                        const values = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                        if (values.length > 1 && values[0] !== "") {
                            let obj = {};
                            headers.forEach((h, index) => {
                                obj[h] = values[index] || "";
                            });
                            dataToUpload.push(obj);
                        }
                    }

                    if(dataToUpload.length === 0) {
                         Swal.fire('แจ้งเตือน', 'ไม่พบข้อมูลที่สมบูรณ์ในไฟล์', 'warning');
                         event.target.value = '';
                         return;
                    }

                    // แสดงหน้าจอโหลดและนับจำนวน
                    Swal.fire({
                        title: 'กำลังนำเข้าข้อมูล...',

                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/png', 0.8);
                        document.getElementById('s_logo_preview').src = dataUrl;
                        document.getElementById('s_logo_base64').value = dataUrl;
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            });

            window.addRoomsToTextarea = () => {
                const grade = document.getElementById('s_grade_level').value;
                const count = parseInt(document.getElementById('s_room_count').value);
                let newRooms = [];
                for (let i = 1; i <= count; i++) {
                    newRooms.push(`ม.${grade}/${i}`);
                }
                
                const textarea = document.getElementById('s_rooms');
                let currentRooms = textarea.value.split(',').map(r => r.trim()).filter(r => r);
                
                // นำห้องใหม่ไปต่อท้าย โดยเช็คไม่ให้ซ้ำกับของเดิม
                newRooms.forEach(r => {
                    if(!currentRooms.includes(r)) currentRooms.push(r);
                });
                
                textarea.value = currentRooms.join(',');

            window.addTeachingRoom = () => {
                const input = document.getElementById('s_teaching_room_input');

                const textarea = document.getElementById('s_teaching_rooms');
                let currentRooms = textarea.value.split(',').map(r => r.trim()).filter(r => r);

                    currentRooms.push(roomName);

                input.value = ''; // clear input

                if (!planName) {
                    Swal.fire('แจ้งเตือน', 'กรุณาระบุชื่อแผนการเรียน', 'warning');
                    return;
                }

                const gradeChks = document.querySelectorAll('.plan-grade-chk:checked');
                const roomChks = document.querySelectorAll('.plan-room-chk:checked');
                
                if (gradeChks.length === 0 && roomChks.length > 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาเลือกระดับชั้นด้วย', 'warning');
                    return;
                }

                let roomsArr = [];
                if (gradeChks.length > 0 && roomChks.length === 0) {
                    // เลือกระดับชั้น แต่ไม่เลือกห้อง
                    gradeChks.forEach(g => roomsArr.push(`ม.${g.value}`));
                } else {
                    // จับคู่ชั้นกับห้องที่เลือก
                    gradeChks.forEach(g => {
                        roomChks.forEach(r => {
                            roomsArr.push(`ม.${g.value}/${r.value}`);

                    });
                }

                let planRoomsStr = roomsArr.join(', ');

                const textarea = document.getElementById('s_learning_plans');
                let newEntry = planName + (planRoomsStr ? ' : ' + planRoomsStr : '');

                if (textarea.value.trim() === '') {
                    textarea.value = newEntry;
                } else {
                    textarea.value += '\n' + newEntry;
                }

                // รีเซ็ตช่องกรอกและ Checkbox
                document.getElementById('s_learning_plan_input').value = '';
                document.querySelectorAll('.plan-grade-chk').forEach(c => c.checked = false);

                let res = await callAPI('saveData', { sheetName: 'การตั้งค่า', rowId: 0, data: { 'JSON_DATA': JSON.stringify(data) }, isSettings: true });

            `;

            window.switchLockTab = (tab) => {
                if(tab === 'class') {
                    if(document.getElementById('tab_lock_class')) {
                        document.getElementById('tab_lock_class').classList.add('text-navy', 'font-bold', 'border-b-2', 'border-navy');
                        document.getElementById('tab_lock_class').classList.remove('text-gray-500');
                        document.getElementById('tab_lock_teacher').classList.remove('text-navy', 'font-bold', 'border-b-2', 'border-navy');
                        document.getElementById('tab_lock_teacher').classList.add('text-gray-500');
                    }
                    
                    document.getElementById('schForm').classList.remove('hidden');
                    document.getElementById('schForm').classList.add('flex');
                    document.getElementById('schTeacherForm').classList.add('hidden');
                    document.getElementById('schTeacherForm').classList.remove('flex');
                } else {
                    if(document.getElementById('tab_lock_teacher')) {
                        document.getElementById('tab_lock_teacher').classList.add('text-navy', 'font-bold', 'border-b-2', 'border-navy');
                        document.getElementById('tab_lock_teacher').classList.remove('text-gray-500');
                        document.getElementById('tab_lock_class').classList.remove('text-navy', 'font-bold', 'border-b-2', 'border-navy');
                        document.getElementById('tab_lock_class').classList.add('text-gray-500');
                    }
                    
                    document.getElementById('schTeacherForm').classList.remove('hidden');
                    document.getElementById('schTeacherForm').classList.add('flex');
                    document.getElementById('schForm').classList.add('hidden');
                    document.getElementById('schForm').classList.remove('flex');
                }
            };

            window.openSchBaseModal = () => {
                window.resetSchForm();
                window.resetTeacherSchForm();
                document.getElementById('schBaseModalTitle').innerText = 'เพิ่มรายการใหม่';
                
                // ถ้าระบบมี tab ให้ซ่อนปุ่มลบ เปิด tab แรก
                if(isLockMode) {
                    window.switchLockTab('class');
                    document.getElementById('tab_lock_class').classList.remove('hidden');
                    document.getElementById('tab_lock_teacher').classList.remove('hidden');
                }
                
                document.getElementById('schBaseModal').classList.remove('hidden');
            };

            window.closeSchBaseModal = () => {
                document.getElementById('schBaseModal').classList.add('hidden');
            };

            window.courseLookup = courses;
            window.autoFillCourse = () => {
                let code = document.getElementById('sch_code').value;
                let c = window.courseLookup.find(x => x['รหัสวิชา'] === code);
                if(c) {
                    document.getElementById('sch_name').value = c['ชื่อวิชา'];
                    document.getElementById('sch_teacher').value = c['ชื่อครูผู้สอน'];
                } else {
                    document.getElementById('sch_name').value = '';
                    document.getElementById('sch_teacher').value = '';
                }
            }

            // ฟังก์ชันอัปเดตตัวเลือก รหัสวิชา และ สถานที่เรียน ในฟอร์มล๊อควิชาเรียน
            window.updateMainFormDropdowns = (existingData = null) => {
                const room = document.getElementById('sch_room').value;
                const plan = document.getElementById('sch_plan').value;
                const dayChks = Array.from(document.querySelectorAll('.sch-day-chk:checked')).map(c => c.value);
                const periodChks = Array.from(document.querySelectorAll('.sch-period-chk:checked')).map(c => parseInt(c.value));
                const codeSelect = document.getElementById('sch_code');

                // ถ้าระบุข้อมูลไม่ครบ ให้ปิดการใช้งานตัวเลือก
                if (!room || !plan || dayChks.length === 0 || periodChks.length === 0) {
                    codeSelect.innerHTML = '<option value="">-- กรุณาเลือกห้อง, แผน, วัน และคาบก่อน --</option>';
                    document.getElementById('sch_location').value = '';
                    window.baseLocationHtml = '<div class="col-span-full text-center text-gray-500 py-8 flex flex-col items-center"><i class="fas fa-exclamation-circle text-4xl text-gray-300 mb-3"></i><p>กรุณาระบุข้อมูล ระดับชั้น, แผน, วัน และ คาบเรียน ให้ครบถ้วนก่อน</p></div>';
                    if(!existingData) {
                        document.getElementById('sch_name').value = '';
                        document.getElementById('sch_teacher').value = '';
                    }
                    return;
                }

                // 1. ประมวลผลรหัสวิชา
                const roomData = window.scheduleBaseData.filter(d => d['ห้องเรียน'] === room && d['แผนการเรียน'] === plan);
                let scheduledCounts = {};
                roomData.forEach(slot => {
                    let code = String(slot['รหัสวิชา'] || '').trim();
                    if (existingData && slot.originalIndex === existingData.originalIndex) return; // ไม่นับตัวเองเวลาแก้ไข
                    if (!scheduledCounts[code]) scheduledCounts[code] = 0;
                    scheduledCounts[code]++;
                });

                let targetCourses = window.courseLookup.filter(c => {
                    let cRooms = (c['ชั้นที่เปิดสอน'] || '').split(',').map(r => r.trim()).filter(r => r);
                    let cPlans = (c['แผนการเรียน'] || '').split(',').map(p => p.trim()).filter(p => p);
                    let cTerm = String(c['ภาคเรียนที่'] || '').trim();

                    let matchPlan = cPlans.includes(plan);
                    let matchRoom = cRooms.includes(room);
                    let matchTerm = cTerm === String(window.schCurrentTerm);
                    let isRoomInPlanSettings = window.schPlanMappings[plan] && window.schPlanMappings[plan].includes(room);
                    
                    if (!matchTerm) return false;

                    if (cRooms.length > 0) return matchPlan && matchRoom;
                    else if (Object.keys(window.schPlanMappings).length > 0) return matchPlan && isRoomInPlanSettings;
                    else return matchPlan;
                });

                let busyTeachers = new Set();
                window.scheduleBaseData.forEach(slot => {
                    if (dayChks.includes(slot['วัน']) && periodChks.includes(parseInt(slot['คาบที่']))) {
                        if (existingData && slot.originalIndex === existingData.originalIndex) return;
                        if (slot['ชื่อครูผู้สอน']) busyTeachers.add(String(slot['ชื่อครูผู้สอน']).trim());
                    }
                });

                let optionsHtml = '<option value="">-- เลือกรหัสวิชา --</option>';
                targetCourses.forEach(c => {
                    let code = String(c['รหัสวิชา'] || '').trim();
                    let name = String(c['ชื่อวิชา'] || '').trim();
                    let teacher = String(c['ชื่อครูผู้สอน'] || '').trim();
                    let credit = parseFloat(c['หน่วยกิต']) || 0;
                    let required = credit * 2; 
                    let scheduled = scheduledCounts[code] || 0;
                    let remaining = required - scheduled;
                    
                    let isBusy = busyTeachers.has(teacher);
                    let isEditingThis = existingData && existingData['รหัสวิชา'] === code;

                    if (remaining > 0 || isEditingThis) {
                        if (isBusy && !isEditingThis) {
                            optionsHtml += `<option value="${code}" disabled class="text-red-500">${code} - ${name} (ครูติดสอน)</option>`;
                        } else {
                            optionsHtml += `<option value="${code}">${code} - ${name} (เหลือ ${remaining} คาบ)</option>`;
                        }
                    }
                });
                codeSelect.innerHTML = optionsHtml;

                // 2. ประมวลผลสถานที่เรียน (สร้างเป็น Grid HTML เก็บไว้ในตัวแปร)
                let busyLocations = new Set();
                window.scheduleBaseData.forEach(slot => {
                    if (dayChks.includes(slot['วัน']) && periodChks.includes(parseInt(slot['คาบที่']))) {
                        if (existingData && slot.originalIndex === existingData.originalIndex) return;
                        let loc = String(slot['สถานที่เรียน'] || '').trim();
                        if (loc && loc !== '-') busyLocations.add(loc);
                    }
                });

                let allLocs = [...window.schTeachingRooms];
                if (existingData && existingData['สถานที่เรียน'] && existingData['สถานที่เรียน'] !== '-') {
                    if (!allLocs.includes(existingData['สถานที่เรียน'])) {
                        allLocs.push(existingData['สถานที่เรียน']);
                    }
                }

                let gridHtml = '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">';
                if (allLocs.length === 0) {
                    gridHtml = '<div class="col-span-full text-center py-6 text-gray-500">ไม่มีข้อมูลสถานที่เรียนในระบบ (กรุณาเพิ่มในการตั้งค่า)</div>';
                } else {
                    allLocs.forEach(loc => {
                        let isEditingThisLoc = existingData && existingData['สถานที่เรียน'] === loc;
                        if (busyLocations.has(loc) && !isEditingThisLoc) {
                            gridHtml += `
                                <button type="button" disabled class="p-3 bg-red-50 border border-red-200 rounded-xl text-red-400 font-medium cursor-not-allowed opacity-60 flex flex-col items-center justify-center min-h-[70px] shadow-sm relative overflow-hidden">
                                    <span class="line-through z-10">${loc}</span>
                                    <span class="text-[10px] mt-1 text-red-600 bg-red-100 px-2 py-0.5 rounded-full z-10">ไม่ว่าง</span>
                                    <div class="absolute inset-0 bg-red-200 opacity-20"></div>
                                </button>`;
                        } else {
                            gridHtml += `
                                <button type="button" onclick="selectLocation('${loc.replace(/'/g, "\\'")}')" class="p-3 bg-white border border-gray-300 hover:border-gold hover:bg-lightgold hover:bg-opacity-20 hover:text-navy rounded-xl text-gray-700 font-semibold transition duration-200 flex items-center justify-center min-h-[70px] shadow-sm hover:shadow-md">
                                    ${loc}
                                </button>`;
                        }
                    });
                }
                gridHtml += '</div>';
                window.baseLocationHtml = gridHtml;
                
                // คืนค่าถ้าเป็นการแก้ไข
                if (existingData) {
                    codeSelect.value = existingData['รหัสวิชา'] || '';
                    document.getElementById('sch_location').value = existingData['สถานที่เรียน'] || '';
                }
            };

            const tbody = document.getElementById('schTbody');
            window.renderSchRows = (data) => {
                tbody.innerHTML = data.map((d, idx) => {
                    // ไฮไลต์ให้แตกต่างถ้าเป็นกิจกรรมครู
                    let isActivity = d['รหัสวิชา'] === 'กิจกรรม' || d['ห้องเรียน'] === '-';
                    let trClass = d.isPending ? 'opacity-60 bg-gray-50' : (isActivity ? 'bg-purple-50 hover:bg-purple-100' : 'hover:bg-gray-50');
                    return `
                    <tr class="border-b ${trClass}">
                        <td class="p-2 border text-center">${d['ห้องเรียน']}</td><td class="p-2 border text-center">${d['แผนการเรียน'] || '-'}</td><td class="p-2 border text-center">${d['วัน']}</td>
                        <td class="p-2 border text-center">${d['คาบที่']}</td>
                        <td class="p-2 border font-bold ${isActivity ? 'text-purple-700' : ''}">${d['รหัสวิชา']}</td>
                        <td class="p-2 border ${isActivity ? 'text-purple-700 font-semibold' : ''}">${d['ชื่อวิชา']}</td>
                        <td class="p-2 border">${d['ชื่อครูผู้สอน']}</td><td class="p-2 border text-center">${d['สถานที่เรียน'] || '-'}</td>
                        <td class="p-2 border text-center whitespace-nowrap">
                            ${d.isPending ?
                                `<i class="fas fa-spinner fa-spin text-blue-600"></i>` :
                                `<button onclick='editSch(${JSON.stringify(d).replace(/"/g, '&quot;')}, ${d.originalIndex})' class="text-blue-600 hover:text-blue-800 mx-1"><i class="fas fa-edit"></i></button>
                                 <button onclick='deleteSchBaseRow("${sheetName}", ${d.originalIndex})' class="text-red-600 hover:text-red-800 mx-1"><i class="fas fa-trash"></i></button>`
                            }
                        </td>
                    </tr>
                `}).join('');
            };
            window.renderSchRows(window.scheduleBaseData);

            window.refreshSchBaseTable = async () => {
                showLoading(true);
                let newData = await getCachedData(sheetName, true);
                window.scheduleBaseData = newData.map((d, index) => ({...d, originalIndex: index}));
                window.renderSchRows(window.scheduleBaseData);
                if(!isLockMode) {
                    window.updateMainFormDropdowns();
                }
                showLoading(false);
                Swal.fire({icon: 'success', title: 'รีเฟรชสำเร็จ', text: 'อัปเดตรายการในตารางจากระบบแล้ว', timer: 1500, showConfirmButton: false});
            };

            window.updateSchBaseSyncStatus = () => {
                const statusEl = document.getElementById('schBaseSyncStatus');
                if(!statusEl) return;
                if(window.pendingSchBaseSync > 0) {
                    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin text-blue-500"></i> กำลังบันทึกข้อมูล (' + window.pendingSchBaseSync + ')...';
                    statusEl.classList.remove('text-green-600');
                    statusEl.classList.add('text-blue-600');
                } else {
                    statusEl.innerHTML = '<i class="fas fa-check-circle text-green-500"></i> ข้อมูลบันทึกแล้ว';
                    statusEl.classList.remove('text-blue-600');
                    statusEl.classList.add('text-green-600');
                }
            };

            // สร้างฟังก์ชันกลางเพื่อบันทึกข้อมูลเบื้องหลัง ลดการเขียนโค้ดซ้ำ
            const processSaveData = (data, rowId) => {
                if (rowId !== null) {
                    let index = window.scheduleBaseData.findIndex(item => item.originalIndex === rowId);
                    if(index !== -1) window.scheduleBaseData[index] = { ...data, originalIndex: rowId, isPending: true };
                } else {
                    window.scheduleBaseData.push({ ...data, originalIndex: 'temp_' + Date.now() + Math.random(), isPending: true });
                }
                window.renderSchRows(window.scheduleBaseData);

                window.pendingSchBaseSync++;
                window.updateSchBaseSyncStatus();

                callAPI('saveData', { sheetName: sheetName, rowId: rowId, data: data }, true)
                .then(async (res) => { 
                    if(isLockMode && rowId === null) {
                         // บันทึกลง "กำหนดตารางสอน" ควบคู่ไปด้วย
                         await callAPI('saveData', { sheetName: 'กำหนดตารางสอน', rowId: null, data: data }, true);
                         getCachedData('กำหนดตารางสอน', true, true); // สั่งอัปเดตแคชเงียบๆ
                    }
                    window.pendingSchBaseSync--;
                    if(window.pendingSchBaseSync === 0) {
                        let newData = await getCachedData(sheetName, true, true);
                        window.scheduleBaseData = newData.map((d, index) => ({...d, originalIndex: index}));
                        window.renderSchRows(window.scheduleBaseData);
                    }
                    window.updateSchBaseSyncStatus();
                }).catch(err => {
                    window.pendingSchBaseSync--;
                    window.updateSchBaseSyncStatus();
                    Swal.fire('ข้อผิดพลาด', 'การบันทึกข้อมูลล้มเหลว', 'error');
                });
            };

            document.getElementById('schForm').onsubmit = async (e) => {
                e.preventDefault();
                const rowIdStr = document.getElementById('sch_id').value;
                const rowId = rowIdStr !== "" ? parseInt(rowIdStr) : null;
                const dayChks = Array.from(document.querySelectorAll('.sch-day-chk:checked')).map(c => c.value);
                const periodChks = Array.from(document.querySelectorAll('.sch-period-chk:checked')).map(c => parseInt(c.value));
                const locationVal = document.getElementById('sch_location').value.trim();
                
                // ตรวจสอบความครบถ้วนของข้อมูล
                if (dayChks.length === 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาติ๊กเลือกวันอย่างน้อย 1 วัน', 'warning');
                    return;
                }
                if (periodChks.length === 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาติ๊กเลือกคาบเรียนอย่างน้อย 1 คาบ', 'warning');
                    return;
                }
                if (!document.getElementById('sch_code').value) {
                    Swal.fire('แจ้งเตือน', 'กรุณาเลือกรหัสวิชา', 'warning');
                    return;
                }

                if (locationVal) {
                    let currentRooms = (settings.teaching_rooms || '').split(',').map(r => r.trim()).filter(r => r);
                    if (!currentRooms.includes(locationVal)) {
                        currentRooms.push(locationVal);
                        settings.teaching_rooms = currentRooms.join(',');
                        // Update won't be immediate in the dropdown, but it's okay for background sync
                        callAPI('saveData', { sheetName: 'การตั้งค่า', rowId: 0, data: { 'JSON_DATA': JSON.stringify(settings) }, isSettings: true }, true);
                    }
                }

                window.closeSchBaseModal(); 

                let tempIdx = 0;
                // วนลูปบันทึกตามจำนวนวันและคาบที่เลือก
                dayChks.forEach(d => {
                    periodChks.forEach(p => {
                        const data = {
                            'ห้องเรียน': document.getElementById('sch_room').value, 'แผนการเรียน': document.getElementById('sch_plan').value,
                            'วัน': d, 'คาบที่': p,
                            'รหัสวิชา': document.getElementById('sch_code').value, 'ชื่อวิชา': document.getElementById('sch_name').value,
                            'ชื่อครูผู้สอน': document.getElementById('sch_teacher').value, 'สถานที่เรียน': locationVal,
                            'ประเภท': isLockMode ? 'ล็อค' : 'ปกติ',
                            'ผู้บันทึก': currentUser
                        };
                        // หากแก้ไข จะใช้ rowId เดิมอัปเดตคาบแรกที่เลือก ส่วนคาบอื่นๆ ให้บันทึกเป็นแถวใหม่ (rowId=null)
                        const currentRowId = (tempIdx === 0) ? rowId : null;
                        processSaveData(data, currentRowId);
                        tempIdx++;
                    });
                });
            };

            // การ Submit ของฟอร์มล๊อคกิจกรรมครู
            document.getElementById('schTeacherForm').onsubmit = async (e) => {
                e.preventDefault();
                const rowIdStr = document.getElementById('t_sch_id').value;
                const rowId = rowIdStr !== "" ? parseInt(rowIdStr) : null;
                const actVal = document.getElementById('t_sch_activity').value.trim();
                const dayChks = Array.from(document.querySelectorAll('.t-sch-day-chk:checked')).map(c => c.value);
                const periodChks = Array.from(document.querySelectorAll('.t-sch-period-chk:checked')).map(c => parseInt(c.value));
                
                if (dayChks.length === 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาติ๊กเลือกวันอย่างน้อย 1 วัน', 'warning');
                    return;
                }
                if (periodChks.length === 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาติ๊กเลือกคาบเรียนอย่างน้อย 1 คาบ', 'warning');
                    return;
                }

                if (actVal && !window.allActivities.includes(actVal)) {
                    let currentCustom = (settings.teacher_activities || '').split(',').map(a=>a.trim()).filter(a=>a);
                    currentCustom.push(actVal);
                    settings.teacher_activities = currentCustom.join(',');
                    window.allActivities.push(actVal);
                    document.getElementById('dl_activities').innerHTML += `<option value="${actVal}">`;
                    callAPI('saveData', { sheetName: 'การตั้งค่า', rowId: 0, data: { 'JSON_DATA': JSON.stringify(settings) }, isSettings: true }, true);
                }

                window.closeSchBaseModal(); 

                let tempIdx = 0;
                dayChks.forEach(d => {
                    periodChks.forEach(p => {
                        const data = {
                            'ห้องเรียน': '-', 'แผนการเรียน': '-',
                            'วัน': d, 'คาบที่': p,
                            'รหัสวิชา': 'กิจกรรม', 'ชื่อวิชา': actVal,
                            'ชื่อครูผู้สอน': document.getElementById('t_sch_teacher').value, 'สถานที่เรียน': '-',
                            'ประเภท': isLockMode ? 'ล็อค' : 'ปกติ',
