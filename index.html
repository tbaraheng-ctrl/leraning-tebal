    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        // นำ URL ของ Web App ที่ได้จาก Google Apps Script มาใส่ที่นี่
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpFVCZiJ-3ToorA9gAJ_2xuZAP6vAMe1YONk6FoQMdNfvgel-nTGNbuDLz_s9dKR3mRg/exec';
        
        let currentUser = null;
        let currentRole = null;
        let cachePromises = {}; // เปลี่ยนจาก cachedData เป็น cachePromises เพื่อกันการโหลดซ้ำซ้อน

        const subjectGroups = ['วิทยาศาสตร์และเทคโนโลยี', 'คณิตศาสตร์', 'ภาษาไทย', 'ภาษาต่างประเทศ', 'สังคมศึกษา ศาสนาและวัฒนธรรม', 'การงานอาชีพ', 'สุขศึกษาและพลศึกษา', 'ศิลปะ'];
        let learningPlans = ['ทั่วไป', 'วิทย์-คณิต', 'SMTE', '(วิทย์-คณิต) พลังสิบ', '(วิทย์-คณิต)เตรียมสี่เหล่าทัพ', 'IEP', 'ภาษาจีน', 'อาชีพ', 'ศิลป์-กีฬา']; // เปลี่ยนเป็น let เพื่อรองรับการตั้งค่าผ่านระบบ

        // ==========================================
        // INIT & UTILS
        // ==========================================

        // ฟังก์ชันแยกชื่อแผนการเรียนจากข้อความที่อาจมีชั้น/ห้องรวมอยู่ด้วย (พร้อมกรองตัวซ้ำออก)
        function extractPlanNames(planString) {
            if (!planString) return [];
            let plans = [];
            if (planString.includes('\n') || planString.includes(':')) {
                plans = planString.split('\n').map(line => line.split(':')[0].trim()).filter(p => p);
            } else {
                plans = planString.split(',').map(p => p.trim()).filter(p => p);
            }
            return [...new Set(plans)]; // กรองข้อมูลที่ซ้ำกันออกให้เหลือเพียงชื่อเดียว
        }

        window.onload = () => {
            // Check remember me
            const savedUser = localStorage.getItem('ns_timetable_user');
            const savedPass = localStorage.getItem('ns_timetable_pass');
            if (savedUser && savedPass) {
                document.getElementById('username').value = savedUser;
                document.getElementById('password').value = savedPass;
                document.getElementById('rememberMe').checked = true;
            }
        };

        function togglePassword() {

        // ==========================================
        // API COMMUNICATION & ADVANCED CACHING
        // ==========================================
        async function callAPI(action, payload = {}, isBackground = false) {
            // ถ้าเป็นการดึงข้อมูลพื้นหลัง (Background Prefetch) จะไม่แสดง Loader บดบังหน้าจอ
            if (!isBackground) showLoading(true);
            try {
                const formData = new URLSearchParams();
                formData.append('action', action);
                formData.append('payload', JSON.stringify(payload));

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const result = await response.json();
                if (!isBackground) showLoading(false);
                
                if(result.status === 'success') return result.data;
                else throw new Error(result.message);
            } catch (error) {
                if (!isBackground) showLoading(false);
                Swal.fire('ข้อผิดพลาด', error.message || 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้', 'error');
                console.error(error);
                return null;
            }
        }

        // ระบบ Cache ขั้นสูง (เก็บเป็นสถานะ Promise) 
        // ทำให้คำขอโหลดข้อมูลที่มาพร้อมๆ กัน ไม่ถูกส่งไปกวน Server ซ้ำซ้อน
        function getCachedData(sheetName, forceRefresh = false, isBackground = false) {
            if (forceRefresh || !cachePromises[sheetName]) {
                cachePromises[sheetName] = callAPI('getData', { sheetName: sheetName }, isBackground).then(data => {
                    return data || [];
                }).catch(e => {
                    delete cachePromises[sheetName]; // หากเออเร่อ ให้ลบแคชทิ้งเพื่อลองใหม่คราวหน้า
                    return [];
                });
            }
            return cachePromises[sheetName];
        }

        // โหลดข้อมูลทุกอย่างเตรียมไว้ทันทีที่เข้าสู่ระบบสำเร็จ!
        function prefetchAllData() {
            const allSheets = ['ข้อมูลครู', 'ข้อมูลรายวิชา', 'การตั้งค่า', 'ล๊อคตาราง', 'กำหนดตารางสอน', 'ผลการประมวลตารางสอน'];
            allSheets.forEach(sheet => getCachedData(sheet, false, true)); // true = isBackground
        }

        // ==========================================
        // AUTHENTICATION
        // ==========================================
        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const remember = document.getElementById('rememberMe').checked;

            const data = await callAPI('login', { username: user, password: pass });
            
            if (data && data.authenticated) {
                currentUser = data.name;
                currentRole = data.role; 
                
                if (remember) {
                    localStorage.setItem('ns_timetable_user', user);
                    localStorage.setItem('ns_timetable_pass', pass);
                } else {
                    localStorage.removeItem('ns_timetable_user');
                    localStorage.removeItem('ns_timetable_pass');
                }

                document.getElementById('displayUser').innerText = currentUser;
                document.getElementById('displayRole').innerText = currentRole === 'admin' ? 'ผู้ดูแลระบบ' : 'ครูผู้สอน';
                
                document.getElementById('page-login').style.display = 'none';
                document.getElementById('page-main').style.display = 'flex';

                buildMenu();
                
                // --- พลังของเวอร์ชันนี้: โหลดข้อมูลล่วงหน้าแบบแอบทำหลังบ้าน ---
                prefetchAllData();
                // โหลดโลโก้, ชื่อโรงเรียน และแผนการเรียนที่ตั้งค่าไว้มาแสดงผล
                getCachedData('การตั้งค่า').then(settingsArr => {
                    if(settingsArr.length > 0) {
                        let settings = JSON.parse(settingsArr[0]['JSON_DATA'] || '{}');
                        if(settings.logo) updateAllLogos(settings.logo);
                        if(settings.school_name) updateAllSchoolNames(settings.school_name);
                        if(settings.learning_plans) {
                            learningPlans = extractPlanNames(settings.learning_plans);
                        }
                    }
                });

                loadPage(currentRole === 'admin' ? 'dashboard' : 'create_table');
            } else {
                Swal.fire('ล้มเหลว', 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', 'error');
            }
        }

        function buildMenu() {
            const menu = document.getElementById('navMenu');
            menu.innerHTML = '';
            for (const [key, page] of Object.entries(pages)) {
                if (page.roles.includes(currentRole)) {
                    // ปรับ href เป็น javascript:void(0) เพื่อป้องกันเบราว์เซอร์รีเฟรชหรือกระตุกหน้าจอ
                    menu.innerHTML += `
                        <li>
                            <a href="javascript:void(0)" onclick="loadPage('${key}')" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gold hover:text-navy transition-colors nav-link" data-page="${key}">
                                <i class="fas ${page.icon} w-6"></i> ${page.title}
                            </a>
                        </li>
                    `;
                }
            }

        async function loadPage(pageKey) {
            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.remove('bg-gold', 'text-navy', 'border-r-4', 'border-white');
                if(el.dataset.page === pageKey) el.classList.add('bg-gold', 'text-navy', 'border-r-4', 'border-white');
            });

            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `<h2 class="text-2xl font-bold text-navy mb-6 border-b-2 border-gold pb-2">${pages[pageKey].title}</h2>`;
            
            const div = document.createElement('div');
            div.id = 'pageContent';
            contentArea.appendChild(div);

            // แสดง Loader ครอบไว้ตอนเรนเดอร์ ถ้ามีแคชแล้วมันจะหายไปทันทีแบบพริบตาเดียว!
            showLoading(true);
            try {
                await pages[pageKey].render(div);
            } catch (e) {
                console.error("Render Error:", e);
            }
            showLoading(false);
            
            // ปิด Sidebar อัตโนมัติเมื่อเลือกเมนู (บนมือถือ)
            if(window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if(sidebar && !sidebar.classList.contains('-translate-x-full')) {
                    window.toggleSidebar();
                }
            }
        }

                const csvContent = "\uFEFF" + headers.join(',') + "\n";
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);

            // --- ฟังก์ชันนำเข้าข้อมูล CSV ---
            window.handleCSVUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    // แยกบรรทัดและกรองบรรทัดว่างทิ้ง
                    const rows = text.split('\n').filter(row => row.trim().length > 0);
                    if (rows.length <= 1) {
                        Swal.fire('ข้อผิดพลาด', 'ไฟล์ CSV ไม่มีข้อมูล', 'error');
                        event.target.value = '';
                        return;
                    }

                    // ดึงหัวคอลัมน์ (ตัดเครื่องหมายคำพูดและช่องว่าง)
                    const headers = rows[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
                    const expectedHeader = 'รหัสวิชา';

                    // ตรวจสอบความถูกต้องเบื้องต้น
                    if (headers[0] !== expectedHeader) {
                        Swal.fire('ข้อผิดพลาด', 'รูปแบบคอลัมน์ไม่ถูกต้อง กรุณาดาวน์โหลดฟอร์ม CSV จากระบบเพื่อใช้งาน', 'error');
                        event.target.value = '';
                        return;
                    }

                    const dataToUpload = [];
                    // วนลูปอ่านข้อมูลทีละบรรทัด (เริ่มที่บรรทัด 1 เพราะบรรทัด 0 คือหัวข้อ)
                    for (let i = 1; i < rows.length; i++) {
                        // แยกข้อมูลด้วยลูกน้ำ (รองรับกรณีข้อมูลในช่องมีเครื่องหมายคำพูดครอบ)
                        const values = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                        if (values.length > 1 && values[0] !== "") {
                            let obj = {};
                            headers.forEach((h, index) => {
                                obj[h] = values[index] || "";
                            });
                            dataToUpload.push(obj);
                        }
                    }

                    if(dataToUpload.length === 0) {
                         Swal.fire('แจ้งเตือน', 'ไม่พบข้อมูลที่สมบูรณ์ในไฟล์', 'warning');
                         event.target.value = '';
                         return;
                    }

                    // แสดงหน้าจอโหลดและนับจำนวน
                    Swal.fire({
                        title: 'กำลังนำเข้าข้อมูล...',
                        html: 'ระบบกำลังทยอยบันทึก <b>0</b> / ' + dataToUpload.length + ' รายการ<br><br><span class="text-sm text-red-500">กรุณาอย่าปิดหน้าต่างหรือรีเฟรชหน้าเว็บ</span>',
                        allowOutsideClick: false,
                        didOpen: () => { Swal.showLoading(); }
                    });

                    let successCount = 0;
                    // ทำการทยอยบันทึกทีละแถว (เพื่อป้องกัน Google Apps Script ล่มจากการส่ง Request ถี่เกินไป)
                    for(let i=0; i<dataToUpload.length; i++) {
                        try {
                            // ส่ง true เป็น parameter สุดท้ายเพื่อไม่ให้ loading ทับซ้อน
                            let res = await callAPI('saveData', { sheetName: 'ข้อมูลรายวิชา', rowId: null, data: dataToUpload[i] }, true);
                            if(res) {
                                successCount++;
                                Swal.getHtmlContainer().querySelector('b').textContent = successCount;
                            }
                        } catch(err) {
                            console.error('Error row', i, err);
                        }
                    }

                    // ล้างค่าใน input file เพื่อให้เลือกไฟล์เดิมซ้ำได้
                    event.target.value = '';

                    // อัปเดตข้อมูลในตาราง
                    await getCachedData('ข้อมูลรายวิชา', true);
                    Swal.fire({
                        title: 'นำเข้าสำเร็จ!', 
                        text: 'เพิ่มข้อมูลรายวิชาเรียบร้อยแล้ว ' + successCount + ' รายการ', 
                        icon: 'success'

                    loadPage('courses');

            // Handle Logo Upload and Compression
            document.getElementById('s_logo_upload').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 300; // บีบอัดขนาดสูงสุด
                        const MAX_HEIGHT = 300;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/png', 0.8);
                        document.getElementById('s_logo_preview').src = dataUrl;
                        document.getElementById('s_logo_base64').value = dataUrl;
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            });

                let currentRooms = textarea.value.split(',').map(r => r.trim()).filter(r => r);
                
                // นำห้องใหม่ไปต่อท้าย โดยเช็คไม่ให้ซ้ำกับของเดิม
                newRooms.forEach(r => {
                    if(!currentRooms.includes(r)) currentRooms.push(r);

                            }

            };
            window.renderSchRows(window.scheduleBaseData);

            window.updateSchBaseSyncStatus = () => {
                const statusEl = document.getElementById('schBaseSyncStatus');

                if(window.pendingSchBaseSync > 0) {
                    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin text-blue-500"></i> กำลังบันทึกข้อมูล (' + window.pendingSchBaseSync + ')...';

                    statusEl.classList.add('text-blue-600');

            const processSaveData = (data, rowId) => {
                if (rowId !== null) {
                    let index = window.scheduleBaseData.findIndex(item => item.originalIndex === rowId);
                    if(index !== -1) window.scheduleBaseData[index] = { ...data, originalIndex: rowId, isPending: true };
                } else {
                    window.scheduleBaseData.push({ ...data, originalIndex: 'temp_' + Date.now(), isPending: true });
                }
                window.renderSchRows(window.scheduleBaseData);

                window.pendingSchBaseSync++;
                window.updateSchBaseSyncStatus();

                callAPI('saveData', { sheetName: sheetName, rowId: rowId, data: data }, true)
                .then(async (res) => { 
                    if(isLockMode && rowId === null) {
                         // บันทึกลง "กำหนดตารางสอน" ควบคู่ไปด้วย
                         await callAPI('saveData', { sheetName: 'กำหนดตารางสอน', rowId: null, data: data }, true);
                         getCachedData('กำหนดตารางสอน', true, true); // สั่งอัปเดตแคชเงียบๆ
                    }
                    window.pendingSchBaseSync--;
                    if(window.pendingSchBaseSync === 0) {
                        let newData = await getCachedData(sheetName, true, true);
                        window.scheduleBaseData = newData.map((d, index) => ({...d, originalIndex: index}));
                        window.renderSchRows(window.scheduleBaseData);
                    }
                    window.updateSchBaseSyncStatus();
                }).catch(err => {
                    window.pendingSchBaseSync--;
                    window.updateSchBaseSyncStatus();
                    Swal.fire('ข้อผิดพลาด', 'การบันทึกข้อมูลล้มเหลว', 'error');

                const locationVal = document.getElementById('sch_location').value.trim();
                const data = {
                    'ห้องเรียน': document.getElementById('sch_room').value, 'แผนการเรียน': document.getElementById('sch_plan').value,

                    'รหัสวิชา': document.getElementById('sch_code').value, 'ชื่อวิชา': document.getElementById('sch_name').value,
                    'ชื่อครูผู้สอน': document.getElementById('sch_teacher').value, 'สถานที่เรียน': locationVal,
                    'ประเภท': isLockMode ? 'ล็อค' : 'ปกติ'
                };

                if (locationVal) {
                    let currentRooms = (settings.teaching_rooms || '').split(',').map(r => r.trim()).filter(r => r);
                    if (!currentRooms.includes(locationVal)) {
                        currentRooms.push(locationVal);
                        settings.teaching_rooms = currentRooms.join(',');

                processSaveData(data, rowId);
                window.resetSchForm(); 
            };

                const rowId = rowIdStr !== "" ? parseInt(rowIdStr) : null;
                const actVal = document.getElementById('t_sch_activity').value.trim();

                    'รหัสวิชา': 'กิจกรรม', 'ชื่อวิชา': actVal,
                    'ชื่อครูผู้สอน': document.getElementById('t_sch_teacher').value, 'สถานที่เรียน': '-',
                    'ประเภท': isLockMode ? 'ล็อค' : 'ปกติ',
                    'ผู้บันทึก': currentUser
                };

                if (actVal && !window.allActivities.includes(actVal)) {
                    let currentCustom = (settings.teacher_activities || '').split(',').map(a=>a.trim()).filter(a=>a);
                    currentCustom.push(actVal);
                    settings.teacher_activities = currentCustom.join(',');
                    window.allActivities.push(actVal);
                    document.getElementById('dl_activities').innerHTML += `<option value="${actVal}">`;
                    callAPI('saveData', { sheetName: 'การตั้งค่า', rowId: 0, data: { 'JSON_DATA': JSON.stringify(settings) }, isSettings: true }, true);
                }

                processSaveData(data, rowId);
                window.resetTeacherSchForm();

            window.deleteSchBaseRow = async (targetSheetName, rowIndex) => {
                if(await Swal.fire({title: 'ยืนยันการลบ?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ลบเลย'}).then(r => r.isConfirmed)){
                    
                    // ลบออกจากตารางหน้าเว็บชั่วคราว
                    window.scheduleBaseData = window.scheduleBaseData.filter(item => item.originalIndex !== rowIndex);
                    window.renderSchRows(window.scheduleBaseData);

                    window.pendingSchBaseSync++;
                    window.updateSchBaseSyncStatus();

                    // ลบเบื้องหลัง
                    callAPI('deleteData', { sheetName: targetSheetName, rowIndex: rowIndex }, true)
                    .then(async (res) => {
                        window.pendingSchBaseSync--;
                        if(window.pendingSchBaseSync === 0) {
                            let newData = await getCachedData(targetSheetName, true, true);
                            window.scheduleBaseData = newData.map((d, index) => ({...d, originalIndex: index}));
                            window.renderSchRows(window.scheduleBaseData);
                        }

                        window.pendingSchBaseSync--;
                        window.updateSchBaseSyncStatus();

                getCachedData('การตั้งค่า')

            let planOptions = learningPlans.map(p => `<option value="${p}">${p}</option>`).join('');
            let teachingRooms = (settings.teaching_rooms || '').split(',').map(r => r.trim()).filter(r => r);
            let locationOptions = teachingRooms.map(r => `<option value="${r}">${r}</option>`).join('');

            // เก็บข้อมูลไว้ใน Global
            window.interactiveSchData = dataList.map((d, index) => ({...d, originalIndex: index}));

            window.interactivePeriods = periodsCount;
            window.interactiveLocationOpts = locationOptions;
            window.interactiveSettings = settings;

            // สร้าง Mapping แผนการเรียน -> ห้องเรียน
            window.planMappings = {};
            if (settings.learning_plans) {
                if (settings.learning_plans.includes('\n') || settings.learning_plans.includes(':')) {
                    settings.learning_plans.split('\n').forEach(line => {
                        let parts = line.split(':');
                        if (parts.length > 0) {
                            let pName = parts[0].trim();
                            let pRooms = parts.length > 1 ? parts[1].split(',').map(r => r.trim()).filter(r => r) : [];
                            if (pName) window.planMappings[pName] = pRooms;
                        }

                            </select>
                        </div>

                            <label class="block text-sm font-medium text-gray-700 mb-1">แผนการเรียน</label>
                            <select id="grid_plan" class="border border-gray-300 rounded p-2 w-48 text-sm focus:border-gold outline-none">

                        </div>
                        <button onclick="refreshSchGrid()" class="bg-navy text-white px-6 py-2 rounded hover:bg-opacity-90 transition shadow-sm h-[38px] flex items-center text-sm">
                            <i class="fas fa-search mr-2"></i> โหลดตาราง

                            <div id="syncStatus" class="text-sm font-medium text-green-600 transition-all duration-300">
