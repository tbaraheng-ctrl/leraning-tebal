    <!-- html2canvas สำหรับดาวน์โหลดตารางเป็นภาพ -->

</head>
<body class="font-sans text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Loading Overlay -->

        <div class="loader mb-4"></div>
        <p id="loadingText" class="text-white font-semibold text-lg">กำลังเตรียมระบบ...</p>

    <!-- Login Page -->
    <div id="page-login" class="flex items-center justify-center min-h-screen bg-navy p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md border-t-4 border-gold">
            <div class="text-center mb-6">
                <img src="https://www.ns.ac.th/wp-content/uploads/2024/12/cropped-logo-sq.png" alt="โลโก้โรงเรียน" class="w-32 h-32 mx-auto object-contain app-logo">
                <h1 class="text-2xl font-bold text-navy mt-4">ระบบจัดตารางสอน</h1>
                <p class="text-gold font-semibold app-school-name">โรงเรียนนราสิกขาลัย</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้</label>
                    <div class="relative">

            <div class="mt-6 border-t border-gray-200 pt-4 text-center text-xs text-gray-400">
                พัฒนาโดย ครูมูฮัมหมัดตัซกีน บาราเฮง<br>ครูโรงเรียนนราสิกขาลัย

    <!-- Main Application (Hidden initially) -->
    <div id="page-main" class="flex-1 flex flex-col md:flex-row min-h-screen relative overflow-hidden" style="display: none;">
        
        <!-- Mobile Sidebar Overlay -->

        <!-- Sidebar Navigation -->

            <div class="p-4 flex items-center justify-between border-b border-gray-700">

                    <img src="https://www.ns.ac.th/wp-content/uploads/2024/12/cropped-logo-sq.png" alt="Logo" class="w-10 h-10 mr-2 object-contain app-logo">

                        <h2 class="font-bold text-gold text-base leading-tight app-school-name">โรงเรียนนราสิกขาลัย</h2>

                <!-- Close Button for Mobile -->
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white focus:outline-none">

                </button>

            <div class="p-4 text-sm text-center border-b border-gray-700 bg-black bg-opacity-20">
                <p>ผู้ใช้งาน: <span id="displayUser" class="font-semibold text-gold"></span></p>
                <p>บทบาท: <span id="displayRole" class="text-gray-300"></span></p>
            </div>

            <nav class="flex-1 overflow-y-auto py-4">
                <ul class="space-y-1" id="navMenu">
                    <!-- เมนูจะถูกสร้างด้วย JS ตามสิทธิ์ -->
                </ul>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded transition duration-200 mb-3">
                    <i class="fas fa-sign-out-alt mr-2"></i> ออกจากระบบ
                </button>
                <div class="text-center text-[10px] text-gray-400 leading-tight">
                    พัฒนาโดย ครูมูฮัมหมัดตัซกีน บาราเฮง<br>ครูโรงเรียนนราสิกขาลัย

        <!-- Content Area -->
        <main class="flex-1 flex flex-col bg-gray-100 h-screen overflow-hidden w-full">
            <!-- Topbar mobile toggle -->

            <!-- Dynamic Content Container -->
            <div id="contentArea" class="flex-1 overflow-y-auto p-4 md:p-8">

            </div>
        </main>

    <!-- Location Picker Modal (Global) -->
    <div id="locationPickerModal" class="fixed inset-0 bg-black bg-opacity-60 z-[80] flex items-center justify-center hidden backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-[95vw] md:max-w-5xl overflow-hidden transform transition-all flex flex-col max-h-[95vh] m-2">
            <div class="bg-navy text-white px-4 py-3 flex justify-between items-center shrink-0 border-b-4 border-gold">
                <h3 class="font-bold text-base flex items-center"><i class="fas fa-map-marker-alt text-gold mr-2"></i> เลือกสถานที่เรียน</h3>
                <button onclick="closeLocationPicker()" class="text-gray-300 hover:text-white transition focus:outline-none bg-white bg-opacity-10 hover:bg-opacity-20 rounded-full w-7 h-7 flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-3 md:p-4 overflow-y-auto bg-gray-50 flex-1" id="locationGridContainer">
                <!-- Grid items injected here -->
            </div>
            <div class="bg-white px-4 py-3 flex justify-between border-t border-gray-200 shrink-0">
                 <button type="button" onclick="selectLocation('')" class="text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm font-medium transition flex items-center">
                    <i class="fas fa-eraser mr-2"></i> ล้าง (ไม่ระบุ)
                 </button>
                 <button type="button" onclick="closeLocationPicker()" class="bg-navy text-white px-4 py-1.5 rounded-lg hover:bg-opacity-90 text-sm shadow-md transition">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        // นำ URL ของ Web App ที่ได้จาก Google Apps Script มาใส่ที่นี่
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyTIPBRQax8izL4KQi075WKyDsFNYEH3HOm1nqiYUw3q6lTKoSS_DfuoCUDRfnXV_Gc/exec';
        
        let currentUser = null;
        let currentRole = null;
        let cachePromises = {}; // เปลี่ยนจาก cachedData เป็น cachePromises เพื่อกันการโหลดซ้ำซ้อน
        window.appSettings = {}; // เพิ่มตัวแปรสำหรับเก็บการตั้งค่าแบบ Global ให้อ่านได้ทันทีโดยไม่ต้องรอโหลด

        const subjectGroups = ['วิทยาศาสตร์และเทคโนโลยี', 'คณิตศาสตร์', 'ภาษาไทย', 'ภาษาต่างประเทศ', 'สังคมศึกษา ศาสนาและวัฒนธรรม', 'การงานอาชีพ', 'สุขศึกษาและพลศึกษา', 'ศิลปะ'];
        let learningPlans = ['ทั่วไป', 'วิทย์-คณิต', 'SMTE', '(วิทย์-คณิต) พลังสิบ', '(วิทย์-คณิต)เตรียมสี่เหล่าทัพ', 'IEP', 'ภาษาจีน', 'อาชีพ', 'ศิลป์-กีฬา']; 

        // Global variables for location picker
        window.currentLocTarget = '';
        window.baseLocationHtml = '';
        window.modalLocationHtml = '';
        window.currentEditingData_base = null;

        window.openLocationPicker = (targetId, context) => {
            window.currentLocTarget = targetId;
            let html = '';
            
            if(context === 'base') {
                window.updateMainFormDropdowns(window.currentEditingData_base); // Refresh state
                html = window.baseLocationHtml || '<div class="text-center text-gray-500 py-8 flex flex-col items-center"><i class="fas fa-exclamation-circle text-4xl text-gray-300 mb-3"></i><p>กรุณาระบุข้อมูล ระดับชั้น, แผน, วัน และ คาบเรียน ให้ครบถ้วนก่อน</p></div>';
            } else if (context === 'modal') {
                window.updateModalDropdowns(window.currentEditingData); // Refresh state
                html = window.modalLocationHtml || '<div class="text-center text-gray-500 py-8 flex flex-col items-center"><i class="fas fa-exclamation-circle text-4xl text-gray-300 mb-3"></i><p>กรุณาระบุคาบเรียนให้ครบถ้วนก่อน</p></div>';
            }
            
            document.getElementById('locationGridContainer').innerHTML = html;
            document.getElementById('locationPickerModal').classList.remove('hidden');
        };

        window.closeLocationPicker = () => {
            document.getElementById('locationPickerModal').classList.add('hidden');
        };

        window.selectLocation = (loc) => {
            if(window.currentLocTarget) {
                document.getElementById(window.currentLocTarget).value = loc;
            }
            window.closeLocationPicker();
        };

        // ==========================================
        // INIT & UTILS
        // ==========================================

        // ฟังก์ชันเปรียบเทียบข้อมูลคาบว่าซ้ำกันหรือไม่ เพื่อใช้สำหรับผสานเซลล์อัตโนมัติ
        window.areSlotsEqual = (slots1, slots2) => {
            if (!slots1 || !slots2) return false;
            if (slots1.length !== slots2.length) return false;
            if (slots1.length === 0) return false; // อย่าผสานคาบว่าง
            
            for (let k = 0; k < slots1.length; k++) {
                let s1 = slots1[k];
                let match = slots2.find(s2 => 
                    s1['รหัสวิชา'] === s2['รหัสวิชา'] && 
                    s1['ชื่อครูผู้สอน'] === s2['ชื่อครูผู้สอน'] && 
                    s1['ห้องเรียน'] === s2['ห้องเรียน'] &&
                    s1['สถานที่เรียน'] === s2['สถานที่เรียน'] &&
                    s1['แผนการเรียน'] === s2['แผนการเรียน']
                );
                if (!match) return false;
            }
            return true;
        };

        // ฟังก์ชันแยกชื่อแผนการเรียนจากข้อความที่อาจมีชั้น/ห้องรวมอยู่ด้วย (พร้อมกรองตัวซ้ำออก)
        function extractPlanNames(planString) {
            if (!planString) return [];
            let plans = [];
            if (planString.includes('\n') || planString.includes(':')) {
                plans = planString.split('\n').map(line => line.split(':')[0].trim()).filter(p => p);
            } else {
                plans = planString.split(',').map(p => p.trim()).filter(p => p);
            }
            return [...new Set(plans)]; 
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('ns_timetable_user');
            const savedPass = localStorage.getItem('ns_timetable_pass');
            if (savedUser && savedPass) {
                document.getElementById('username').value = savedUser;
                document.getElementById('password').value = savedPass;
                document.getElementById('rememberMe').checked = true;
            }
            showLoading(false);
        };

        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showLoading(show, text = 'กำลังประมวลผล...') {
            const overlay = document.getElementById('loadingOverlay');
            const textEl = document.getElementById('loadingText');
            if (textEl) textEl.innerText = text;
            overlay.style.display = show ? 'flex' : 'none';
        }

        window.toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                sidebar.classList.add('translate-x-0');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.remove('translate-x-0');
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        };

        window.updateAllLogos = (logoUrl) => {
            if (!logoUrl) return;
            document.querySelectorAll('.app-logo').forEach(img => {
                img.src = logoUrl;
            });
        };

        window.updateAllSchoolNames = (schoolName) => {
            if (!schoolName) return;
            document.title = 'ระบบจัดตารางสอน - ' + schoolName;
            document.querySelectorAll('.app-school-name').forEach(el => {
                el.innerText = schoolName;
            });
        };

        // ==========================================
        // API COMMUNICATION & ADVANCED CACHING
        // ==========================================
        async function callAPI(action, payload = {}, isBackground = false) {
            if (!isBackground) showLoading(true);
            try {
                const formData = new URLSearchParams();
                formData.append('action', action);
                formData.append('payload', JSON.stringify(payload));

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                const result = await response.json();
                if (!isBackground) showLoading(false);
                
                if(result.status === 'success') return result.data;
                else throw new Error(result.message);
            } catch (error) {
                if (!isBackground) showLoading(false);
                console.error('API Error:', error.message);
                
                // ดักจับ Error กรณี Script ของ Google ไม่ได้ผูกกับ Spreadsheet
                if (error.message && error.message.includes("reading 'getSheetByName'")) {
                    Swal.fire({
                        icon: 'error',
                        title: 'ตั้งค่าระบบหลังบ้านไม่ถูกต้อง',
                        html: '<div class="text-left text-sm text-gray-700">ระบบไม่สามารถเข้าถึงฐานข้อมูล Google Sheets ได้<br><br><b>วิธีแก้ไขที่ Google Apps Script:</b><br><br>1. หากเป็น Script แบบแยก ให้คัดลอก ID ของ Google Sheets ไปใส่ในตัวแปร <code>SPREADSHEET_ID</code> ที่บรรทัดแรกๆ ของไฟล์ Code.gs<br><br>2. <b>หรือวิธีที่แนะนำ:</b> ให้สร้าง Script ผ่านเมนู <i>ส่วนขยาย > Apps Script</i> จากหน้า Google Sheets โดยตรง</div>'
                    });
                }
                
                throw error; 
            }
        }

        function getCachedData(sheetName, forceRefresh = false, isBackground = false) {
            if (forceRefresh || !cachePromises[sheetName]) {
                cachePromises[sheetName] = callAPI('getData', { sheetName: sheetName }, isBackground).then(data => {
                    return data || [];
                }).catch(e => {
                    delete cachePromises[sheetName]; 
                    return [];
                });
            }
            return cachePromises[sheetName];
        }

        function prefetchAllData() {
            const allSheets = ['ข้อมูลครู', 'ข้อมูลรายวิชา', 'การตั้งค่า', 'ล๊อคตาราง', 'กำหนดตารางสอน', 'ผลการประมวลตารางสอน', 'คำสั่งสอน', 'กำหนดสิทธิ'];
            allSheets.forEach(sheet => getCachedData(sheet, false, true)); 
        }

        // ==========================================
        // AUTHENTICATION
        // ==========================================
        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const remember = document.getElementById('rememberMe').checked;

            try {
                showLoading(true, 'กำลังตรวจสอบข้อมูล...');
                const data = await callAPI('login', { username: user, password: pass }, true);
                
                if (data && data.authenticated) {
                    currentUser = data.name;
                    currentRole = data.role; 
                    
                    if (remember) {
                        localStorage.setItem('ns_timetable_user', user);
                        localStorage.setItem('ns_timetable_pass', pass);
                    } else {
                        localStorage.removeItem('ns_timetable_user');
                        localStorage.removeItem('ns_timetable_pass');
                    }

                    document.getElementById('displayUser').innerText = currentUser;
                    
                    let roleText = 'ครูผู้สอน';
                    if (currentRole === 'admin') roleText = 'ผู้ดูแลระบบ';
                    else if (currentRole === 'head') roleText = 'หัวหน้ากลุ่มสาระ';
                    document.getElementById('displayRole').innerText = roleText;
                    
                    document.getElementById('page-login').style.display = 'none';
                    document.getElementById('page-main').style.display = 'flex';
                    showLoading(false);

                    // สร้างเมนูและแสดง Dashboard ทันทีด้วยค่าเริ่มต้น (ข้ามการรอ API)
                    buildMenu();
                    loadPage('dashboard'); 

                    // สั่งให้ระบบเริ่มโหลดข้อมูลทุกอย่างแบบเบื้องหลัง (เงียบๆ)
                    prefetchAllData();
                    
                    // ทันทีที่โหลดตั้งค่าเสร็จสิ้น ให้อัปเดต UI แบบเนียนๆ
                    getCachedData('การตั้งค่า', false, true).then(settingsArr => {
                        if(settingsArr.length > 0) {
                            let settings = JSON.parse(settingsArr[0]['JSON_DATA'] || '{}');
                            window.appSettings = settings; // บันทึกลง Global
                            
                            if(settings.logo) updateAllLogos(settings.logo);
                            if(settings.school_name) updateAllSchoolNames(settings.school_name);
                            if(settings.learning_plans) {
                                learningPlans = extractPlanNames(settings.learning_plans);
                            }
                            
                            // รีเฟรชเมนูและหน้า Dashboard ให้ตรงตามการตั้งค่าล่าสุด
                            buildMenu();
                            if(document.querySelector('.nav-link.bg-gold') && document.querySelector('.nav-link.bg-gold').dataset.page === 'dashboard') {
                                loadPage('dashboard');
                            }
                        }
                    });

                } else {
                    showLoading(false);
                    Swal.fire('ล้มเหลว', 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', 'error');
                }
            } catch(e) {
                showLoading(false);

        async function buildMenu() {
            // อ่านค่าจาก Local ทันทีโดยไม่ต้องรอ API
            let settings = window.appSettings || {};
            
            let showCourses = settings.menu_courses !== false;
            let showCreate = settings.menu_create !== false;
            let showDownload = settings.menu_download !== false;

            const menu = document.getElementById('navMenu');
            menu.innerHTML = '';
            for (const [key, page] of Object.entries(pages)) {
                if (page.roles.includes(currentRole)) {
                    
                    let isVisible = true;
                    if (key === 'courses' && !showCourses) isVisible = false;
                    if (key === 'create_table' && !showCreate) isVisible = false;
                    if (key === 'download' && !showDownload) isVisible = false;

                    if (!isVisible) continue;

                    menu.innerHTML += `
                        <li>
                            <a href="javascript:void(0)" onclick="loadPage('${key}')" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gold hover:text-navy transition-colors nav-link" data-page="${key}">
                                <i class="fas ${page.icon} w-6"></i> ${page.title}
                            </a>
                        </li>
                    `;
                }
            }
        }

        async function loadPage(pageKey) {
            if (window.autoSyncInterval) {
                clearInterval(window.autoSyncInterval);
                window.autoSyncInterval = null;
            }

            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.remove('bg-gold', 'text-navy', 'border-r-4', 'border-white');
                if(el.dataset.page === pageKey) el.classList.add('bg-gold', 'text-navy', 'border-r-4', 'border-white');
            });

            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `<h2 class="text-2xl font-bold text-navy mb-6 border-b-2 border-gold pb-2">${pages[pageKey].title}</h2>`;
            
            const div = document.createElement('div');
            div.id = 'pageContent';
            contentArea.appendChild(div);

            showLoading(true);
            try {
                await pages[pageKey].render(div);
            } catch (e) {
                console.error("Render Error:", e);
            }
            showLoading(false);
            
            if(window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if(sidebar && !sidebar.classList.contains('-translate-x-full')) {
                    window.toggleSidebar();
                }
            }
        }

                        let cleanData = { ...itemToDelete };
                        delete cleanData.originalIndex;
                        delete cleanData.isPending;

                        // ส่ง API สั่งลบ โดยส่งแค่ sheetName และ rowData

            };

                    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin text-blue-500"></i> กำลังบันทึก (' + window.pendingCourseSync + ')...';

                    statusEl.innerHTML = '<i class="fas fa-check-circle text-green-500"></i> ข้อมูลล่าสุด';

                document.getElementById('temp_table_container').classList.remove('hidden');

                document.getElementById('btn_save_edit').classList.add('hidden');

                showLoading(true);
                let newCourses = await getCachedData('ข้อมูลรายวิชา', true);
                window.courseDataList = newCourses.map((c, index) => ({...c, originalIndex: index}));
                window.filterCourseTable();
                showLoading(false);
                Swal.fire({icon: 'success', title: 'รีเฟรชสำเร็จ', text: 'อัปเดตข้อมูลจากระบบแล้ว', timer: 1500, showConfirmButton: false});
            };

            window.addCourseLevel = () => {
                const grade = document.getElementById('c_grade_sel').value;
                const checkboxes = document.querySelectorAll('.room-chk:checked');
                
                if(checkboxes.length === 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาติ๊กเลือกห้องอย่างน้อย 1 ห้อง', 'warning');
                    return;
                }
                
                let newRooms = [];
                checkboxes.forEach(chk => {
                    newRooms.push(`ม.${grade}/${chk.value}`);
                });

                const input = document.getElementById('c_level');
                let currentRooms = input.value.split(',').map(r => r.trim()).filter(r => r);
                
                newRooms.forEach(r => {
                    if(!currentRooms.includes(r)) currentRooms.push(r);
                });
                
                input.value = currentRooms.join(', ');
                
                document.querySelectorAll('.room-chk').forEach(chk => chk.checked = false);
            };

            window.clearCourseLevel = () => {
                document.getElementById('c_level').value = '';
                document.querySelectorAll('.room-chk').forEach(chk => chk.checked = false);
            };

            window.addCourseToTemp = () => {
                const code = document.getElementById('c_code').value.trim();
                const name = document.getElementById('c_name').value.trim();
                const credit = document.getElementById('c_credit').value.trim();
                const teacher = document.getElementById('c_teacher').value.trim();
                const term = document.getElementById('c_term').value;
                const group = document.getElementById('c_group').value;
                const level = document.getElementById('c_level').value.trim();
                
                const plans = Array.from(document.querySelectorAll('.modal-plan-chk:checked')).map(c => c.value).join(', ');

                if(!term || !group || !teacher) {
                    return Swal.fire('แจ้งเตือน', 'กรุณาเลือก ภาคเรียน, กลุ่มสาระ และ ชื่อครูผู้สอน ก่อน', 'warning');
                }
                if(!code || !name || !credit) {
                    return Swal.fire('แจ้งเตือน', 'กรุณากรอก รหัสวิชา, ชื่อวิชา และ หน่วยกิต ให้ครบถ้วน', 'warning');
                }

                const data = {
                    'รหัสวิชา': code, 'ชื่อวิชา': name, 'หน่วยกิต': credit, 
                    'ชื่อครูผู้สอน': teacher, 'ชั้นที่เปิดสอน': level, 
                    'แผนการเรียน': plans, 'ภาคเรียนที่': term, 'กลุ่มสาระการเรียนรู้': group
                };

                window.tempCourseList.push(data);
                window.renderTempCourseTable();

                document.getElementById('c_code').value = '';
                document.getElementById('c_name').value = '';
                document.getElementById('c_credit').value = '';
                document.getElementById('c_level').value = '';
                document.querySelectorAll('.room-chk').forEach(chk => chk.checked = false);
                document.querySelectorAll('.modal-plan-chk').forEach(chk => chk.checked = false);
                
                document.getElementById('c_code').focus(); 
            };

            window.renderTempCourseTable = () => {
                const tbody = document.getElementById('tempCourseTbody');
                document.getElementById('tempCount').innerText = window.tempCourseList.length;
                
                if (window.tempCourseList.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-gray-400 italic">ยังไม่มีรายการ กรอกข้อมูลด้านบนแล้วกด "เพิ่มลงรายการด้านล่าง"</td></tr>';
                    return;
                }

                tbody.innerHTML = window.tempCourseList.map((c, idx) => `
                    <tr class="border-b bg-white hover:bg-gray-50">
                        <td class="p-2 border-b font-semibold text-navy">${c['รหัสวิชา']}</td>
                        <td class="p-2 border-b">${c['ชื่อวิชา']}</td>
                        <td class="p-2 border-b">${c['หน่วยกิต']}</td>
                        <td class="p-2 border-b">${c['ชั้นที่เปิดสอน']}</td>
                        <td class="p-2 border-b">${c['แผนการเรียน']}</td>
                        <td class="p-2 border-b text-center">
                            <button type="button" onclick="removeTempCourse(${idx})" class="text-red-500 hover:text-red-700 bg-red-50 px-2 py-1 rounded shadow-sm"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            };

            window.removeTempCourse = (index) => {
                window.tempCourseList.splice(index, 1);
                window.renderTempCourseTable();
            };

            window.clearTempCourses = () => {
                window.tempCourseList = [];
                window.renderTempCourseTable();
            };

            window.submitCourse = () => {
                window.saveBatchCourses();
            };

            window.saveBatchCourses = () => {
                if (window.tempCourseList.length === 0) {
                    return Swal.fire('แจ้งเตือน', 'ไม่มีรายการให้บันทึก กรุณาเพิ่มข้อมูลลงตารางด้านล่างก่อน', 'warning');
                }
                
                closeCourseModal();
                
                window.tempCourseList.forEach(data => {
                    processCourseSave(data, null);
                });
                
                window.tempCourseList = []; 
            };

            window.saveEditedCourse = () => {
                const rowIdStr = document.getElementById('c_id').value;
                const rowId = rowIdStr !== "" ? rowIdStr : null;
                
                const plans = Array.from(document.querySelectorAll('.modal-plan-chk:checked')).map(c => c.value).join(', ');
                
                const data = {
                    'รหัสวิชา': document.getElementById('c_code').value.trim(), 
                    'ชื่อวิชา': document.getElementById('c_name').value.trim(),
                    'หน่วยกิต': document.getElementById('c_credit').value.trim(), 
                    'ชื่อครูผู้สอน': document.getElementById('c_teacher').value,
                    'ชั้นที่เปิดสอน': document.getElementById('c_level').value.trim(), 
                    'แผนการเรียน': plans,
                    'ภาคเรียนที่': document.getElementById('c_term').value, 
                    'กลุ่มสาระการเรียนรู้': document.getElementById('c_group').value
                };
                
                if(!data['รหัสวิชา'] || !data['ชื่อวิชา']) {
                    return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสวิชาและชื่อวิชา', 'warning');
                }
                
                closeCourseModal();
                processCourseSave(data, rowId);
            };

            const processCourseSave = (data, rowId) => {
                if (rowId !== null) {
                    let index = window.courseDataList.findIndex(item => String(item.originalIndex) === String(rowId));
                    if(index !== -1) window.courseDataList[index] = { ...data, originalIndex: rowId, isPending: true };
                } else {
                    window.courseDataList.push({ ...data, originalIndex: 'temp_' + Date.now() + Math.random(), isPending: true });
                }
                window.filterCourseTable();

                window.pendingCourseSync++;
                window.updateCourseSyncStatus();

                const csvContent = "\uFEFF" + headers.join(',') + "\n";

            window.handleCSVUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const rows = text.split('\n').filter(row => row.trim().length > 0);
                    if (rows.length <= 1) {
                        Swal.fire('ข้อผิดพลาด', 'ไฟล์ CSV ไม่มีข้อมูล', 'error');
                        event.target.value = '';
                        return;
                    }

                    const headers = rows[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
                    const expectedHeader = 'รหัสวิชา';

                    if (headers[0] !== expectedHeader) {
                        Swal.fire('ข้อผิดพลาด', 'รูปแบบคอลัมน์ไม่ถูกต้อง กรุณาดาวน์โหลดฟอร์ม CSV จากระบบเพื่อใช้งาน', 'error');
                        event.target.value = '';
                        return;
                    }

                    const dataToUpload = [];
                    for (let i = 1; i < rows.length; i++) {
                        const values = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                        if (values.length > 1 && values[0] !== "") {
                            let obj = {};
                            headers.forEach((h, index) => {
                                obj[h] = values[index] || "";
                            });
                            dataToUpload.push(obj);
                        }
                    }

                    if(dataToUpload.length === 0) {
                         Swal.fire('แจ้งเตือน', 'ไม่พบข้อมูลที่สมบูรณ์ในไฟล์', 'warning');
                         event.target.value = '';
                         return;
                    }

                    Swal.fire({
                        title: 'กำลังนำเข้าข้อมูล...',
                        html: 'ระบบกำลังทยอยบันทึก <b>0</b> / ' + dataToUpload.length + ' รายการ<br><br><span class="text-sm text-red-500">กรุณาอย่าปิดหน้าต่างหรือรีเฟรชหน้าเว็บ</span>',
                        allowOutsideClick: false,
                        didOpen: () => { Swal.showLoading(); }
                    });

                    let successCount = 0;
                    for(let i=0; i<dataToUpload.length; i++) {
                        try {
                            let res = await callAPI('saveData', { sheetName: 'ข้อมูลรายวิชา', rowId: null, data: dataToUpload[i] }, true);
                            if(res) {
                                successCount++;
                                Swal.getHtmlContainer().querySelector('b').textContent = successCount;
                            }
                        } catch(err) {
                            console.error('Error row', i, err);
                        }
                    }

                    event.target.value = '';
                    let newData = await getCachedData('ข้อมูลรายวิชา', true);
                    window.courseDataList = newData.map((c, index) => ({...c, originalIndex: index}));
                    window.filterCourseTable();
                    Swal.fire({
                        title: 'นำเข้าสำเร็จ!', 
                        text: 'เพิ่มข้อมูลรายวิชาเรียบร้อยแล้ว ' + successCount + ' รายการ', 
                        icon: 'success'
                    });
                };
                reader.readAsText(file, 'UTF-8');
            };

            window.handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 120; 
                        const MAX_HEIGHT = 120;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, width, height);
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
                        
                        if (dataUrl.length > 25000) {
                            Swal.fire('ขนาดไฟล์ใหญ่เกินไป', 'รูปภาพของคุณมีความละเอียดสูงเกินกว่าระบบจะรองรับได้ กรุณาคัดลอกลิงก์รูป (URL) มาวางในช่องด้านบนแทนครับ', 'warning');
                            return;
                        }
                        
                        document.getElementById('s_logo_url').value = ''; 
                        document.getElementById('s_logo_preview').src = dataUrl;
                        document.getElementById('s_logo_base64').value = dataUrl;
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            };

            window.addRoomsToTextarea = () => {
                const grade = document.getElementById('s_grade_level').value;
                const count = parseInt(document.getElementById('s_room_count').value);
                let newRooms = [];
                for (let i = 1; i <= count; i++) {
                    newRooms.push(`ม.${grade}/${i}`);
                }
                
                const textarea = document.getElementById('s_rooms');
                let currentRooms = textarea.value.split(',').map(r => r.trim()).filter(r => r);
                
                newRooms.forEach(r => {
                    if(!currentRooms.includes(r)) currentRooms.push(r);
                });
                
                textarea.value = currentRooms.join(',');
            };

            window.clearRoomsTextarea = () => {
                document.getElementById('s_rooms').value = '';
            };

            window.addTeachingRoom = () => {
                const input = document.getElementById('s_teaching_room_input');
                const roomName = input.value.trim();
                
                if (!roomName) return;

                if (roomName.startsWith('file://') || roomName.startsWith('http://') || roomName.startsWith('https://')) {
                    Swal.fire('ข้อมูลไม่ถูกต้อง', 'ไม่สามารถเพิ่มลิงก์หรือที่อยู่ไฟล์เป็นสถานที่เรียนได้', 'warning');
                    input.value = '';
                    return;
                }

                const textarea = document.getElementById('s_teaching_rooms');
                let currentRooms = textarea.value.split(',').map(r => r.trim()).filter(r => r);

                if (!currentRooms.includes(roomName)) {
                    currentRooms.push(roomName);
                }

                textarea.value = currentRooms.join(', ');
                input.value = ''; 
            };

            window.clearTeachingRooms = () => {
                document.getElementById('s_teaching_rooms').value = '';
            };

            window.addLearningPlan = () => {
                const planName = document.getElementById('s_learning_plan_input').value.trim();
                
                if (!planName) {
                    Swal.fire('แจ้งเตือน', 'กรุณาระบุชื่อแผนการเรียน', 'warning');
                    return;
                }

                const gradeChks = document.querySelectorAll('.plan-grade-chk:checked');
                const roomChks = document.querySelectorAll('.plan-room-chk:checked');
                
                if (gradeChks.length === 0 && roomChks.length > 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาเลือกระดับชั้นด้วย', 'warning');
                    return;
                }

                let roomsArr = [];
                if (gradeChks.length > 0 && roomChks.length === 0) {
                    gradeChks.forEach(g => roomsArr.push(`ม.${g.value}`));
                } else {
                    gradeChks.forEach(g => {
                        roomChks.forEach(r => {
                            roomsArr.push(`ม.${g.value}/${r.value}`);
                        });
                    });
                }

                let planRoomsStr = roomsArr.join(', ');

                const textarea = document.getElementById('s_learning_plans');
                let newEntry = planName + (planRoomsStr ? ' : ' + planRoomsStr : '');

                if (textarea.value.trim() === '') {
                    textarea.value = newEntry;
                } else {
                    textarea.value += '\n' + newEntry;
                }

                document.getElementById('s_learning_plan_input').value = '';
                document.querySelectorAll('.plan-grade-chk').forEach(c => c.checked = false);
                document.querySelectorAll('.plan-room-chk').forEach(c => c.checked = false);
            };

            window.clearLearningPlans = () => {
                document.getElementById('s_learning_plans').value = '';
            };

            window.submitSettings = async () => {
                let urlInput = document.getElementById('s_logo_url').value.trim();
                let base64Input = document.getElementById('s_logo_base64').value;
                let finalLogo = urlInput ? urlInput : (base64Input || defaultLogo);

                if (finalLogo.length > 35000 && finalLogo.startsWith('data:image')) {
                    Swal.fire('ข้อผิดพลาด', 'รูปภาพโลโก้เดิมมีขนาดใหญ่เกินข้อจำกัด กรุณาวางลิงก์รูปภาพ (URL) แทนครับ', 'error');
                    return;
                }

                // ทำความสะอาดข้อมูลสถานที่เรียน กรองเอาที่อยู่ไฟล์ (file://, http) ออกก่อนบันทึก
                let rawTeachingRooms = document.getElementById('s_teaching_rooms').value;
                let cleanTeachingRooms = rawTeachingRooms.split(',')
                    .map(r => r.trim())
                    .filter(r => r && !r.startsWith('file://') && !r.startsWith('http://') && !r.startsWith('https://'))
                    .join(',');

                const data = {
                    menu_courses: document.getElementById('s_menu_courses').checked,
                    menu_create: document.getElementById('s_menu_create').checked,
                    menu_download: document.getElementById('s_menu_download').checked,
                    school_name: document.getElementById('s_school_name').value,
                    term: document.getElementById('s_term').value, year: document.getElementById('s_year').value,
                    periods: parseInt(document.getElementById('s_periods').value), duration: parseInt(document.getElementById('s_duration').value),
                    start: document.getElementById('s_start').value, break_period: parseInt(document.getElementById('s_break_period').value),
                    break_duration: parseInt(document.getElementById('s_break_duration').value),
                    show_code: document.getElementById('s_show_code').checked, show_name: document.getElementById('s_show_name').checked,
                    show_teacher: document.getElementById('s_show_teacher').checked, show_room: document.getElementById('s_show_room').checked,
                    rooms: document.getElementById('s_rooms').value,
                    teaching_rooms: cleanTeachingRooms,
                    learning_plans: document.getElementById('s_learning_plans').value,
                    logo: finalLogo
                };
                
                try {
                    showLoading(true, 'กำลังบันทึกการตั้งค่า...');
                    
                    let settingsArr = await getCachedData('การตั้งค่า');
                    let currentSettings = settingsArr.length > 0 ? JSON.parse(settingsArr[0]['JSON_DATA'] || '{}') : {};
                    const mergedData = { ...currentSettings, ...data };

                    let res = await callAPI('saveData', { sheetName: 'การตั้งค่า', rowId: 0, data: { 'JSON_DATA': JSON.stringify(mergedData) }, isSettings: true });
                    
                    if(res) {
                        await getCachedData('การตั้งค่า', true); 
                        window.appSettings = mergedData; 
                        
                        window.updateAllLogos(mergedData.logo); 
                        window.updateAllSchoolNames(mergedData.school_name); 
                        if(mergedData.learning_plans) {
                            learningPlans = extractPlanNames(mergedData.learning_plans);
                        }
                        
                        await buildMenu();
                        showLoading(false);
                        
                        Swal.fire('สำเร็จ', 'บันทึกการตั้งค่าเรียบร้อย', 'success').then(() => {
                             if(document.querySelector('.nav-link.bg-gold') && document.querySelector('.nav-link.bg-gold').dataset.page === 'dashboard') {
                                 loadPage('dashboard');
                             }
                        });
                    }
                } catch(e) {
                    showLoading(false);
                    console.error('Settings Save Error:', e);
                    Swal.fire('ข้อผิดพลาด', 'บันทึกการตั้งค่าล้มเหลว: ' + (e.message || 'การเชื่อมต่อถูกขัดจังหวะ'), 'error');
                }
            };
        }

        // --- เมนูใหม่: กำหนดสิทธิจัดตาราง ---

            let permArr = await getCachedData('กำหนดสิทธิ');

                    <span class="text-gray-800 font-medium">${g}</span>
                </label>
            `).join('');

            container.innerHTML = `
                <div class="bg-white p-8 rounded-xl shadow-md max-w-4xl mx-auto mt-4">
                    <div class="text-center mb-8">
                        <i class="fas fa-user-shield text-5xl text-navy mb-3"></i>
                        <h3 class="text-2xl font-bold text-navy">กำหนดสิทธิจัดตารางสอน</h3>
                        <p class="text-gray-500 mt-2">เลือกกลุ่มสาระการเรียนรู้ที่อนุญาตให้เข้ามาจัดทำตารางสอนได้ในขณะนี้ <br><span class="text-xs text-red-500">*หากไม่เลือกกลุ่มใดเลย ครูทั่วไปจะไม่สามารถเข้าจัดตารางสอนได้</span></p>
                    </div>
                    <form id="permForm">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                            ${checkboxesHtml}
                        </div>

                                </button>
                                <div class="ml-auto flex space-x-2">
                        <button type="button" onclick="closeSchBaseModal()" class="bg-gray-200 text-gray-800 px-6 py-2 rounded hover:bg-gray-300 transition">ปิดหน้าต่าง</button>
                        <button type="button" id="sch_btn_save_edit" onclick="saveEditedSch('class')" class="bg-gold text-navy font-bold px-8 py-2 rounded hover:bg-opacity-90 transition shadow-md hidden">บันทึกการแก้ไขวิชา</button>
                        <button type="button" id="t_sch_btn_save_edit" onclick="saveEditedSch('teacher')" class="bg-gold text-navy font-bold px-8 py-2 rounded hover:bg-opacity-90 transition shadow-md hidden">บันทึกการแก้ไขกิจกรรม</button>
                        <button type="button" id="sch_btn_save_batch" onclick="saveBatchSch()" class="bg-navy text-white px-8 py-2 rounded hover:bg-opacity-90 transition shadow-md">บันทึกข้อมูลเข้าสู่ระบบ</button>

`;

            window.addSchLevel = () => {
                const gradeCheckboxes = document.querySelectorAll('.sch-grade-chk:checked');
                const roomCheckboxes = document.querySelectorAll('.sch-room-chk:checked');
                
                if(gradeCheckboxes.length === 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาติ๊กเลือกระดับชั้นอย่างน้อย 1 ระดับชั้น', 'warning');
                    return;
                }
                if(roomCheckboxes.length === 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาติ๊กเลือกห้องอย่างน้อย 1 ห้อง', 'warning');
                    return;
                }
                
                const container = document.getElementById('sch_room_plan_container');
                let addedCount = 0;

                gradeCheckboxes.forEach(gChk => {
                    roomCheckboxes.forEach(rChk => {
                        const roomName = `ม.${gChk.value}/${rChk.value}`;

                        // อนุญาตให้เพิ่มห้องซ้ำได้ เพื่อให้รองรับห้องเรียนที่มีหลายแผนการเรียน
                        let matchedPlan = '';
                        for (const [pName, pRooms] of Object.entries(window.schPlanMappings)) {
                            if (pRooms.includes(roomName)) {
                                matchedPlan = pName;
                                break;
                            }
                        }

                        let optionsHtml = '<option value="">-- เลือกแผน --</option>';
                        learningPlans.forEach(p => {
                            optionsHtml += `<option value="${p}" ${p === matchedPlan ? 'selected' : ''}>${p}</option>`;
                        });

                        const row = document.createElement('div');
                        row.className = 'flex items-center gap-2 room-plan-pair bg-white p-2 border border-gray-200 rounded shadow-sm';
                        row.innerHTML = `
                            <div class="flex-1 flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-600 w-12">ห้อง:</span>
                                <input type="text" class="rp-room border border-gray-300 rounded p-1.5 text-sm w-full bg-gray-50 text-navy font-semibold outline-none cursor-not-allowed" value="${roomName}" readonly>
                            </div>
                            <div class="flex-1 flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-600 w-10">แผน:</span>
                                <select class="rp-plan border border-gray-300 rounded p-1.5 text-sm w-full focus:border-gold outline-none" onchange="window.updateMainFormDropdowns()">
                                    ${optionsHtml}
                                </select>
                            </div>
                            <button type="button" onclick="this.closest('.room-plan-pair').remove(); window.updateMainFormDropdowns();" class="text-red-500 hover:text-red-700 p-1.5 hover:bg-red-50 rounded transition">
                                <i class="fas fa-times"></i>
                            </button>
                        `;
                        container.appendChild(row);
                        addedCount++;
                    });
                });

                document.querySelectorAll('.sch-grade-chk').forEach(chk => chk.checked = false);
                document.querySelectorAll('.sch-room-chk').forEach(chk => chk.checked = false);
                
                if(addedCount > 0) window.updateMainFormDropdowns();
            };

            window.clearSchLevel = () => {
                document.getElementById('sch_room_plan_container').innerHTML = '';
                document.querySelectorAll('.sch-grade-chk').forEach(chk => chk.checked = false);
                document.querySelectorAll('.sch-room-chk').forEach(chk => chk.checked = false);
                window.updateMainFormDropdowns();
            };

            window.switchLockTab = (tab) => {
                if(tab === 'class') {
                    if(document.getElementById('tab_lock_class')) {
                        document.getElementById('tab_lock_class').classList.add('text-navy', 'font-bold', 'border-b-2', 'border-navy');
                        document.getElementById('tab_lock_class').classList.remove('text-gray-500');
                        document.getElementById('tab_lock_teacher').classList.remove('text-navy', 'font-bold', 'border-b-2', 'border-navy');
                        document.getElementById('tab_lock_teacher').classList.add('text-gray-500');
                    }
                    
                    document.getElementById('schForm').classList.remove('hidden');
                    document.getElementById('schForm').classList.add('flex');
                    document.getElementById('schTeacherForm').classList.add('hidden');
                    document.getElementById('schTeacherForm').classList.remove('flex');
                } else {
                    if(document.getElementById('tab_lock_teacher')) {
                        document.getElementById('tab_lock_teacher').classList.add('text-navy', 'font-bold', 'border-b-2', 'border-navy');
                        document.getElementById('tab_lock_teacher').classList.remove('text-gray-500');
                        document.getElementById('tab_lock_class').classList.remove('text-navy', 'font-bold', 'border-b-2', 'border-navy');
                        document.getElementById('tab_lock_class').classList.add('text-gray-500');
                    }
                    
                    document.getElementById('schTeacherForm').classList.remove('hidden');
                    document.getElementById('schTeacherForm').classList.add('flex');
                    document.getElementById('schForm').classList.add('hidden');
                    document.getElementById('schForm').classList.remove('flex');
                }
            };

            window.openSchBaseModal = () => {
                window.resetSchBaseForm();
                document.getElementById('schBaseModalTitle').innerText = 'เพิ่มรายการใหม่';
                
                if(isLockMode) {
                    window.switchLockTab('class');
                    document.getElementById('tab_lock_class').classList.remove('hidden');
                    document.getElementById('tab_lock_teacher').classList.remove('hidden');
                }
                
                document.getElementById('schBaseModal').classList.remove('hidden');
            };

            window.closeSchBaseModal = () => {
                document.getElementById('schBaseModal').classList.add('hidden');
            };

            window.courseLookup = courses;
            window.autoFillCourse = () => {
                let code = document.getElementById('sch_code').value;
                let c = window.courseLookup.find(x => x['รหัสวิชา'] === code);
                if(c) {
                    document.getElementById('sch_name').value = c['ชื่อวิชา'];
                    document.getElementById('sch_teacher').value = c['ชื่อครูผู้สอน'];
                } else {
                    document.getElementById('sch_name').value = '';
                    document.getElementById('sch_teacher').value = '';
                }
            }

            window.updateMainFormDropdowns = (existingData = null) => {
                const pairRows = document.querySelectorAll('#sch_room_plan_container .room-plan-pair');
                let room = '';
                let plan = '';
                if(pairRows.length > 0) {
                    let rpEl = pairRows[0].querySelector('.rp-room');
                    let planEl = pairRows[0].querySelector('.rp-plan');
                    room = rpEl ? rpEl.value.trim() : '';
                    plan = planEl ? planEl.value : '';
                }
                const dayChks = Array.from(document.querySelectorAll('.sch-day-chk:checked')).map(c => c.value);
                const periodChks = Array.from(document.querySelectorAll('.sch-period-chk:checked')).map(c => parseInt(c.value));
                const dlCode = document.getElementById('dl_sch_code');

                if (!room || !plan) {
                    dlCode.innerHTML = '';
                    document.getElementById('sch_location').value = '';
                    window.baseLocationHtml = '<div class="col-span-full text-center text-gray-500 py-8 flex flex-col items-center"><i class="fas fa-exclamation-circle text-4xl text-gray-300 mb-3"></i><p>กรุณาระบุข้อมูล ระดับชั้น/ห้อง, แผน ให้ครบถ้วนก่อน</p></div>';
                    if(!existingData) {
                        document.getElementById('sch_name').value = '';
                        document.getElementById('sch_teacher').value = '';
                    }
                    return;
                }

                const roomData = window.scheduleBaseData.filter(d => d['ห้องเรียน'] === room && d['แผนการเรียน'] === plan);
                let scheduledCounts = {};
                roomData.forEach(slot => {
                    let code = String(slot['รหัสวิชา'] || '').trim();
                    if (existingData && slot.originalIndex === existingData.originalIndex) return; 
                    if (!scheduledCounts[code]) scheduledCounts[code] = 0;
                    scheduledCounts[code]++;
                });

                let targetCourses = window.courseLookup.filter(c => {
                    let cRooms = (c['ชั้นที่สอน'] || c['ชั้นที่เปิดสอน'] || '').split(',').map(r => r.trim()).filter(r => r);
                    let cPlans = (c['แผนการเรียน'] || '').split(',').map(p => p.trim()).filter(p => p);
                    let cTerm = String(c['ภาคเรียนที่'] || '').trim();

                    let matchPlan = cPlans.includes(plan);
                    let matchRoom = cRooms.includes(room);
                    let matchTerm = cTerm === String(window.schCurrentTerm);
                    let isRoomInPlanSettings = window.schPlanMappings[plan] && window.schPlanMappings[plan].includes(room);
                    
                    if (!matchTerm) return false;

                    if (cRooms.length > 0) return matchPlan && matchRoom;
                    else if (Object.keys(window.schPlanMappings).length > 0) return matchPlan && isRoomInPlanSettings;
                    else return matchPlan;
                });

                let busyTeachers = new Set();
                if (dayChks.length > 0 && periodChks.length > 0) {
                    window.scheduleBaseData.forEach(slot => {
                        if (dayChks.includes(slot['วัน']) && periodChks.includes(parseInt(slot['คาบที่']))) {
                            if (existingData && slot.originalIndex === existingData.originalIndex) return;
                            if (slot['ชื่อครูผู้สอน']) {
                                String(slot['ชื่อครูผู้สอน']).split(',').forEach(t => busyTeachers.add(t.replace(/\s+/g, '')));
                            }
                        }
                    });
                }
                
                let optionsHtml = '';
                targetCourses.forEach(c => {
                    let code = String(c['รหัสวิชา'] || '').trim();
                    let name = String(c['ชื่อวิชา'] || '').trim();
                    let teacherList = String(c['ชื่อครูผู้สอน'] || '').split(',').map(t => t.replace(/\s+/g, ''));
                    let creditStr = String(c['หน่วยกิต'] || '').trim();
                    let credit = parseFloat(creditStr);
                    let required = (!isNaN(credit) && credit > 0) ? (credit * 2) : 0; 
                    let scheduled = scheduledCounts[code] || 0;
                    let remaining = required - scheduled;
                    
                    let isBusy = teacherList.some(t => busyTeachers.has(t));
                    let isEditingThis = existingData && existingData['รหัสวิชา'] === code;

                    // ในโหมดล๊อควิชา ปล่อยให้เลือกรายวิชาได้อิสระ ไม่จำกัดหน่วยกิตและไม่เช็คครูติดสอน
                    if (isLockMode || required === 0 || remaining > 0 || isEditingThis) {
                        if (!isLockMode && isBusy && !isEditingThis) {
                            optionsHtml += `<option value="${code}" disabled>${code} - ${name} (ครูติดสอน)</option>`;
                        } else {
                            if (isLockMode || required === 0) {
                                optionsHtml += `<option value="${code}">${code} - ${name}</option>`;
                            } else {
                                optionsHtml += `<option value="${code}">${code} - ${name} (เหลือ ${remaining} คาบ)</option>`;
                            }
                        }
                    }
                });
                dlCode.innerHTML = optionsHtml;
                window.autoFillCourse(); 

                if (dayChks.length === 0 || periodChks.length === 0) {
                    window.baseLocationHtml = '<div class="col-span-full text-center text-gray-500 py-8 flex flex-col items-center"><i class="fas fa-exclamation-circle text-4xl text-gray-300 mb-3"></i><p>กรุณาระบุ วัน และ คาบเรียน ให้ครบถ้วนก่อนเลือกสถานที่</p></div>';
                } else {
                    let busyLocations = new Set();
                    window.scheduleBaseData.forEach(slot => {
                        if (dayChks.includes(slot['วัน']) && periodChks.includes(parseInt(slot['คาบที่']))) {
                            if (existingData && slot.originalIndex === existingData.originalIndex) return;
                            let loc = String(slot['สถานที่เรียน'] || '').trim();
                            if (loc && loc !== '-') busyLocations.add(loc);
                        }
                    });

                    let allLocs = [...window.schTeachingRooms];
                    if (existingData && existingData['สถานที่เรียน'] && existingData['สถานที่เรียน'] !== '-') {
                        let extLoc = String(existingData['สถานที่เรียน']).trim();
                        if (!allLocs.includes(extLoc)) {
                            allLocs.push(extLoc);
                        }
                    }

                    let gridHtml = '';
                    if (allLocs.length === 0) {
                        gridHtml = '<div class="col-span-full text-center py-6 text-gray-500">ไม่มีข้อมูลสถานที่เรียนในระบบ (กรุณาเพิ่มในการตั้งค่า)</div>';
                    } else {
                        let groupedLocs = {};
                        allLocs.forEach(loc => {
                            let cleanLoc = String(loc).trim();
                            if (!cleanLoc) return;
                            let firstChar = cleanLoc.charAt(0);
                            let groupName = "ห้องปฏิบัติการ";
                            if (/[0-9]/.test(firstChar)) {
                                groupName = "อาคาร " + firstChar;
                            }
                            if (!groupedLocs[groupName]) groupedLocs[groupName] = [];
                            groupedLocs[groupName].push(cleanLoc);
                        });

                        let groupKeys = Object.keys(groupedLocs).sort((a, b) => {
                            if (a === "ห้องปฏิบัติการ") return 1;
                            if (b === "ห้องปฏิบัติการ") return -1;
                            return a.localeCompare(b);
                        });

                        gridHtml = '<div class="flex flex-wrap items-stretch justify-center gap-3 w-full">';
                        groupKeys.forEach(gKey => {
                            let gridColsClass = gKey === "ห้องปฏิบัติการ" 
                                ? "grid grid-cols-[repeat(auto-fit,minmax(110px,1fr))] gap-2" 
                                : "grid grid-cols-[repeat(auto-fit,minmax(75px,1fr))] gap-1.5";
                                
                            gridHtml += `<div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 flex-auto min-w-[180px] max-w-full flex flex-col">
                                <h4 class="font-bold text-navy border-b border-gold pb-1.5 mb-3 text-center text-sm">${gKey}</h4>
                                <div class="${gridColsClass}">`;
                            
                            groupedLocs[gKey].sort((a, b) => String(a).localeCompare(String(b), undefined, {numeric: true, sensitivity: 'base'})).forEach(loc => {
                                let isEditingThisLoc = existingData && existingData['สถานที่เรียน'] === loc;
                                if (!isLockMode && busyLocations.has(loc) && !isEditingThisLoc) {
                                    gridHtml += `
                                        <button type="button" disabled class="p-1.5 bg-red-50 border border-red-200 rounded text-red-400 font-medium cursor-not-allowed opacity-60 flex flex-col items-center justify-center min-h-[40px] shadow-sm relative overflow-hidden">
                                            <span class="line-through z-10 text-[11px] whitespace-normal break-words w-full px-1 text-center leading-snug">${loc}</span>
                                            <span class="text-[9px] mt-1 text-red-600 bg-red-100 px-1.5 py-0.5 rounded z-10 leading-none">ไม่ว่าง</span>
                                        </button>`;
                                } else {
                                    gridHtml += `
                                        <button type="button" onclick="selectLocation('${loc.replace(/'/g, "\\'")}')" class="p-1.5 bg-white border border-gray-300 hover:border-gold hover:bg-lightgold hover:bg-opacity-20 hover:text-navy rounded text-gray-700 font-semibold transition duration-200 flex items-center justify-center min-h-[40px] shadow-sm hover:shadow-md text-[11px] whitespace-normal break-words w-full px-1 text-center leading-snug">
                                            ${loc}
                                        </button>`;
                                }
                            });
                            gridHtml += `</div></div>`;
                        });
                        gridHtml += '</div>';
                    }
                    window.baseLocationHtml = gridHtml;
                }
                
                if (existingData) {
                    document.getElementById('sch_location').value = existingData['สถานที่เรียน'] || '';
                }
            };

            const tbody = document.getElementById('schTbody');
            
            window.filterSchBaseTable = () => {
                const room = document.getElementById('filter_sch_room') ? document.getElementById('filter_sch_room').value : 'all';
                const codeSearch = document.getElementById('filter_sch_code') ? document.getElementById('filter_sch_code').value.toLowerCase().trim() : '';
                const teacher = document.getElementById('filter_sch_teacher') ? document.getElementById('filter_sch_teacher').value : 'all';

                let filtered = window.scheduleBaseData.filter(d => {
                    let matchRoom = (room === 'all') || (d['ห้องเรียน'] === room);
                    let matchTeacher = (teacher === 'all') || String(d['ชื่อครูผู้สอน'] || '').split(',').map(t=>t.replace(/\s+/g, '')).includes(String(teacher).replace(/\s+/g, ''));
                    let matchCode = (codeSearch === '') || 
                                    (String(d['รหัสวิชา'] || '').toLowerCase().includes(codeSearch)) || 
                                    (String(d['ชื่อวิชา'] || '').toLowerCase().includes(codeSearch));
                    return matchRoom && matchTeacher && matchCode;
                });
                window.renderSchRows(filtered);
            };

            window.clearSchBaseFilters = () => {
                if(document.getElementById('filter_sch_room')) document.getElementById('filter_sch_room').value = 'all';
                if(document.getElementById('filter_sch_code')) document.getElementById('filter_sch_code').value = '';
                if(document.getElementById('filter_sch_teacher')) document.getElementById('filter_sch_teacher').value = 'all';
                window.filterSchBaseTable();
            };

            window.renderSchRows = (data) => {
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="p-4 text-center text-gray-500 italic">ไม่พบข้อมูลที่ตรงกับเงื่อนไข</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map((d) => {
                    let isActivity = d['รหัสวิชา'] === 'กิจกรรม' || d['ห้องเรียน'] === '-';
                    let trClass = d.isPending ? 'opacity-60 bg-gray-50' : (isActivity ? 'bg-purple-50 hover:bg-purple-100' : 'hover:bg-gray-50');
                    return `
                    <tr class="border-b ${trClass}">
                        <td class="p-2 border text-center">${d['ห้องเรียน']}</td><td class="p-2 border text-center">${d['แผนการเรียน'] || '-'}</td><td class="p-2 border text-center">${d['วัน']}</td>
                        <td class="p-2 border text-center">${d['คาบที่']}</td>
                        <td class="p-2 border font-bold ${isActivity ? 'text-purple-700' : ''}">${d['รหัสวิชา']}</td>
                        <td class="p-2 border ${isActivity ? 'text-purple-700 font-semibold' : ''}">${d['ชื่อวิชา']}</td>
                        <td class="p-2 border">${d['ชื่อครูผู้สอน']}</td><td class="p-2 border text-center">${d['สถานที่เรียน'] || '-'}</td>
                        <td class="p-2 border text-center whitespace-nowrap">
                            ${d.isPending ?
                                `<i class="fas fa-spinner fa-spin text-blue-600"></i>` :
                                `<button type="button" onclick="editSch('${d.originalIndex}')" class="text-blue-600 hover:text-blue-800 mx-1"><i class="fas fa-edit"></i></button>
                                 <button type="button" onclick="deleteSchBaseRow('${sheetName}', '${d.originalIndex}')" class="text-red-600 hover:text-red-800 mx-1"><i class="fas fa-trash"></i></button>`
                            }
                        </td>
                    </tr>
                `}).join('');

                if(await Swal.fire({title: 'ยืนยันการลบ?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ลบเลย'}).then(r => r.isConfirmed)){
                    
                    let itemToDelete = window.scheduleBaseData.find(item => String(item.originalIndex) === String(rowIndexStr));
                    if(!itemToDelete) return Swal.fire('ข้อผิดพลาด', 'ไม่พบข้อมูลที่จะลบ', 'error');

                    window.scheduleBaseData = window.scheduleBaseData.filter(item => String(item.originalIndex) !== String(rowIndexStr));
                    if (typeof window.filterSchBaseTable === 'function') { window.filterSchBaseTable(); } else { window.renderSchRows(window.scheduleBaseData); }

                    if (String(rowIndexStr).startsWith('temp_')) return;

                    window.pendingSchBaseSync++;
                    window.updateSchBaseSyncStatus();

                    // คลีนข้อมูลก่อนส่ง
                    let cleanData = { ...itemToDelete };
                    delete cleanData.originalIndex;
                    delete cleanData.isPending;

                    try {
                        // ส่งลบข้อมูลที่ชีทหลัก
                        await callAPI('deleteData', { sheetName: targetSheetName, rowData: cleanData }, true);

            window.forceRefreshSchGrid = async (silent = false) => {
                if (!silent) showLoading(true);
                let [newDataList, newCourses] = await Promise.all([
                    getCachedData('กำหนดตารางสอน', true, silent),
                    getCachedData('ข้อมูลรายวิชา', true, silent)
                ]);
                window.interactiveSchData = newDataList.map((d, index) => ({...d, originalIndex: index}));
                window.interactiveCourses = newCourses;
                
                const gridRoomEl = document.getElementById('grid_room');
                const gridTNameEl = document.getElementById('grid_t_name');
                
                if (window.interactiveViewMode === 'student' && gridRoomEl && gridRoomEl.value) {
                    window.refreshSchGrid();
                } else if (window.interactiveViewMode === 'teacher' && gridTNameEl && gridTNameEl.value) {
                    window.refreshSchGrid();
                }
                
                const schModalEl = document.getElementById('schModal');
                if (schModalEl && !schModalEl.classList.contains('hidden')) {

                if (!silent) {
                    showLoading(false);
                    Swal.fire({icon: 'success', title: 'รีเฟรชสำเร็จ', text: 'ดึงข้อมูลล่าสุดจากระบบแล้ว', timer: 1500, showConfirmButton: false});

                    statusEl.classList.remove('text-green-600');
                    statusEl.classList.add('text-blue-600');
                } else {
                    statusEl.innerHTML = '<i class="fas fa-check-circle text-green-500"></i> ข้อมูลบันทึกแล้ว';
                    statusEl.classList.remove('text-blue-600');
                    statusEl.classList.add('text-green-600');

            window.showPermissionAlert = (creatorName) => {

                    title: 'ไม่มีสิทธิ์แก้ไข',
                    text: 'รายการนี้ถูกบันทึกโดย ' + (creatorName || 'ผู้อื่น') + ' คุณไม่สามารถแก้ไขหรือลบได้'
                });
            };

            window.refreshSchGrid = () => {
                let targetData = [];
                let titleText = '';
                const room = document.getElementById('grid_room').value;
                const plan = document.getElementById('grid_plan').value;
                const teacher = document.getElementById('grid_t_name').value;

                if (window.interactiveViewMode === 'student') {
                    if (!room || !plan) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกระดับชั้น/ห้อง และ แผนการเรียน ก่อน', 'warning');
                    titleText = 'ตารางสอนห้อง ' + room + ' (แผนฯ: ' + plan + ')';
                    targetData = window.interactiveSchData.filter(d => d['ห้องเรียน'] === room && d['แผนการเรียน'] === plan);
                } else {
                    if (!teacher) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกครูผู้สอนก่อน', 'warning');
                    titleText = 'ตารางสอนของ ' + teacher;
                    // แก้ไข: ให้ค้นหาชื่อครูจากรายการที่คั่นด้วยลูกน้ำ และลบช่องว่างออกก่อนเทียบ
                    let targetTeacherMatch = String(teacher).replace(/\s+/g, '');
                    targetData = window.interactiveSchData.filter(d => {
                        let tList = String(d['ชื่อครูผู้สอน'] || '').split(',').map(t => t.replace(/\s+/g, ''));
                        return tList.includes(targetTeacherMatch);
                    });
                }

                document.getElementById('gridContainer').classList.remove('hidden');
                document.getElementById('gridTitleDisplay').innerText = titleText;

                let breakPeriod = parseInt(window.interactiveSettings?.break_period || 4);
                let breakDuration = parseInt(window.interactiveSettings?.break_duration || 60);
                let periodDuration = parseInt(window.interactiveSettings?.duration || 50);
                let startParts = (window.interactiveSettings?.start || '08:30').split(':');
                let currentTimeMin = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);

                let ths = '<th class="border border-gray-400 p-2 bg-navy text-white w-24 text-center align-middle">วัน / คาบ</th>';
                for(let i=1; i<=window.interactivePeriods; i++) {
                    let isBreak = (i === breakPeriod);
                    let currentDur = isBreak ? breakDuration : periodDuration;
                    let startStr = Math.floor(currentTimeMin/60).toString().padStart(2,'0') + ':' + (currentTimeMin%60).toString().padStart(2,'0');
                    currentTimeMin += currentDur;
                    let endStr = Math.floor(currentTimeMin/60).toString().padStart(2,'0') + ':' + (currentTimeMin%60).toString().padStart(2,'0');
                    
                    if (isBreak) {
                        ths += '<th class="border border-gray-400 p-2 bg-gray-500 text-white text-center w-16">พัก<br><span class="text-[10px] font-normal text-gray-200">' + startStr + ' - ' + endStr + '</span></th>';
                    } else {
                        ths += '<th class="border border-gray-400 p-2 bg-navy text-white text-center w-32">คาบ ' + i + '<br><span class="text-[11px] font-normal text-lightgold">' + startStr + ' - ' + endStr + '</span></th>';
                    }
                }
                document.getElementById('gridThead').innerHTML = '<tr>' + ths + '</tr>';

                const days = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์'];
                let trs = '';

                days.forEach(day => {
                    let tds = '';
                    let i = 1;
                    
                    while (i <= window.interactivePeriods) {
                        if (i === breakPeriod) {
                            tds += '<td class="border border-gray-300 bg-gray-200 text-center align-middle text-gray-500 text-xs w-16"><i class="fas fa-utensils mb-1"></i><br>พัก</td>';

                            continue;
                        }

                        let slots = targetData.filter(s => s['วัน'] === day && parseInt(s['คาบที่']) === i);
                        let colspan = 1;

                        if (slots.length > 0) {
                            let nextI = i + 1;
                            while (nextI <= window.interactivePeriods && nextI !== breakPeriod) {
                                let nextSlots = targetData.filter(s => s['วัน'] === day && parseInt(s['คาบที่']) === nextI);
                                if (window.areSlotsEqual(slots, nextSlots)) {
                                    colspan++;
                                    nextI++;
                                } else {
                                    break;
                                }
                            }
                        }

                        if(slots.length > 0) {
                            let hasPending = slots.some(s => s.isPending);

                            let displaySlots = slots;
                            if (window.interactiveViewMode === 'teacher') {
                                let grouped = {};
                                slots.forEach(slot => {
                                    let key = `${slot['รหัสวิชา']}_${slot['ชื่อวิชา']}`;
                                    if (!grouped[key]) {
                                        grouped[key] = { ...slot, allRooms: [slot['ห้องเรียน']] };
                                    } else {
                                        if (slot['ห้องเรียน'] !== '-' && !grouped[key].allRooms.includes(slot['ห้องเรียน'])) {

                                    }
                                });

                                    displaySub = cleanName ? 'ครู' + cleanName.split(' ')[0] : '';
                                } else {
                                    if (firstSlot.allRooms && firstSlot.allRooms.length > 0) {

                                        displaySub = firstSlot['ห้องเรียน'] === '-' ? 'กิจกรรม' : 'ชั้น ' + firstSlot['ห้องเรียน'];

                                tds += `
                                    <td colspan="${colspan}" class="border border-gray-300 p-2 text-center align-middle bg-blue-50 relative opacity-70">
                                        <div class="font-bold text-xs text-navy">${firstSlot['รหัสวิชา']}</div>
