                    document.getElementById('wrapper_dl_plan').classList.add('hidden');
                    document.getElementById('wrapper_dl_group').classList.remove('hidden');
                    document.getElementById('wrapper_dl_teacher').classList.remove('hidden');
                    updateTeacherOptions();
                }
            }

            window.updateTeacherOptions = () => {
                const group = document.getElementById('dl_group').value;
                const teacherSelect = document.getElementById('dl_teacher');
                let filteredTeachers = teachers;
                
                // ฟังก์ชันตัวช่วยกำจัดช่องว่างส่วนเกิน เพื่อให้กรองได้แม่นยำ
                const normalizeStr = (str) => String(str || '').replace(/\s+/g, ' ').trim();
                
                if (group !== 'all') {
                    filteredTeachers = teachers.filter(t => normalizeStr(t['กลุ่มสาระการเรียนรู้']) === normalizeStr(group));
                }
                
                teacherSelect.innerHTML = `
                    <option value="all">ทุกคนในกลุ่มสาระ</option>
                    ${filteredTeachers.map(t => `<option value="${String(t['ชื่อ-สกุล'] || '').trim()}">${normalizeStr(t['ชื่อ-สกุล'])}</option>`).join('')}
                `;
            }

            window.forceRefreshDownload = async () => {
                showLoading(true);
                await Promise.all([
                    getCachedData('ผลการประมวลตารางสอน', true),
                    getCachedData('ข้อมูลครู', true)
                ]);
                showLoading(false);
                Swal.fire({icon: 'success', title: 'รีเฟรชสำเร็จ', text: 'ดึงข้อมูลล่าสุดจากระบบแล้ว', timer: 1500, showConfirmButton: false}).then(() => {
                    loadPage('download');
                });
            };

            window.previewTimetable = () => {
                const type = document.getElementById('dl_type').value;
                let tablesToRender = []; // เก็บข้อมูลแต่ละตารางแยกกัน

                if (type === 'student') {
                    const selectedRoom = document.getElementById('dl_room').value;
                    const selectedPlan = document.getElementById('dl_plan').value;
                    
                    if (!selectedRoom) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกชั้น/ห้อง', 'warning');

                    // 1. ดึงข้อมูลห้องที่จะนำมาแสดง
                    let roomsToProcess = selectedRoom === 'all' ? Object.keys(processedData.student) : (processedData.student[selectedRoom] ? [selectedRoom] : []);

                    roomsToProcess.forEach(roomKey => {
                        let roomData = processedData.student[roomKey] || [];
                        
                        // 2. จัดกลุ่มข้อมูลในแต่ละห้องตาม 'แผนการเรียน'
                        let planGroups = {};
                        roomData.forEach(slot => {
                            let plan = slot['แผนการเรียน'] || '-';
                            if (!planGroups[plan]) planGroups[plan] = [];
                            planGroups[plan].push(slot);
                        });

                        // 3. กรองตามแผนการเรียนที่เลือกใน Select (ถ้าไม่ได้เลือกทุกแผน)
                        let plansToProcess = Object.keys(planGroups);
                        if (selectedPlan !== 'all') {
                            plansToProcess = plansToProcess.filter(p => p === selectedPlan);
                        }

                        // 4. นำเข้าตารางที่จะวาดแยกกัน
                        plansToProcess.forEach(planKey => {
                            let pText = planKey === '-' ? 'ทั่วไป' : planKey;
                            tablesToRender.push({
                                type: 'student',
                                subtitle: `ชั้น/ห้อง: ${roomKey} &nbsp;|&nbsp; แผนการเรียน: ${pText}`,
                                scheduleMap: planGroups[planKey],
                                sortKey: roomKey + planKey
                            });
                        });
                    });

                } else {
                    const selectedGroup = document.getElementById('dl_group').value;
                    const selectedTeacher = document.getElementById('dl_teacher').value;

                    // ฟังก์ชันตัวช่วยกำจัดช่องว่างส่วนเกินทั้งหมด เพื่อให้เปรียบเทียบชื่อได้แม่นยำ 100%
                    const normalizeStr = (str) => String(str || '').replace(/\s+/g, ' ').trim();
                    const normalizedSelectedTeacher = normalizeStr(selectedTeacher);
                    const normalizedSelectedGroup = normalizeStr(selectedGroup);

                    // สร้าง Lookup สำหรับหากลุ่มสาระของครู
                    const teacherGroupMap = {};
                    teachers.forEach(t => {
                        teacherGroupMap[normalizeStr(t['ชื่อ-สกุล'])] = normalizeStr(t['กลุ่มสาระการเรียนรู้']);
                    });

                    let teachersToProcess = [];

                    if (selectedTeacher !== 'all') {
                        // เลือกครูคนเดียว: ค้นหาจากคีย์ที่มีอยู่ในตารางสอน (ที่อาจมีช่องว่างไม่ตรงกันเป๊ะ)
                        let actKey = Object.keys(processedData.teacher).find(k => normalizeStr(k) === normalizedSelectedTeacher);
                        if (actKey) {
                            teachersToProcess = [actKey];
                        }
                    } else {
                        // เลือก "ทุกคนในกลุ่มสาระ"
                        teachersToProcess = Object.keys(processedData.teacher).filter(teacherKey => {
                            if (selectedGroup === 'all') return true;
                            let tGroup = teacherGroupMap[normalizeStr(teacherKey)];
                            return tGroup === normalizedSelectedGroup;
                        });
                    }

                    if (teachersToProcess.length === 0) {
                        document.getElementById('timetableCanvas').innerHTML = `
                            <div class="bg-white p-8 w-[1000px] shadow-lg relative text-center text-gray-400 mt-10 rounded-xl">
                                <i class="fas fa-search text-4xl mb-2"></i><br>ไม่พบข้อมูลตารางสอนของครูในกลุ่มสาระที่เลือก
                                <p class="text-sm mt-3 text-red-400">*หากท่านเพิ่งจัดตารางสอนเสร็จ กรุณาไปที่เมนู <b>"ประมวลผลตารางสอน"</b> ก่อนกดดูตารางครับ</p>
                            </div>
                        `;
                        return Swal.fire('แจ้งเตือน', 'ไม่พบข้อมูลตารางสอน (อาจยังไม่ได้ประมวลผล หรือไม่มีคาบสอน)', 'info');
                    }

                    teachersToProcess.forEach(teacherKey => {
                        let tGroup = teacherGroupMap[normalizeStr(teacherKey)] || 'ไม่ระบุกลุ่มสาระ';
                        let scheduleMap = processedData.teacher[teacherKey] || [];
                        
                        // คำนวณจำนวนคาบต่อสัปดาห์ (นับเฉพาะคาบที่ไม่ซ้ำกัน เผื่อกรณีสอนควบห้องในคาบเดียวกัน)
                        let uniquePeriods = new Set(scheduleMap.map(s => s['วัน'] + '_' + s['คาบที่'])).size;

                        tablesToRender.push({
                            type: 'teacher',
                            subtitle: `ครูผู้สอน: ${teacherKey} &nbsp;|&nbsp; กลุ่มสาระฯ: ${tGroup} &nbsp;|&nbsp; รวม: ${uniquePeriods} คาบ/สัปดาห์`,
                            scheduleMap: scheduleMap,
                            sortKey: tGroup + '_' + teacherKey // เรียงตามกลุ่มสาระแล้วตามด้วยชื่อครู
                        });
                    });
                }
                
                if (tablesToRender.length === 0) {
                    document.getElementById('timetableCanvas').innerHTML = `
                        <div class="bg-white p-8 w-[1000px] shadow-lg relative text-center text-gray-400 mt-10 rounded-xl">
                            <i class="fas fa-search text-4xl mb-2"></i><br>ไม่พบข้อมูลตารางตามเงื่อนไขที่เลือก
                        </div>
                    `;
                    return Swal.fire('แจ้งเตือน', 'ไม่พบข้อมูลตารางตามเงื่อนไขที่เลือก', 'info');
                }

                // เรียงลำดับตารางให้เป็นระเบียบตามชื่อห้องและแผน
                tablesToRender.sort((a,b) => a.sortKey.localeCompare(b.sortKey));

                // คำนวณเวลาและคาบพักสำหรับสร้างหัวตาราง (เหมือนกันทุกตาราง)
                let periods = settings.periods || 8;
                let breakPeriod = parseInt(settings.break_period || 4);
                let breakDuration = parseInt(settings.break_duration || 60);
                let periodDuration = parseInt(settings.duration || 50);
                let startParts = (settings.start || '08:30').split(':');
                let initialTimeMin = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);

                let thsTemplate = '';
                let currentTimeMinHeader = initialTimeMin;
                for(let i=1; i<=periods; i++) {
                    let isBreak = (i === breakPeriod);
                    let currentDur = isBreak ? breakDuration : periodDuration;
                    let startStr = Math.floor(currentTimeMinHeader/60).toString().padStart(2,'0') + ':' + (currentTimeMinHeader%60).toString().padStart(2,'0');
                    currentTimeMinHeader += currentDur;
                    let endStr = Math.floor(currentTimeMinHeader/60).toString().padStart(2,'0') + ':' + (currentTimeMinHeader%60).toString().padStart(2,'0');
                    
                    if (isBreak) {
                         thsTemplate += `<th class="border border-navy p-2 bg-gray-300 text-gray-700 w-16 align-middle">
                                    พัก<br><span class="text-[9px] font-normal">${startStr}-${endStr}</span>
                                </th>`;
                    } else {
                        thsTemplate += `<th class="border border-navy p-2 bg-lightgold text-navy w-24 align-middle">
                                    คาบ ${i}<br><span class="text-[10px] font-normal text-gray-700">${startStr}-${endStr}</span>
                                </th>`;
                    }
                }

                const days = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์'];
                let allHtml = '';
                
                // วนลูปวาดตารางทีละหน้าตามข้อมูลที่จัดกลุ่มมาได้
                tablesToRender.forEach((tableData) => {
                    let trs = '';
                    days.forEach(day => {
                        let tds = '';
                        for(let i=1; i<=periods; i++) {
                            if (i === breakPeriod) {
                                tds += `<td class="border border-navy p-2 text-center align-middle bg-gray-100 text-gray-500 text-xs w-16">
                                            <i class="fas fa-utensils mb-1"></i><br>พัก
                                        </td>`;
                            } else {
                                // Find matching slots
                                let slots = tableData.scheduleMap.filter(s => s['วัน'] === day && parseInt(s['คาบที่']) === i);
                                
                                if(slots.length > 0) {
                                    let cellContent = slots.map(slot => {
                                        let innerHtml = '';
                                        if(settings.show_code) innerHtml += `<div class="font-bold text-xs">${slot['รหัสวิชา']}</div>`;
                                        if(settings.show_name) innerHtml += `<div class="text-[11px] text-navy leading-tight">${slot['ชื่อวิชา']}</div>`;
                                        
                                        if(settings.show_teacher && type === 'student') {
                                            let teacherName = String(slot['ชื่อครูผู้สอน'] || '');
                                            let cleanName = teacherName.replace(/^(นาย|นางสาว|นาง|น\.ส\.|ว่าที่\s?ร\.ต\.|ว่าที่ร้อยตรี|ครู)\s*/g, '').trim();
                                            let displayTeacher = cleanName ? 'ครู' + cleanName.split(' ')[0] : '';
                                            innerHtml += `<div class="text-[10px] text-blue-700 mt-1">${displayTeacher}</div>`;
                                        }
                                        
                                        if(settings.show_room && type === 'teacher') innerHtml += `<div class="text-[11px] text-gray-600 font-medium mt-1"><span class="text-red-600">${slot['ห้องเรียน']}</span></div>`;
                                        
                                        if(slot['สถานที่เรียน']) innerHtml += `<div class="text-[9px] text-gray-600 mt-0.5">${slot['สถานที่เรียน']}</div>`;
                                        
                                        // สำหรับตารางครู ถ้ามีซ้อนทับกันหลายห้องจะแสดงห้องกำกับ
                                        if (type === 'teacher' && slots.length > 1) {
                                             innerHtml += `<div class="text-[9px] text-purple-600 font-semibold mt-0.5">[${slot['ห้องเรียน']}]</div>`;
                                        }

                                        return `<div class="border-b border-blue-200 pb-1 mb-1 last:border-0 last:pb-0 last:mb-0">${innerHtml}</div>`;
                                    }).join('');
                                    
                                    tds += `<td class="border border-navy p-1 text-center align-top bg-blue-50">${cellContent}</td>`;
                                } else {
                                    tds += `<td class="border border-navy p-2 text-center text-gray-300 align-middle">-</td>`;
                                }
                            }
                        }
                        trs += `<tr><td class="border border-navy p-2 font-bold text-center bg-navy text-white w-20 align-middle">${day}</td>${tds}</tr>`;
                    });

                    // สร้างชื่อไฟล์ตามเงื่อนไข (เพื่อใช้ตอนดาวน์โหลด)
                    let cleanSubtitle = tableData.subtitle.replace(/&nbsp;\|&nbsp;/g, '_').replace(/<[^>]*>?/gm, '').replace(/[:/\s]+/g, '-');
                    let filename = `ตาราง${tableData.type === 'student' ? 'เรียน' : 'สอน'}_${cleanSubtitle}.jpg`;

                    // ใส่ Container ตารางแต่ละอันต่อกัน
                    allHtml += `
                        <div class="timetable-page bg-white p-8 w-[1000px] shadow-lg relative border-t-4 border-navy rounded-sm" data-filename="${filename}">
                            <div class="flex items-center justify-center mb-6 relative">
                                <img src="${settings.logo || 'https://www.ns.ac.th/wp-content/uploads/2024/12/cropped-logo-sq.png'}" class="absolute left-0 w-24 h-24 object-contain app-logo">
                                <div class="text-center">
                                    <h2 class="text-2xl font-bold text-navy">${schoolName}</h2>
                                    <h3 class="text-xl font-bold text-gold">ตาราง${tableData.type === 'student' ? 'เรียน' : 'สอน'} ภาคเรียนที่ ${settings.term}/${settings.year}</h3>
                                    <p class="text-sm font-semibold mt-1 text-gray-700">${tableData.subtitle}</p>
                                </div>
                            </div>
                            <table class="w-full border-collapse border-2 border-navy text-sm">
                                <thead>
                                    <tr><th class="border border-navy p-2 bg-navy text-white">วัน/คาบ</th>${thsTemplate}</tr>
                                </thead>
                                <tbody>${trs}</tbody>
                            </table>
                            <div class="mt-4 text-right text-[10px] text-gray-500">จัดทำโดย ระบบจัดตารางสอนออนไลน์ - ${schoolName} | พัฒนาโดย ครูมูฮัมหมัดตัซกีน บาราเฮง ครูโรงเรียนนราสิกขาลัย</div>
                        </div>
                    `;
                });

                document.getElementById('timetableCanvas').innerHTML = allHtml;
            }

            window.downloadAsJPG = async () => {
                const pages = document.querySelectorAll('.timetable-page');
                if(pages.length === 0) return Swal.fire('แจ้งเตือน', 'ไม่มีข้อมูลตารางให้ดาวน์โหลด', 'warning');
                
                // แสดงป๊อปอัพโหลดระหว่างกำลังแคปภาพ
                Swal.fire({
                    title: 'กำลังเตรียมดาวน์โหลด...',
                    text: 'กรุณารอสักครู่ ระบบกำลังสร้างภาพและดาวน์โหลดตารางทั้งหมด ' + pages.length + ' ภาพ',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                // วนลูปดาวน์โหลดทีละภาพแบบหน่วงเวลา เพื่อไม่ให้เบราว์เซอร์บล็อค
                for(let i = 0; i < pages.length; i++) {
                    const page = pages[i];
                    const filename = page.getAttribute('data-filename') || `Timetable_${Date.now()}_${i+1}.jpg`;

                    try {
                        const canvas = await html2canvas(page, { scale: 2, backgroundColor: '#ffffff' });
                        const link = document.createElement('a');
                        link.download = filename;
                        link.href = canvas.toDataURL('image/jpeg', 0.9);
                        link.click();
                        
                        // หน่วงเวลา 0.5 วินาที ต่อการดาวน์โหลด 1 รูป
                        await new Promise(resolve => setTimeout(resolve, 500));
                    } catch(err) {
                        console.error("Error generating image: ", err);
                    }
                }
                
                Swal.fire('สำเร็จ', 'ดาวน์โหลดตารางเสร็จสิ้นทั้งหมด ' + pages.length + ' ไฟล์', 'success');
            }
        }

        // --- 8. ประมวลคำสั่งสอน ---
        async function renderOrders(container) {
            // ดึงการตั้งค่าพื้นฐานและประวัติคำสั่งล่าสุด
            let [settingsArr, orderArr] = await Promise.all([
                getCachedData('การตั้งค่า'),
                getCachedData('คำสั่งสอน', false, true) // ดึงแบบ background ถ้ามี
            ]);
            
            let settings = settingsArr.length > 0 ? JSON.parse(settingsArr[0]['JSON_DATA'] || '{}') : {};
            let lastOrder = orderArr.length > 0 ? orderArr[orderArr.length - 1] : {};
            
            let term = lastOrder['ภาคเรียน'] || settings.term || '1';
            let year = lastOrder['ปีการศึกษา'] || settings.year || '2568';
            let orderNum = lastOrder['เลขที่คำสั่ง'] || '';
            let effDate = lastOrder['เริ่มใช้ตั้งแต่วันที่'] || '';
            let ordDate = lastOrder['สั่ง ณ วันที่'] || '';
            let dirName = lastOrder['ผู้อำนวยการ'] || '';
            let savedGaruda = lastOrder['ตราสัญลักษณ์'] || ''; // ดึงภาพตราครุฑที่เคยบันทึกไว้

            container.innerHTML = `
                <div class="bg-white p-8 rounded-xl shadow-md max-w-3xl mx-auto mt-6">
                    <div class="text-center mb-6">
                        <i class="fas fa-file-signature text-5xl text-navy mb-3"></i>
                        <h3 class="text-2xl font-bold text-navy">ประมวลคำสั่งสอน</h3>
                        <p class="text-gray-500 text-sm mt-1">กำหนดรายละเอียดเพื่อสร้างเอกสารคำสั่งมอบหมายภาระงานสอน</p>
                    </div>
                    
                    <form id="orderForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">เลขที่คำสั่ง</label>
                                <input type="text" id="o_order_number" value="${orderNum}" placeholder="เช่น 176/2568" class="w-full border border-gray-300 rounded-lg p-2.5 focus:border-gold outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">ภาคเรียนที่</label>
                                <input type="number" id="o_term" value="${term}" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:border-gold outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">ปีการศึกษา</label>
                                <input type="number" id="o_year" value="${year}" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:border-gold outline-none">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">เริ่มใช้ตั้งแต่วันที่</label>
                                <input type="date" id="o_effective_date" value="${effDate}" class="w-full border border-gray-300 rounded-lg p-2.5 focus:border-gold outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">สั่ง ณ วันที่</label>
                                <input type="date" id="o_order_date" value="${ordDate}" class="w-full border border-gray-300 rounded-lg p-2.5 focus:border-gold outline-none">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-สกุล ผู้อำนวยการ (สำหรับลงนาม)</label>
                                <input type="text" id="o_director_name" value="${dirName}" placeholder="ระบุชื่อ-สกุล (เช่น นายสมชาย รักดี)" class="w-full border border-gray-300 rounded-lg p-2.5 focus:border-gold outline-none">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">ตราสัญลักษณ์ / ตราครุฑ (สำหรับหัวเอกสารราชการ)</label>
                            <div class="flex items-start space-x-6">
                                <div class="w-28 h-28 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-gray-50 overflow-hidden">
                                    <img id="o_garuda_preview" src="${savedGaruda}" class="max-w-full max-h-full object-contain ${savedGaruda ? '' : 'hidden'}">
                                    <i id="o_garuda_icon" class="fas fa-image text-gray-400 text-3xl ${savedGaruda ? 'hidden' : ''}"></i>
                                </div>
                                <div class="flex-1">
                                    <input type="file" id="o_garuda_upload" accept="image/*" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-navy file:text-white hover:file:bg-opacity-90 cursor-pointer w-full">
                                    <p class="text-xs text-gray-500 mt-2">อัปโหลดไฟล์ภาพ (PNG หรือ JPG พื้นหลังโปร่งใส) เพื่อใช้ประทับบนหัวเอกสารตรงกลางกระดาษ</p>
                                    <input type="hidden" id="o_garuda_base64" value="${savedGaruda}">
                                </div>
                            </div>
                        </div>

                        <div class="pt-4 border-t border-gray-200">
                            <button type="button" onclick="processOrders()" class="w-full bg-navy text-white font-bold text-lg px-6 py-3 rounded-lg hover:bg-opacity-90 shadow-md transition transform hover:-translate-y-1 flex items-center justify-center">
                                <i class="fas fa-magic mr-2"></i> ประมวลผลและสร้างเอกสาร PDF
                            </button>
                        </div>
                    </form>
                </div>
            `;

            // จัดการการอัปโหลดและพรีวิวตราครุฑ
            document.getElementById('o_garuda_upload').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('o_garuda_preview').src = event.target.result;
                    document.getElementById('o_garuda_preview').classList.remove('hidden');
                    document.getElementById('o_garuda_icon').classList.add('hidden');
                    document.getElementById('o_garuda_base64').value = event.target.result;
                }
                reader.readAsDataURL(file);
            });

            // ฟังก์ชันแปลงตัวเลขเป็นเลขไทย
            const toThaiNum = (str) => {
                if (str == null) return '';
                const thaiNums = ['๐', '๑', '๒', '๓', '๔', '๕', '๖', '๗', '๘', '๙'];
                return String(str).replace(/\d/g, (match) => thaiNums[match]);
            };

            // ฟังก์ชันแปลงวันที่เป็นรูปแบบภาษาไทย
            const formatThaiDate = (dateStr) => {
                if (!dateStr) return '........................................';
                const months = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
                const d = new Date(dateStr);
                return `วันที่ ${d.getDate()} เดือน ${months[d.getMonth()]} พ.ศ. ${d.getFullYear() + 543}`;
            };

            window.processOrders = async () => {
                const termInput = document.getElementById('o_term').value;
                const yearInput = document.getElementById('o_year').value;
                const orderNumberInput = document.getElementById('o_order_number').value;
                const orderNumber = orderNumberInput || `............ / ${yearInput}`;
                const effectiveDateInput = document.getElementById('o_effective_date').value;
                const orderDateInput = document.getElementById('o_order_date').value;
                const effectiveDate = formatThaiDate(effectiveDateInput);
                const orderDate = formatThaiDate(orderDateInput);
                const garudaBase64 = document.getElementById('o_garuda_base64').value;
                const directorNameInput = document.getElementById('o_director_name').value;
                const directorName = directorNameInput || '.......................................................';

                if(!termInput || !yearInput) {
                    return Swal.fire('แจ้งเตือน', 'กรุณาระบุภาคเรียนและปีการศึกษา', 'warning');
                }

                Swal.fire({
                    title: 'กำลังประมวลผล...',
                    text: 'ระบบกำลังรวบรวมภาระงานสอนและสร้างเอกสารคำสั่ง กรุณารอสักครู่',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                // บันทึกข้อมูลลงชีท "คำสั่งสอน" (ระบบจะสร้างชีทและหัวคอลัมน์ให้อัตโนมัติถ้ามีโค้ดรองรับใน Apps Script)
                const savePayload = {
                    'เลขที่คำสั่ง': orderNumberInput,
                    'ภาคเรียน': termInput,
                    'ปีการศึกษา': yearInput,
                    'เริ่มใช้ตั้งแต่วันที่': effectiveDateInput,
                    'สั่ง ณ วันที่': orderDateInput,
                    'ผู้อำนวยการ': directorNameInput,
                    'ตราสัญลักษณ์': garudaBase64
                };
                callAPI('saveData', { sheetName: 'คำสั่งสอน', rowId: null, data: savePayload }, true);
                getCachedData('คำสั่งสอน', true, true); // อัปเดตแคชเงียบๆ

                // ดึงข้อมูลครูและผลการประมวลตารางสอน เพื่อนำมาสรุปภาระงาน
                let [teachers, rawData, settingsData] = await Promise.all([
                    getCachedData('ข้อมูลครู'),
                    getCachedData('ผลการประมวลตารางสอน'),
                    getCachedData('การตั้งค่า')
                ]);

                let schoolSettings = settingsData.length > 0 ? JSON.parse(settingsData[0]['JSON_DATA'] || '{}') : {};
                let schoolName = schoolSettings.school_name || 'โรงเรียนนราสิกขาลัย';
                let processedData = rawData.length > 0 ? JSON.parse(rawData[0]['DATA_DUMP'] || '{"teacher":{}}') : {teacher:{}};
                
                // โครงสร้าง HTML สำหรับเอกสารราชการส่วนหัว (หน้าแรก)
                let orderHtml = `
                    <!DOCTYPE html>
                    <html lang="th">
                    <head>
                        <meta charset="UTF-8">
                        <title>คำสั่งแต่งตั้งภาระงานสอน - ${schoolName}</title>
                        <!-- โหลดฟอนต์ Sarabun (สารบรรณ) สำหรับเอกสารราชการ -->
                        <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
                        <style>
                            /* สำหรับแสดงผลตอนกดดูบนหน้าจอให้มีขอบดูคล้ายกระดาษ */
                            body { 
                                font-family: 'Sarabun', sans-serif; 
                                font-size: 16pt; 
                                color: #000; 
                                line-height: 1.5; 
                                padding: 1cm; 
                                margin: 20px auto; 
                                max-width: 21cm; 
                                background-color: white;
                                box-shadow: 0 0 10px rgba(0,0,0,0.1);
                                box-sizing: border-box;
                                text-align: justify;
                            }
                            
                            /* ตราครุฑ สูง 3 ซม. */
                            .garuda-container { text-align: center; margin-bottom: 20px; }
                            .garuda-container img { height: 3cm; width: auto; }
                            
                            .order-header { text-align: center; font-weight: bold; margin-bottom: 10px; font-size: 16pt; line-height: 1.5; }
                            .order-title { text-align: center; font-weight: bold; margin-bottom: 0; font-size: 16pt; line-height: 1.5; }
                            .content { text-align: justify; margin-bottom: 0; }
                            
                            /* ย่อหน้า 2.5 ซม. */
                            .content p { text-indent: 2.5cm; margin: 0; line-height: 1.5; }
                            
                            table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 16pt; page-break-inside: auto; }
                            tr { page-break-inside: avoid; page-break-after: auto; }
                            th, td { border: 1px solid #000; padding: 4px 8px; text-align: center; vertical-align: middle; line-height: 1.5; }
                            th { font-weight: bold; background-color: #f8f9fa; }
                            td.text-left { text-align: left; }
                            
                            /* สั่ง ณ วันที่ กดแท็บ 1 ครั้ง จากย่อหน้า ทั้งนี้ตั้งแต่ (ย่อหน้า 2.5 + แท็บ 2.5 = 5.0 ซม) */
                            .order-date-section { margin-left: 5cm; margin-top: 0; margin-bottom: 0; line-height: 1.5; }
                            .signature-section { margin-left: 50%; text-align: center; line-height: 1.5; }
                            
                            .btn-print {
                                display: block; width: 200px; margin: -10px auto 30px auto; padding: 12px;
                                background-color: #2563eb; color: white; text-align: center; 
                                text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer;
                                border: none; font-family: 'Sarabun', sans-serif; font-size: 14pt;
                            }
                            .btn-print:hover { background-color: #1d4ed8; }
                            
                            .group-header { margin-top: 20px; margin-bottom: 10px; font-size: 16pt; font-weight: bold; line-height: 1.5; }
                            .teacher-header { margin-top: 15px; margin-bottom: 5px; font-size: 16pt; font-weight: bold; margin-left: 2.5cm; line-height: 1.5; }
                            .avoid-break { page-break-inside: avoid; }
                            
                            @page { 
                                size: A4 portrait; 
                                /* ระยะขอบมาตรฐานงานสารบรรณ บน 2.5ซม, ขวา 2ซม, ล่าง 2ซม, ซ้าย 3ซม */
                                margin: 2.5cm 2cm 2cm 3cm; 
                            }
                            
                            @media print {
                                body { padding: 0; margin: 0; max-width: 100%; box-shadow: none; background-color: transparent; }
                                .btn-print { display: none !important; }
                                .page-break { page-break-before: always; }
                            }
                        </style>
                    </head>
                    <body>
                        <button onclick="window.print()" class="btn-print">🖨️ สั่งพิมพ์ / บันทึก PDF</button>
                        
                        ${garudaBase64 ? `<div class="garuda-container"><img src="${garudaBase64}" alt="ตราครุฑ"></div>` : `<div class="garuda-container" style="height: 3cm;"></div>`}
                        
                        <div class="order-header">
                            คำสั่ง${schoolName}<br>
                            ที่ ${toThaiNum(orderNumber)}
                        </div>
                        
                        <div class="order-title">
                            เรื่อง แต่งตั้งครูผู้สอนและมอบหมายภาระงานสอน ภาคเรียนที่ ${toThaiNum(termInput)} ปีการศึกษา ${toThaiNum(yearInput)}
                        </div>
                        
                        <div style="margin: 0 auto; text-align: center; line-height: 1.5; overflow: hidden; white-space: nowrap; width: 8cm;">
                            --------------------------------------------------------------------------------------------------------------------------------
                        </div>
                        
                        <div style="font-size: 12pt; height: 12pt; line-height: 12pt;">&nbsp;</div>
                        
                        <div class="content">
                            <p>เพื่อให้การจัดการเรียนการสอนของ${schoolName} ภาคเรียนที่ ${toThaiNum(termInput)} ปีการศึกษา ${toThaiNum(yearInput)} ดำเนินไปด้วยความเรียบร้อย มีประสิทธิภาพ และเกิดประสิทธิผลสูงสุดต่อนักเรียน อาศัยอำนาจตามความในมาตรา ๒๗ แห่งพระราชบัญญัติระเบียบข้าราชการครูและบุคลากรทางการศึกษา พ.ศ. ๒๕๔๗</p>
                            
                            <div style="font-size: 6pt; height: 6pt; line-height: 6pt;">&nbsp;</div>
                            
                            <p>จึงแต่งตั้งให้ข้าราชการครูและบุคลากรทางการศึกษา ปฏิบัติหน้าที่สอนและมีภาระงานสอนตามตารางแนบท้ายคำสั่งนี้ และขอให้บุคลากรที่ได้รับการแต่งตั้งปฏิบัติหน้าที่ด้วยความรับผิดชอบ และตั้งใจ เพื่อให้เกิดผลดีต่อทางราชการ</p>
                            
                            <div style="font-size: 6pt; height: 6pt; line-height: 6pt;">&nbsp;</div>
                            
                            <p>ทั้งนี้ ตั้งแต่ ${toThaiNum(effectiveDate)} เป็นต้นไป</p>
                            
                            <div style="font-size: 12pt; height: 12pt; line-height: 12pt;">&nbsp;</div>
                        </div>
                        
                        <div class="order-date-section">
                            สั่ง ณ ${toThaiNum(orderDate)}
                        </div>
                        
                        <div style="font-size: 16pt; line-height: 1.5;">
                            <br><br><br><br>
                        </div>
                        
                        <div class="signature-section">
                            <div>(${directorName})</div>
                            <div>ผู้อำนวยการ${schoolName}</div>
                        </div>
                        
                        <div style="clear: both;" class="page-break"></div>
                `;

                // จัดกลุ่มครูตามกลุ่มสาระการเรียนรู้
                let departments = {};
                subjectGroups.forEach(g => departments[g] = []);

                teachers.forEach(t => {
                    let name = t['ชื่อ-สกุล'];
                    let group = t['กลุ่มสาระการเรียนรู้'];
                    if (!departments[group]) departments[group] = [];
                    
                    let schedule = processedData.teacher[name] || [];
                    
                    let courseMap = {};
                    
                    schedule.forEach(s => {
                        let cCode = s['รหัสวิชา'];
                        let room = s['ห้องเรียน'];
                        
                        if (!courseMap[cCode]) {
                            courseMap[cCode] = {
                                name: s['ชื่อวิชา'],
                                rooms: new Set(),
                                uniquePeriods: new Set()
                            };
                        }
                        
                        if (room && room !== '-') {
                            courseMap[cCode].rooms.add(room);
                            // เก็บ คาบสอนแยกตามห้อง เพื่อให้ได้ชั่วโมงรวมที่ถูกต้องตามจำนวนห้อง
                            courseMap[cCode].uniquePeriods.add(s['วัน'] + '_' + s['คาบที่'] + '_' + room);
                        } else if (cCode === 'กิจกรรม') {
                             // สำหรับกิจกรรมครู
                            courseMap[cCode].uniquePeriods.add(s['วัน'] + '_' + s['คาบที่'] + '_activity');
                        } else {
                            courseMap[cCode].uniquePeriods.add(s['วัน'] + '_' + s['คาบที่'] + '_noroom');
                        }
                    });
                    
                    // แปลงข้อมูลเป็น Array สำหรับวิชาทั้งหมดของครูท่านนี้
                    let courses = Object.keys(courseMap).map(code => {
                        let c = courseMap[code];
                        let roomsArr = Array.from(c.rooms).sort();
                        // ดึงระดับชั้นจากคำนำหน้าของห้องเรียน (เช่น "ม.4/1" -> "ม.4")
                        let grades = new Set(roomsArr.map(r => r.split('/')[0].trim()));
                        return {
                            code: code,
                            name: c.name,
                            grade: Array.from(grades).join(', ') || '-',
                            rooms: roomsArr.join(', ') || '-',
                            hours: c.uniquePeriods.size // นับชั่วโมงตามจำนวนห้องที่สอนจริง
                        };
                    });
                    
                    let totalHours = courses.reduce((sum, c) => sum + c.hours, 0);
                    
                    // แสดงเฉพาะครูที่มีชั่วโมงสอน หรือเป็นครูผู้สอนปกติ
                    if (totalHours > 0 || t['บทบาท'] === 'user') {
                        departments[group].push({
                            name: name,
                            courses: courses,
                            totalHours: totalHours
                        });
                    }
                });

                // --- ระบบจัดการเลขหน้าและขึ้นหน้าใหม่ ---
                let groupIndex = 1;
                let currentPageNum = 2;
                let linesPerPage = 28; // จำนวนบรรทัดโดยประมาณต่อ 1 หน้ากระดาษ A4
                let currentLineCount = 0;

                const getPageHeader = (pageNum) => {
                    let html = `
                        <!-- เลขหน้า -->
                        <div style="text-align: center; font-size: 16pt; margin-bottom: 10px; padding-top: 10px;">
                            - ${toThaiNum(pageNum)} -
                        </div>
                    `;
                    
                    // หากเป็นหน้าแรกของบัญชีแนบท้าย (หน้า 2) จะมีหัวข้อเรื่อง
                    if (pageNum === 2) {
                        html += `
                            <div style="text-align: center; font-weight: bold; margin-bottom: 20px; font-size: 16pt; line-height: 1.5;">
                                บัญชีแนบท้ายคำสั่ง${schoolName} ที่ ${toThaiNum(orderNumber)}<br>
                                สรุปภาระงานสอน ภาคเรียนที่ ${toThaiNum(termInput)} ปีการศึกษา ${toThaiNum(yearInput)}
                            </div>
                        `;
                        currentLineCount = 6; // หักโควต้าบรรทัดสำหรับหัวข้อเรื่อง
                    } else {
                        currentLineCount = 2; // หักโควต้าสำหรับเลขหน้า
                    }
                    return html;
                };

                // สร้างหัวกระดาษหน้า 2
                orderHtml += getPageHeader(currentPageNum);

                // วนลูปสร้างตารางตามกลุ่มสาระ
                subjectGroups.forEach(group => {
                    let groupTeachers = departments[group];
                    // เรียงตามชื่อ
                    groupTeachers.sort((a, b) => a.name.localeCompare(b.name));

                    if (groupTeachers && groupTeachers.length > 0) {
                        // เช็คว่าหัวข้อกลุ่มสาระจะล้นหน้ากระดาษไหม
                        if (currentLineCount + 2 > linesPerPage) {
                            orderHtml += `<div style="clear: both;" class="page-break"></div>`;
                            currentPageNum++;
                            orderHtml += getPageHeader(currentPageNum);
                        }

                        orderHtml += `<div class="group-header">${toThaiNum(groupIndex)}. กลุ่มสาระการเรียนรู้${group}</div>`;
                        currentLineCount += 2;
                        
                        groupTeachers.forEach((t, tIndex) => {
                            let courseCount = t.courses.length > 0 ? t.courses.length : 1;
                            let teacherLines = 5 + courseCount; // คำนวณความสูงของตารางครูท่านนี้ (บรรทัด)

                            // เช็คว่าตารางครูคนนี้จะล้นหน้ากระดาษไหม หากล้นให้ปัดขึ้นหน้าใหม่
                            if (currentLineCount + teacherLines > linesPerPage) {
                                orderHtml += `<div style="clear: both;" class="page-break"></div>`;
                                currentPageNum++;
                                orderHtml += getPageHeader(currentPageNum);
                                
                                // เพิ่มชื่อกลุ่มสาระ (ต่อ) ให้รู้ว่ายังอยู่ในกลุ่มสาระเดิม
                                orderHtml += `<div class="group-header" style="color: #555;">${toThaiNum(groupIndex)}. กลุ่มสาระการเรียนรู้${group} (ต่อ)</div>`;
                                currentLineCount += 2;
                            }

                            let teacherIndexStr = toThaiNum(groupIndex + '.' + (tIndex + 1));
                            orderHtml += `
                                <div class="avoid-break">
                                    <div class="teacher-header">${teacherIndexStr} ${t.name}</div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th width="15%">รหัสวิชา</th>
                                                <th width="35%">รายวิชาที่รับผิดชอบ</th>
                                                <th width="15%">ระดับชั้น</th>
                                                <th width="20%">ห้องที่รับผิดชอบ</th>
                                                <th width="15%">จำนวนชั่วโมง</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                            `;
                            
                            if (t.courses.length > 0) {
                                t.courses.forEach((c) => {
                                    orderHtml += `
                                        <tr>
                                            <td>${toThaiNum(c.code)}</td>
                                            <td class="text-left">${toThaiNum(c.name)}</td>
                                            <td>${toThaiNum(c.grade)}</td>
                                            <td>${toThaiNum(c.rooms)}</td>
                                            <td>${toThaiNum(c.hours)}</td>
                                        </tr>
                                    `;
                                });
                            } else {
                                orderHtml += `<tr><td colspan="5" style="color: #666; font-style: italic;">ไม่มีภาระงานสอนในระบบ</td></tr>`;
                            }
                            
                            orderHtml += `
                                            <tr>
                                                <td colspan="4" style="font-weight: bold; text-align: right; padding-right: 20px; background-color: #f8f9fa;">รวมจำนวนชั่วโมงสอน/สัปดาห์</td>
                                                <td style="font-weight: bold; background-color: #f8f9fa;">${toThaiNum(t.totalHours)}</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            `;
                            currentLineCount += teacherLines; // บวกความสูงที่ใช้ไปสะสมไว้
                        });
                        groupIndex++;
                    }
                });

                orderHtml += `
                    </body>
                    </html>
                `;

                Swal.close();
                
                // เปิดหน้าต่างใหม่เพื่อแสดงเอกสารคำสั่ง
                let printWin = window.open('', '_blank');
                printWin.document.write(orderHtml);
                printWin.document.close();
            }
        }

    </script>
</body>
</html>
