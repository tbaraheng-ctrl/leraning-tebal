                    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
                        <div class="bg-navy text-white px-6 py-4 flex justify-between items-center">
                            <h3 class="font-bold text-lg" id="modalTitle">จัดลงตาราง</h3>
                            <button onclick="closeSchModal()" class="text-gray-300 hover:text-white focus:outline-none">
                                <i class="fas fa-times text-xl"></i>
                            </button>
                        </div>
                        <form id="modalSchForm" class="p-6">
                            <input type="hidden" id="m_original_id">
                            <input type="hidden" id="m_room">
                            <input type="hidden" id="m_plan">
                            <input type="hidden" id="m_creator">
                            
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div class="bg-gray-100 p-2 rounded text-center border">
                                    <span class="text-xs text-gray-500 block">วัน</span>
                                    <span class="font-bold text-navy" id="m_day_display"></span>
                                    <input type="hidden" id="m_day">
                                </div>
                                <div class="bg-gray-100 p-2 rounded text-center border">
                                    <span class="text-xs text-gray-500 block">คาบที่</span>
                                    <span class="font-bold text-navy" id="m_period_display"></span>
                                    <input type="hidden" id="m_period">
                                </div>
                            </div>

                            <div class="space-y-4 text-sm">
                                <div>
                                    <label class="block mb-1 font-medium">รหัสวิชา</label>
                                    <input type="text" id="m_code" required class="w-full border rounded p-2 focus:border-gold outline-none" placeholder="พิมพ์รหัสวิชา แล้วกด Enter หรือคลิกที่อื่น" onblur="autoFillModalCourse()">
                                </div>
                                <div>
                                    <label class="block mb-1 font-medium">ชื่อวิชา</label>
                                    <input type="text" id="m_name" readonly class="w-full border rounded p-2 bg-gray-50 text-gray-600">
                                </div>
                                <div>
                                    <label class="block mb-1 font-medium">ครูผู้สอน</label>
                                    <input type="text" id="m_teacher" readonly class="w-full border rounded p-2 bg-gray-50 text-gray-600">
                                </div>
                                <div>
                                    <label class="block mb-1 font-medium">สถานที่เรียน</label>
                                    <input type="text" id="m_location" list="dl_m_locations" class="w-full border rounded p-2 focus:border-gold outline-none" placeholder="เลือกหรือพิมพ์สถานที่เรียน...">
                                    <datalist id="dl_m_locations">
                                        ${locationOptions}
                                    </datalist>
                                </div>
                            </div>

                            <div class="mt-6 flex justify-between items-center border-t pt-4">
                                <button type="button" id="m_btn_delete" class="text-red-500 hover:text-red-700 font-medium px-4 py-2 hidden" onclick="deleteSchModalSlot()">
                                    <i class="fas fa-trash mr-1"></i> ลบข้อมูล
                                </button>
                                <div class="flex space-x-2 ml-auto">
                                    <button type="button" onclick="closeSchModal()" class="bg-gray-200 text-gray-800 px-4 py-2 rounded hover:bg-gray-300">ยกเลิก</button>
                                    <button type="submit" class="bg-navy text-white px-6 py-2 rounded hover:bg-opacity-90 shadow-md">บันทึก</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            `;

            // อัปเดตสถานะ UI การบันทึก
            window.updateSyncStatus = () => {
                const statusEl = document.getElementById('syncStatus');
                if(!statusEl) return;
                if(window.pendingSyncCount > 0) {
                    statusEl.innerHTML = '<i class="fas fa-spinner fa-spin text-blue-500"></i> กำลังบันทึกข้อมูล (' + window.pendingSyncCount + ')...';
                    statusEl.classList.remove('text-green-600');
                    statusEl.classList.add('text-blue-600');
                } else {
                    statusEl.innerHTML = '<i class="fas fa-check-circle text-green-500"></i> ข้อมูลบันทึกแล้ว';
                    statusEl.classList.remove('text-blue-600');
                    statusEl.classList.add('text-green-600');
                }
            };

            window.showPermissionAlert = (creatorName) => {
                Swal.fire({
                    icon: 'error',
                    title: 'ไม่มีสิทธิ์แก้ไข',
                    text: 'รายการนี้ถูกบันทึกโดย ' + (creatorName || 'ผู้อื่น') + ' คุณไม่สามารถแก้ไขหรือลบได้'
                });
            };

            // ฟังก์ชันโหลดและวาดตาราง
            window.refreshSchGrid = () => {
                const room = document.getElementById('grid_room').value;
                const plan = document.getElementById('grid_plan').value;

                if (!room || !plan) {
                    Swal.fire('แจ้งเตือน', 'กรุณาเลือระดับชั้น/ห้อง และ แผนการเรียน ก่อน', 'warning');
                    return;
                }

                document.getElementById('gridContainer').classList.remove('hidden');
                document.getElementById('gridTitleDisplay').innerText = 'ตารางสอนห้อง ' + room + ' (แผนฯ: ' + plan + ')';

                // ดึงการตั้งค่าเวลาพักและคาบเรียน
                let breakPeriod = parseInt(window.interactiveSettings?.break_period || 4);
                let breakDuration = parseInt(window.interactiveSettings?.break_duration || 60);
                let periodDuration = parseInt(window.interactiveSettings?.duration || 50);
                let startParts = (window.interactiveSettings?.start || '08:30').split(':');
                let currentTimeMin = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);

                // สร้างหัวตาราง
                let ths = '<th class="border border-gray-400 p-2 bg-navy text-white w-24 text-center align-middle">วัน / คาบ</th>';
                for(let i=1; i<=window.interactivePeriods; i++) {
                    let isBreak = (i === breakPeriod);
                    let currentDur = isBreak ? breakDuration : periodDuration;
                    let startStr = Math.floor(currentTimeMin/60).toString().padStart(2,'0') + ':' + (currentTimeMin%60).toString().padStart(2,'0');
                    currentTimeMin += currentDur;
                    let endStr = Math.floor(currentTimeMin/60).toString().padStart(2,'0') + ':' + (currentTimeMin%60).toString().padStart(2,'0');
                    
                    if (isBreak) {
                        ths += '<th class="border border-gray-400 p-2 bg-gray-500 text-white text-center w-16">พัก<br><span class="text-[10px] font-normal text-gray-200">' + startStr + ' - ' + endStr + '</span></th>';
                    } else {
                        ths += '<th class="border border-gray-400 p-2 bg-navy text-white text-center w-32">คาบ ' + i + '<br><span class="text-[11px] font-normal text-lightgold">' + startStr + ' - ' + endStr + '</span></th>';
                    }
                }
                document.getElementById('gridThead').innerHTML = '<tr>' + ths + '</tr>';

                // กรองข้อมูลเฉพาะห้องและแผนการเรียนที่เลือก (ดึงวิชาที่ล๊อคมาแสดงด้วย)
                const roomData = window.interactiveSchData.filter(d => d['ห้องเรียน'] === room && d['แผนการเรียน'] === plan); 

                const days = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์'];
                let trs = '';

                days.forEach(day => {
                    let tds = '';
                    for(let i=1; i<=window.interactivePeriods; i++) {
                        if (i === breakPeriod) {
                            // แทรกช่องคาบพักกลางวันแทนคาบเรียนปกติ
                            tds += '<td class="border border-gray-300 bg-gray-200 text-center align-middle text-gray-500 text-xs w-16"><i class="fas fa-utensils mb-1"></i><br>พัก</td>';
                        } else {
                            // ค้นหาว่ามีข้อมูลลงไว้ในคาบนี้หรือไม่ (ดึงมาทั้งหมดในคาบเดียวกัน)
                            let slots = roomData.filter(s => s['วัน'] === day && parseInt(s['คาบที่']) === i);
                            
                            if(slots.length > 0) {
                                let hasPending = slots.some(s => s.isPending);

                                if (hasPending) {
                                    // หากข้อมูลกำลังบันทึกเบื้องหลัง จะล็อคช่องนี้และแสดงอนิเมชัน
                                    let firstSlot = slots[0]; // แสดงชื่อวิชาแรกเป็นหลัก
                                    let teacherName = String(firstSlot['ชื่อครูผู้สอน'] || '');
                                    let cleanName = teacherName.replace(/^(นาย|นางสาว|นาง|น\.ส\.|ว่าที่\s?ร\.ต\.|ว่าที่ร้อยตรี|ครู)\s*/g, '').trim();
                                    let displayTeacher = cleanName ? 'ครู' + cleanName.split(' ')[0] : '';

                                    tds += `
                                        <td class="border border-gray-300 p-2 text-center align-middle bg-blue-50 relative opacity-70">
                                            <div class="font-bold text-xs text-navy">${firstSlot['รหัสวิชา']}</div>
                                            <div class="text-[11px] text-gray-700 truncate w-full overflow-hidden">${firstSlot['ชื่อวิชา']}</div>
                                            <div class="text-[11px] font-medium text-blue-700 mt-1">${displayTeacher}</div>
                                            ${firstSlot['สถานที่เรียน'] ? `<div class="text-[10px] text-gray-600 mt-0.5">${firstSlot['สถานที่เรียน']}</div>` : ''}
                                            ${slots.length > 1 ? `<div class="text-[10px] text-purple-600 mt-1 font-bold">+ ซ้อนอีก ${slots.length - 1} วิชา</div>` : ''}
                                            <div class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-60 transition">
                                                <i class="fas fa-spinner fa-spin text-blue-600 text-2xl drop-shadow-sm"></i>
                                            </div>
                                        </td>`;
                                } else {
                                    // สร้างบล็อกของรายวิชาทั้งหมดที่อยู่ในคาบนี้
                                    let cellContent = slots.map(slot => {
                                        let teacherName = String(slot['ชื่อครูผู้สอน'] || '');
                                        let cleanName = teacherName.replace(/^(นาย|นางสาว|นาง|น\.ส\.|ว่าที่\s?ร\.ต\.|ว่าที่ร้อยตรี|ครู)\s*/g, '').trim();
                                        let displayTeacher = cleanName ? 'ครู' + cleanName.split(' ')[0] : '';

                                        // ตรวจสอบสิทธิ์ความเป็นเจ้าของข้อมูล
                                        let creator = slot['ผู้บันทึก'] || '';
                                        let isOwner = (creator === currentUser) || (currentRole === 'admin') || (!creator);
                                        
                                        // หากเป็นวิชาที่ล๊อคมาจากหน้า "ล๊อครายวิชา" จะไม่อนุญาตให้แก้ไขในหน้านี้
                                        if (slot['ประเภท'] === 'ล็อค') {
                                            isOwner = false;
                                            creator = 'ระบบ (ต้องแก้ไขที่หน้าล๊อครายวิชาเท่านั้น)';
                                        }

                                        let overlayIcon = isOwner ? '<i class="fas fa-edit text-navy text-lg drop-shadow-md"></i>' : '<i class="fas fa-lock text-red-100 text-lg drop-shadow-md"></i>';
                                        let overlayBg = isOwner ? 'bg-navy' : (slot['ประเภท'] === 'ล็อค' ? 'bg-purple-700' : 'bg-red-600');
                                        
                                        // ใช้ event.stopPropagation() เพื่อไม่ให้คลิกทะลุไปโดนพื้นที่อื่นใน td
                                        let onClickAction = isOwner ? `onclick='openSchModal("${day}", ${i}, ${JSON.stringify(slot).replace(/"/g, '&quot;')}); event.stopPropagation();'` : `onclick='showPermissionAlert("${creator}"); event.stopPropagation();'`;
                                        
                                        // ปรับแต่งสีพื้นหลัง ถ้าเป็นวิชาล๊อคให้เป็นสีม่วงอ่อน
                                        let slotBgClass = isOwner ? 'bg-blue-50 hover:bg-blue-100' : 'bg-gray-100 hover:bg-gray-200';
                                        if (slot['ประเภท'] === 'ล็อค') slotBgClass = 'bg-purple-50 hover:bg-purple-100';

                                        return `
                                            <div class="relative group p-2 border-b border-gray-300 last:border-0 ${slotBgClass} cursor-pointer transition text-center flex-1 flex flex-col justify-center" ${onClickAction}>
                                                <div class="font-bold text-xs ${slot['ประเภท'] === 'ล็อค' ? 'text-purple-700' : 'text-navy'}">${slot['รหัสวิชา']} ${slot['ประเภท'] === 'ล็อค' ? '<i class="fas fa-lock text-[10px] ml-1"></i>' : ''}</div>
                                                <div class="text-[11px] text-gray-700 truncate w-full overflow-hidden" title="${slot['ชื่อวิชา']}">${slot['ชื่อวิชา']}</div>
                                                <div class="text-[11px] font-medium text-blue-700 mt-1">${displayTeacher}</div>
                                                ${slot['สถานที่เรียน'] ? `<div class="text-[10px] text-gray-600 mt-0.5">${slot['สถานที่เรียน']}</div>` : ''}
                                                <div class="absolute inset-0 ${overlayBg} bg-opacity-10 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
                                                    ${overlayIcon}
                                                </div>
                                            </div>
                                        `;
                                    }).join('');

                                    tds += `
                                        <td class="border border-gray-300 p-0 align-top bg-white">
                                            <div class="flex flex-col h-full min-h-[5rem]">
                                                ${cellContent}
                                            </div>
                                        </td>`;
                                }
                            } else {
                                // ว่าง: แสดงปุ่มบวกใหญ่
                                tds += `
                                    <td class="border border-gray-300 p-0 text-center align-middle cursor-pointer hover:bg-gray-100 transition group h-20" 
                                        onclick='openSchModal("${day}", ${i}, null)'>
                                        <div class="w-full h-full flex items-center justify-center min-h-[5rem]">
                                            <i class="fas fa-plus text-gray-300 group-hover:text-green-500 text-xl transition transform group-hover:scale-125"></i>
                                        </div>
                                    </td>`;
                            }
                        }
                    }
                    trs += '<tr><td class="border border-gray-400 p-2 font-bold text-center bg-lightgold text-navy shadow-sm align-middle">' + day + '</td>' + tds + '</tr>';
                });

                document.getElementById('gridTbody').innerHTML = trs;

                // --- ส่วนประมวลผลและสรุปรายวิชาตกหล่น ---
                let targetCourses = window.interactiveCourses.filter(c => {
                    let cRooms = (c['ชั้นที่เปิดสอน'] || '').split(',').map(r => r.trim()).filter(r => r);
                    let cPlans = (c['แผนการเรียน'] || '').split(',').map(p => p.trim()).filter(p => p);
                    
                    let matchPlan = cPlans.includes(plan);
                    let isRoomInPlanSettings = window.planMappings[plan] && window.planMappings[plan].includes(room);
                    
                    // ถ้ารายวิชาระบุห้องเจาะจง ต้องตรงกับห้องที่เลือก
                    if (cRooms.length > 0) {
                        return matchPlan && cRooms.includes(room);
                    } else {
                        // ถ้ารายวิชาไม่ระบุห้อง ให้เช็คว่ามีการตั้งค่า Mapping ห้องไว้ในแผนนี้หรือไม่
                        if (Object.keys(window.planMappings).length > 0) {
                            return matchPlan && isRoomInPlanSettings;
                        } else {
                            return matchPlan;
                        }
                    }
                });

                let scheduledCounts = {};
                // roomData เก็บข้อมูลที่จัดลงตารางแล้วสำหรับห้องและแผนนี้
                roomData.forEach(slot => {
                    let code = String(slot['รหัสวิชา'] || '').trim();
                    if (!scheduledCounts[code]) scheduledCounts[code] = 0;
                    scheduledCounts[code]++;
                });

                let completeCount = 0;
                let incompleteCourses = [];

                targetCourses.forEach(c => {
                    let code = String(c['รหัสวิชา'] || '').trim();
                    let name = String(c['ชื่อวิชา'] || '').trim();
                    let teacher = String(c['ชื่อครูผู้สอน'] || '').trim();
                    let credit = parseFloat(c['หน่วยกิต']) || 0;
                    let required = credit * 2; // คำนวณคาบต่อสัปดาห์ (1 หน่วยกิต = 2 คาบ)
                    let scheduled = scheduledCounts[code] || 0;

                    if (required > 0) {
                        if (scheduled >= required) {
                            completeCount++;
                        } else {
                            incompleteCourses.push({
                                code, name, teacher, required, scheduled
                            });
                        }
                    }
                });

                let totalTarget = targetCourses.filter(c => (parseFloat(c['หน่วยกิต']) || 0) > 0).length;
                let incompleteCount = incompleteCourses.length;

                let missingHtml = `
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 shadow-sm">
                        <h4 class="font-bold text-navy flex flex-wrap items-center mb-3">
                            <i class="fas fa-clipboard-list mr-2"></i> สรุปการจัดรายวิชา (ห้อง ${room} แผนฯ ${plan})
                            <span class="ml-auto mt-2 sm:mt-0 text-sm font-normal bg-white px-3 py-1 rounded-full border shadow-sm">
                                ทั้งหมด: <span class="font-bold">${totalTarget}</span> | 
                                จัดครบ: <span class="text-green-600 font-bold">${completeCount}</span> | 
                                ตกหล่น/ไม่ครบ: <span class="text-red-500 font-bold">${incompleteCount}</span>
                            </span>
                        </h4>
                `;

                if (incompleteCourses.length > 0) {
                    missingHtml += `
                        <div class="overflow-x-auto rounded border border-red-100">
                            <table class="w-full text-sm text-left border-collapse bg-white overflow-hidden">
                                <thead class="bg-red-50 text-red-700 border-b border-red-100">
                                    <tr>
                                        <th class="p-2 w-24">รหัสวิชา</th>
                                        <th class="p-2">ชื่อวิชา</th>
                                        <th class="p-2">ครูผู้สอน</th>
                                        <th class="p-2 text-center w-28 whitespace-nowrap">ต้องการ (คาบ)</th>
                                        <th class="p-2 text-center w-28 whitespace-nowrap">จัดแล้ว (คาบ)</th>
                                        <th class="p-2 text-center w-24 whitespace-nowrap">ขาด (คาบ)</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    incompleteCourses.forEach(ic => {
                        missingHtml += `
                                    <tr class="border-b last:border-0 hover:bg-red-50 transition">
                                        <td class="p-2 font-semibold text-navy">${ic.code}</td>
                                        <td class="p-2 text-gray-800">${ic.name}</td>
                                        <td class="p-2 text-gray-600">${ic.teacher}</td>
                                        <td class="p-2 text-center">${ic.required}</td>
                                        <td class="p-2 text-center text-blue-600 font-semibold">${ic.scheduled}</td>
                                        <td class="p-2 text-center text-red-600 font-bold bg-red-50">${ic.required - ic.scheduled}</td>
                                    </tr>
                        `;
                    });
                    missingHtml += `
                                </tbody>
                            </table>
                        </div>
                    `;
                } else {
                    if (totalTarget > 0) {
                        missingHtml += `<div class="text-center py-6 text-green-600 bg-white rounded shadow-sm border border-green-100"><i class="fas fa-check-circle text-3xl mb-2"></i><br>จัดตารางสอนครบทุกรายวิชาตามแผนการเรียนแล้ว ยอดเยี่ยม!</div>`;
                    } else {
                        missingHtml += `<div class="text-center py-6 text-gray-500 bg-white rounded shadow-sm border border-gray-200"><i class="fas fa-info-circle text-3xl mb-2 text-gray-300"></i><br>ไม่มีข้อมูลรายวิชาที่ต้องลงในตารางสำหรับห้องและแผนการเรียนนี้<br><span class="text-xs">(กรุณาตรวจสอบการตั้งค่ารายวิชาในเมนู "จัดการข้อมูลรายวิชา")</span></div>`;
                    }
                }
                missingHtml += `</div>`;

                document.getElementById('missingCoursesContainer').innerHTML = missingHtml;
            };

            // ฟังก์ชันเปิด Modal
            window.openSchModal = (day, period, existingData) => {
                const room = document.getElementById('grid_room').value;
                const plan = document.getElementById('grid_plan').value;

                // ตั้งค่าค่าพื้นฐานที่ล็อคไว้
                document.getElementById('m_day_display').innerText = day;
                document.getElementById('m_day').value = day;
                document.getElementById('m_period_display').innerText = period;
                document.getElementById('m_period').value = period;
                document.getElementById('m_room').value = room;
                document.getElementById('m_plan').value = plan;

                if (existingData) {
                    // กรณีแก้ไข
                    document.getElementById('modalTitle').innerText = 'แก้ไขตารางสอน';
                    document.getElementById('m_original_id').value = existingData.originalIndex;
                    document.getElementById('m_creator').value = existingData['ผู้บันทึก'] || currentUser;
                    document.getElementById('m_code').value = existingData['รหัสวิชา'];
                    document.getElementById('m_name').value = existingData['ชื่อวิชา'];
                    document.getElementById('m_teacher').value = existingData['ชื่อครูผู้สอน'];
                    document.getElementById('m_location').value = existingData['สถานที่เรียน'] || '';
                    document.getElementById('m_btn_delete').classList.remove('hidden');
                } else {
                    // กรณีเพิ่มใหม่
                    document.getElementById('modalTitle').innerText = 'เพิ่มรายวิชาในตาราง';
                    document.getElementById('m_original_id').value = '';
                    document.getElementById('m_creator').value = currentUser; // ประทับชื่อผู้สร้างคนปัจจุบัน
                    document.getElementById('m_code').value = '';
                    document.getElementById('m_name').value = '';
                    document.getElementById('m_teacher').value = '';
                    document.getElementById('m_location').value = '';
                    document.getElementById('m_btn_delete').classList.add('hidden');
                }

                document.getElementById('schModal').classList.remove('hidden');
                // โฟกัสไปที่ช่องรหัสวิชาอัตโนมัติเมื่อเปิด
                setTimeout(() => document.getElementById('m_code').focus(), 100);
            };

            // ฟังก์ชันปิด Modal
            window.closeSchModal = () => {
                document.getElementById('schModal').classList.add('hidden');
            };

            // ฟังก์ชัน Auto-fill วิชาใน Modal
            window.autoFillModalCourse = () => {
                let code = document.getElementById('m_code').value.trim();
                let c = window.interactiveCourses.find(x => x['รหัสวิชา'] === code);
                if(c) {
                    document.getElementById('m_name').value = c['ชื่อวิชา'];
                    document.getElementById('m_teacher').value = c['ชื่อครูผู้สอน'];
                } else {
                    document.getElementById('m_name').value = '';
                    document.getElementById('m_teacher').value = '';
                }
            };

            // ฟังก์ชันลบข้อมูลพื้นหลัง (Background Delete)
            window.deleteSchModalSlot = async () => {
                const rowIdStr = document.getElementById('m_original_id').value;
                const rowIndex = parseInt(rowIdStr);
                if(isNaN(rowIndex)) return;

                if(await Swal.fire({title: 'ยืนยันการลบลายวิชานี้?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'ลบเลย'}).then(r => r.isConfirmed)){
                    closeSchModal();
                    
                    // ลบออกจากตารางหน้าเว็บชั่วคราวเพื่อให้ผู้ใช้ทำงานต่อได้ทันที
                    window.interactiveSchData = window.interactiveSchData.filter(item => item.originalIndex !== rowIndex);
                    refreshSchGrid();

                    window.pendingSyncCount++;
                    window.updateSyncStatus();

                    // เรียก API ลบพื้นหลัง (ส่งพารามิเตอร์ true = ไม่โชว์ loader)
                    callAPI('deleteData', { sheetName: 'กำหนดตารางสอน', rowIndex: rowIndex }, true)
                    .then(async (res) => {
                        window.pendingSyncCount--;
                        if(window.pendingSyncCount === 0) {
                            // หากคิวว่างแล้วให้โหลด Data จริงๆ มาอีกครั้ง
                            let newData = await getCachedData('กำหนดตารางสอน', true, true);
                            window.interactiveSchData = newData.map((d, index) => ({...d, originalIndex: index}));
                            refreshSchGrid();
                        }
                        window.updateSyncStatus();
                    }).catch(err => {
                        window.pendingSyncCount--;
                        window.updateSyncStatus();
                        Swal.fire('ข้อผิดพลาด', 'การลบข้อมูลขัดข้อง กรุณาโหลดตารางใหม่', 'error');
                    });
                }
            };

            // ฟังก์ชันบันทึกข้อมูลพื้นหลัง (Background Save)
            document.getElementById('modalSchForm').onsubmit = async (e) => {
                e.preventDefault();
                
                if(!document.getElementById('m_name').value) {
                    Swal.fire('แจ้งเตือน', 'ไม่พบรหัสวิชานี้ในระบบ กรุณาตรวจสอบอีกครั้ง', 'warning');
                    return;
                }

                const rowIdStr = document.getElementById('m_original_id').value;
                const rowId = rowIdStr !== "" ? parseInt(rowIdStr) : null;
                
                const day = document.getElementById('m_day').value;
                const period = parseInt(document.getElementById('m_period').value);
                const teacher = document.getElementById('m_teacher').value;
                const location = document.getElementById('m_location').value.trim();
                const room = document.getElementById('m_room').value;
                const plan = document.getElementById('m_plan').value;
                const code = document.getElementById('m_code').value;

                // เพิ่มตัวเลือกลงระบบอัตโนมัติหากเป็นสถานที่ใหม่
                if (location) {
                    let currentRooms = (window.interactiveSettings.teaching_rooms || '').split(',').map(r => r.trim()).filter(r => r);
                    if (!currentRooms.includes(location)) {
                        currentRooms.push(location);
                        window.interactiveSettings.teaching_rooms = currentRooms.join(',');
                        window.interactiveLocationOpts = currentRooms.map(r => `<option value="${r}">${r}</option>`).join('');
                        document.getElementById('dl_m_locations').innerHTML = window.interactiveLocationOpts;
                        callAPI('saveData', { sheetName: 'การตั้งค่า', rowId: 0, data: { 'JSON_DATA': JSON.stringify(window.interactiveSettings) }, isSettings: true }, true);
                    }
                }

                // --- ตรวจสอบข้อมูลชนกัน (Conflict Detection) แบบรัดกุมที่สุด ---
                let conflictMsg = [];
                const chkDay = String(day || '').trim();
                const chkPeriod = period;
                const chkTeacher = String(teacher || '').trim();
                const chkLocation = String(location || '').trim();
                const chkRoom = String(room || '').trim();
                const chkPlan = String(plan || '').trim();
                const chkCode = String(code || '').trim();

                let currentCourseCount = 0; // ตัวแปรสำหรับนับจำนวนคาบที่ลงไปแล้วของวิชานี้

                for (let i = 0; i < window.interactiveSchData.length; i++) {
                    let s = window.interactiveSchData[i];
                    if (rowId !== null && s.originalIndex === rowId) continue; // ข้ามตัวมันเองถ้าแก้

                    let sDay = String(s['วัน'] || '').trim();
                    let sPeriod = parseInt(s['คาบที่']);
                    let sRoom = String(s['ห้องเรียน'] || '').trim();
                    let sPlan = String(s['แผนการเรียน'] || '').trim();
                    let sCode = String(s['รหัสวิชา'] || '').trim();
                    
                    // นับจำนวนคาบที่วิชานี้ถูกจัดลงตารางในห้องและแผนนี้ไปแล้ว
                    if (sRoom === chkRoom && sPlan === chkPlan && sCode === chkCode) {
                        currentCourseCount++;
                    }

                    if (sDay === chkDay && sPeriod === chkPeriod) {
                        let sTeacher = String(s['ชื่อครูผู้สอน'] || '').trim();
                        let sLocation = String(s['สถานที่เรียน'] || '').trim();

                        // 1. ตรวจสอบครูผู้สอนชนกัน
                        if (chkTeacher !== '' && sTeacher === chkTeacher) {
                            let shortTeacher = chkTeacher.replace(/^(นาย|นางสาว|นาง|น\.ส\.|ว่าที่\s?ร\.ต\.|ว่าที่ร้อยตรี|ครู)\s*/g, '').split(' ')[0];
                            if (s['รหัสวิชา'] === 'กิจกรรม' || sRoom === '-') {
                                conflictMsg.push('- <b>ครู' + shortTeacher + '</b> ติดภารกิจ "' + s['ชื่อวิชา'] + '" ในคาบนี้');
                            } else {
                                conflictMsg.push('- <b>ครู' + shortTeacher + '</b> มีสอนวิชา ' + s['รหัสวิชา'] + ' (ชั้น ' + sRoom + ') อยู่แล้ว');
                            }
                        }
                        
                        // 2. ตรวจสอบสถานที่ชนกัน (ห้องที่ใช้สอนซ้ำซ้อน)
                        if (chkLocation !== '' && sLocation === chkLocation && sLocation !== '-') {
                            conflictMsg.push('- <b>สถานที่ "' + chkLocation + '"</b> มีการใช้งานโดยชั้น ' + sRoom + ' (วิชา ' + s['รหัสวิชา'] + ') อยู่แล้ว');
                        }
                        
                        // 3. ตรวจสอบการลงวิชาซ้ำในห้องและแผนเดียวกัน
                        if (sRoom === chkRoom && sPlan === chkPlan) {
                            conflictMsg.push('- <b>ชั้น ' + chkRoom + '</b> มีการจัดวิชา ' + s['รหัสวิชา'] + ' ในคาบนี้ไปแล้ว (กรุณาลบของเดิมก่อนหากต้องการเปลี่ยน)');
                        }
                    }
                }

                // 4. ตรวจสอบโควต้าจำนวนคาบต่อสัปดาห์ (1 หน่วยกิต = 2 คาบ)
                let courseInfo = window.interactiveCourses.find(c => String(c['รหัสวิชา'] || '').trim() === chkCode);
                if (courseInfo) {
                    let credit = parseFloat(courseInfo['หน่วยกิต']) || 0;
                    let maxPeriods = credit * 2;
                    if (maxPeriods > 0 && currentCourseCount >= maxPeriods) {
                        conflictMsg.push('- <b>วิชา ' + chkCode + '</b> จัดลงตารางครบกำหนดแล้ว (' + maxPeriods + ' คาบ/สัปดาห์ สำหรับ ' + credit + ' หน่วยกิต)');
                    }
                }

                if (conflictMsg.length > 0) {
                    Swal.fire({
                        title: 'พบข้อมูลชนกัน!',
                        html: '<div class="text-left text-sm mt-2 text-red-600 space-y-2">' + conflictMsg.join('<br>') + '</div>',
                        icon: 'error',
                        confirmButtonColor: '#1A2942',
                        confirmButtonText: 'กลับไปแก้ไข'
                    });
                    return; 
                }
                // --- สิ้นสุดการตรวจสอบ ---

                const data = {
                    'ห้องเรียน': room, 
                    'แผนการเรียน': plan,
                    'วัน': day, 
                    'คาบที่': period,
                    'รหัสวิชา': document.getElementById('m_code').value, 
                    'ชื่อวิชา': document.getElementById('m_name').value,
                    'ชื่อครูผู้สอน': teacher, 
                    'สถานที่เรียน': location,
                    'ประเภท': 'ปกติ',
                    'ผู้บันทึก': document.getElementById('m_creator').value || currentUser
                };
                
                closeSchModal();

                // Optimistic Update: แก้ไขตารางชั่วคราวให้ผู้ใช้เห็นทันที
                if (rowId !== null) {
                    // หากเป็นการแก้ไขข้อมูลเดิม
                    let index = window.interactiveSchData.findIndex(item => item.originalIndex === rowId);
                    if(index !== -1) window.interactiveSchData[index] = { ...data, originalIndex: rowId, isPending: true };
                } else {
                    // หากเป็นข้อมูลใหม่ ประทับ ID ชั่วคราว
                    window.interactiveSchData.push({ ...data, originalIndex: 'temp_' + Date.now(), isPending: true });
                }
                refreshSchGrid();

                window.pendingSyncCount++;
                window.updateSyncStatus();

                // เรียก API บันทึกพื้นหลัง (ส่งพารามิเตอร์ true = ไม่โชว์ loader)
                callAPI('saveData', { sheetName: 'กำหนดตารางสอน', rowId: rowId, data: data }, true)
                .then(async (res) => {
                    window.pendingSyncCount--;
                    if(window.pendingSyncCount === 0) {
                        // หากคิวว่างแล้วให้โหลด Data จริงๆ มาอีกครั้งเพื่อให้ได้ Index (rowId) ที่ถูกต้องจาก Server
                        let newData = await getCachedData('กำหนดตารางสอน', true, true); 
                        window.interactiveSchData = newData.map((d, index) => ({...d, originalIndex: index}));
                        refreshSchGrid();
                    }
                    window.updateSyncStatus();
                }).catch(err => {
                    window.pendingSyncCount--;
                    window.updateSyncStatus();
                    Swal.fire('ข้อผิดพลาด', 'การบันทึกข้อมูลบางส่วนล้มเหลว กรุณาโหลดตารางใหม่', 'error');
                });
            };
        }

        // --- 6. ประมวลผลตารางสอน ---
        function renderProcess(container) {
            container.innerHTML = `
                <div class="bg-white p-10 rounded-xl shadow-md text-center max-w-lg mx-auto mt-10">
                    <i class="fas fa-cogs text-6xl text-navy mb-6"></i>
                    <h3 class="text-2xl font-bold text-gray-800 mb-2">ประมวลผลตารางสอน</h3>
                    <p class="text-gray-600 mb-6">ระบบจะทำการรวบรวมข้อมูลจาก ข้อมูลรายวิชา, การตั้งค่า, กำหนดตารางสอน เพื่อสร้างเป็นรูปแบบตารางพร้อมแสดงผลและดาวน์โหลด</p>
                    <button onclick="executeProcess()" class="bg-gold text-navy font-bold text-lg px-8 py-3 rounded-full hover:bg-opacity-80 shadow-lg transform transition hover:scale-105">
                        <i class="fas fa-play mr-2"></i> เริ่มประมวลผลทันที
                    </button>
                </div>
            `;

            window.executeProcess = async () => {
                let res = await callAPI('processTimetable');
                if(res) {
                    await getCachedData('ผลการประมวลตารางสอน', true); 
                    Swal.fire('สำเร็จ', 'ประมวลผลตารางสอนเสร็จสมบูรณ์ สามารถไปดูได้ที่หน้าดาวน์โหลด', 'success');
                }
            }
        }

        // --- 7. ดาวน์โหลดตารางสอน ---
        async function renderDownload(container) {
            // โหลด 3 ชีทพร้อมกันแบบขนาน (Parallel Loading) ช่วยลดเวลาได้ 3 เท่า
            let [settingsArr, teachers, rawData] = await Promise.all([
                getCachedData('การตั้งค่า'),
                getCachedData('ข้อมูลครู'),
                getCachedData('ผลการประมวลตารางสอน')
            ]);
            
            let settings = settingsArr.length > 0 ? JSON.parse(settingsArr[0]['JSON_DATA'] || '{}') : {periods: 8};
            let schoolName = settings.school_name || 'โรงเรียนนราสิกขาลัย';
            let rooms = (settings.rooms || '').split(',').map(r => r.trim()).filter(r => r);
            let processedData = rawData.length > 0 ? JSON.parse(rawData[0]['DATA_DUMP'] || '{"student":{}, "teacher":{}}') : {student:{}, teacher:{}};
            let plans = learningPlans;

            container.innerHTML = `
                <div class="bg-white p-4 rounded-xl shadow-md mb-4 flex flex-wrap gap-3 items-end">
                    <div>
                        <label class="block text-xs text-gray-600 mb-1">ประเภทตาราง</label>
                        <select id="dl_type" class="border p-2 rounded text-sm w-full" onchange="toggleDlSelectors()">
                            <option value="student">ตารางเรียน (นักเรียน)</option>
                            <option value="teacher">ตารางสอน (ครู)</option>
                        </select>
                    </div>
                    
                    <div id="wrapper_dl_room">
                        <label class="block text-xs text-gray-600 mb-1">ชั้น/ห้อง</label>
                        <select id="dl_room" class="border p-2 rounded text-sm w-full">
                            <option value="">-- เลือกห้องเรียน --</option>
                            <option value="all">ทุกชั้น/ห้อง</option>
                            ${rooms.map(r => `<option value="${r}">${r}</option>`).join('')}
                        </select>
                    </div>

                    <div id="wrapper_dl_plan">
                        <label class="block text-xs text-gray-600 mb-1">แผนการเรียน</label>
                        <select id="dl_plan" class="border p-2 rounded text-sm w-full">
                            <option value="all">ทุกแผนการเรียน</option>
                            ${plans.map(p => `<option value="${p}">${p}</option>`).join('')}
                        </select>
                    </div>

                    <div id="wrapper_dl_group" class="hidden">
                        <label class="block text-xs text-gray-600 mb-1">กลุ่มสาระการเรียนรู้</label>
                        <select id="dl_group" class="border p-2 rounded text-sm w-full" onchange="updateTeacherOptions()">
                            <option value="all">ทุกกลุ่มสาระ</option>
                            ${subjectGroups.map(g => `<option value="${g}">${g}</option>`).join('')}
                        </select>
                    </div>

                    <div id="wrapper_dl_teacher" class="hidden">
                        <label class="block text-xs text-gray-600 mb-1">ครูผู้สอน</label>
                        <select id="dl_teacher" class="border p-2 rounded text-sm w-full">
                            <option value="all">ทุกคนในกลุ่มสาระ</option>
                            ${teachers.map(t => `<option value="${t['ชื่อ-สกุล']}">${t['ชื่อ-สกุล']}</option>`).join('')}
                        </select>
                    </div>

                    <button onclick="previewTimetable()" class="bg-navy text-white px-4 py-2 rounded hover:bg-opacity-90 h-[38px] flex items-center text-sm"><i class="fas fa-search mr-2"></i> แสดงตาราง</button>
                    <button onclick="downloadAsJPG()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 ml-auto h-[38px] flex items-center text-sm"><i class="fas fa-download mr-2"></i> ดาวน์โหลด JPG</button>
                </div>

                <!-- พื้นที่วาดตารางสำหรับ Download -->
                <div class="overflow-x-auto bg-gray-200 p-4 rounded w-full" style="min-height: 500px;">
                    <!-- ใช้ min-w-[1050px] เพื่อป้องกันปัญหาตารางโดนตัดขอบด้านซ้ายเมื่อดูผ่านหน้าจอขนาดเล็ก -->
                    <div id="timetableCanvas" class="flex flex-col gap-8 items-center min-w-[1050px] w-full py-4 mx-auto">
                        <div class="bg-white p-8 w-[1000px] shadow-lg relative text-center text-gray-400 mt-10 rounded-xl">
                            <i class="fas fa-table text-4xl mb-2"></i><br>กรุณาเลือกตารางและกดแสดงตาราง
                        </div>
                    </div>
                </div>
            `;

            window.toggleDlSelectors = () => {
                const type = document.getElementById('dl_type').value;
                if(type === 'student') {
                    document.getElementById('wrapper_dl_room').classList.remove('hidden');
                    document.getElementById('wrapper_dl_plan').classList.remove('hidden');
                    document.getElementById('wrapper_dl_group').classList.add('hidden');
                    document.getElementById('wrapper_dl_teacher').classList.add('hidden');
                } else {
                    document.getElementById('wrapper_dl_room').classList.add('hidden');
                    document.getElementById('wrapper_dl_plan').classList.add('hidden');
                    document.getElementById('wrapper_dl_group').classList.remove('hidden');
                    document.getElementById('wrapper_dl_teacher').classList.remove('hidden');
                    updateTeacherOptions();
                }
            }

            window.updateTeacherOptions = () => {
                const group = document.getElementById('dl_group').value;
                const teacherSelect = document.getElementById('dl_teacher');
                let filteredTeachers = teachers;
                
                if (group !== 'all') {
                    filteredTeachers = teachers.filter(t => t['กลุ่มสาระการเรียนรู้'] === group);
                }
                
                teacherSelect.innerHTML = `
                    <option value="all">ทุกคนในกลุ่มสาระ</option>
                    ${filteredTeachers.map(t => `<option value="${t['ชื่อ-สกุล']}">${t['ชื่อ-สกุล']}</option>`).join('')}
                `;
            }

            window.previewTimetable = () => {
                const type = document.getElementById('dl_type').value;
                let tablesToRender = []; // เก็บข้อมูลแต่ละตารางแยกกัน

                if (type === 'student') {
                    const selectedRoom = document.getElementById('dl_room').value;
                    const selectedPlan = document.getElementById('dl_plan').value;
                    
                    if (!selectedRoom) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกชั้น/ห้อง', 'warning');

                    // 1. ดึงข้อมูลห้องที่จะนำมาแสดง
                    let roomsToProcess = selectedRoom === 'all' ? Object.keys(processedData.student) : (processedData.student[selectedRoom] ? [selectedRoom] : []);

                    roomsToProcess.forEach(roomKey => {
                        let roomData = processedData.student[roomKey] || [];
                        
                        // 2. จัดกลุ่มข้อมูลในแต่ละห้องตาม 'แผนการเรียน'
                        let planGroups = {};
                        roomData.forEach(slot => {
                            let plan = slot['แผนการเรียน'] || '-';
                            if (!planGroups[plan]) planGroups[plan] = [];
                            planGroups[plan].push(slot);
                        });

                        // 3. กรองตามแผนการเรียนที่เลือกใน Select (ถ้าไม่ได้เลือกทุกแผน)
                        let plansToProcess = Object.keys(planGroups);
                        if (selectedPlan !== 'all') {
                            plansToProcess = plansToProcess.filter(p => p === selectedPlan);
                        }

                        // 4. นำเข้าตารางที่จะวาดแยกกัน
                        plansToProcess.forEach(planKey => {
                            let pText = planKey === '-' ? 'ทั่วไป' : planKey;
                            tablesToRender.push({
                                type: 'student',
                                subtitle: `ชั้น/ห้อง: ${roomKey} &nbsp;|&nbsp; แผนการเรียน: ${pText}`,
                                scheduleMap: planGroups[planKey],
                                sortKey: roomKey + planKey
                            });
                        });
                    });

                } else {
                    const selectedGroup = document.getElementById('dl_group').value;
                    const selectedTeacher = document.getElementById('dl_teacher').value;

                    // สร้าง Lookup สำหรับหากลุ่มสาระของครู
                    const teacherGroupMap = {};
                    teachers.forEach(t => teacherGroupMap[t['ชื่อ-สกุล']] = t['กลุ่มสาระการเรียนรู้']);

                    let teachersToProcess = [];

                    if (selectedTeacher !== 'all') {
                        // เลือกครูคนเดียว
                        if (processedData.teacher[selectedTeacher]) {
                            teachersToProcess = [selectedTeacher];
                        }
                    } else {
                        // เลือก "ทุกคนในกลุ่มสาระ"
                        teachersToProcess = Object.keys(processedData.teacher).filter(teacherKey => {
                            if (selectedGroup === 'all') return true;
                            return teacherGroupMap[teacherKey] === selectedGroup;
                        });
                    }

                    if (teachersToProcess.length === 0) {
                        document.getElementById('timetableCanvas').innerHTML = `
                            <div class="bg-white p-8 w-[1000px] shadow-lg relative text-center text-gray-400 mt-10 rounded-xl">
                                <i class="fas fa-search text-4xl mb-2"></i><br>ไม่พบข้อมูลตารางสอนของครูในกลุ่มสาระที่เลือก
                            </div>
                        `;
                        return Swal.fire('แจ้งเตือน', 'ไม่พบข้อมูลตารางสอนของครูในกลุ่มสาระที่เลือก', 'info');
                    }

                    teachersToProcess.forEach(teacherKey => {
                        let tGroup = teacherGroupMap[teacherKey] || 'ไม่ระบุกลุ่มสาระ';
                        let scheduleMap = processedData.teacher[teacherKey] || [];
                        
                        // คำนวณจำนวนคาบต่อสัปดาห์ (นับเฉพาะคาบที่ไม่ซ้ำกัน เผื่อกรณีสอนควบห้องในคาบเดียวกัน)
                        let uniquePeriods = new Set(scheduleMap.map(s => s['วัน'] + '_' + s['คาบที่'])).size;

                        tablesToRender.push({
                            type: 'teacher',
                            subtitle: `ครูผู้สอน: ${teacherKey} &nbsp;|&nbsp; กลุ่มสาระฯ: ${tGroup} &nbsp;|&nbsp; รวม: ${uniquePeriods} คาบ/สัปดาห์`,
                            scheduleMap: scheduleMap,
                            sortKey: tGroup + '_' + teacherKey // เรียงตามกลุ่มสาระแล้วตามด้วยชื่อครู
                        });
                    });
                }
                
                if (tablesToRender.length === 0) {
                    document.getElementById('timetableCanvas').innerHTML = `
                        <div class="bg-white p-8 w-[1000px] shadow-lg relative text-center text-gray-400 mt-10 rounded-xl">
                            <i class="fas fa-search text-4xl mb-2"></i><br>ไม่พบข้อมูลตารางตามเงื่อนไขที่เลือก
                        </div>
                    `;
                    return Swal.fire('แจ้งเตือน', 'ไม่พบข้อมูลตารางตามเงื่อนไขที่เลือก', 'info');
                }

                // เรียงลำดับตารางให้เป็นระเบียบตามชื่อห้องและแผน
                tablesToRender.sort((a,b) => a.sortKey.localeCompare(b.sortKey));

                // คำนวณเวลาและคาบพักสำหรับสร้างหัวตาราง (เหมือนกันทุกตาราง)
                let periods = settings.periods || 8;
                let breakPeriod = parseInt(settings.break_period || 4);
                let breakDuration = parseInt(settings.break_duration || 60);
                let periodDuration = parseInt(settings.duration || 50);
                let startParts = (settings.start || '08:30').split(':');
                let initialTimeMin = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);

                let thsTemplate = '';
                let currentTimeMinHeader = initialTimeMin;
                for(let i=1; i<=periods; i++) {
                    let isBreak = (i === breakPeriod);
                    let currentDur = isBreak ? breakDuration : periodDuration;
                    let startStr = Math.floor(currentTimeMinHeader/60).toString().padStart(2,'0') + ':' + (currentTimeMinHeader%60).toString().padStart(2,'0');
                    currentTimeMinHeader += currentDur;
                    let endStr = Math.floor(currentTimeMinHeader/60).toString().padStart(2,'0') + ':' + (currentTimeMinHeader%60).toString().padStart(2,'0');
                    
                    if (isBreak) {
                         thsTemplate += `<th class="border border-navy p-2 bg-gray-300 text-gray-700 w-16 align-middle">
                                    พัก<br><span class="text-[9px] font-normal">${startStr}-${endStr}</span>
                                </th>`;
                    } else {
                        thsTemplate += `<th class="border border-navy p-2 bg-lightgold text-navy w-24 align-middle">
                                    คาบ ${i}<br><span class="text-[10px] font-normal text-gray-700">${startStr}-${endStr}</span>
                                </th>`;
                    }
                }

                const days = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์'];
                let allHtml = '';
                
                // วนลูปวาดตารางทีละหน้าตามข้อมูลที่จัดกลุ่มมาได้
                tablesToRender.forEach((tableData) => {
                    let trs = '';
                    days.forEach(day => {
                        let tds = '';
                        for(let i=1; i<=periods; i++) {
                            if (i === breakPeriod) {
                                tds += `<td class="border border-navy p-2 text-center align-middle bg-gray-100 text-gray-500 text-xs w-16">
                                            <i class="fas fa-utensils mb-1"></i><br>พัก
                                        </td>`;
                            } else {
                                // Find matching slots
                                let slots = tableData.scheduleMap.filter(s => s['วัน'] === day && parseInt(s['คาบที่']) === i);
                                
                                if(slots.length > 0) {
                                    let cellContent = slots.map(slot => {
                                        let innerHtml = '';
                                        if(settings.show_code) innerHtml += `<div class="font-bold text-xs">${slot['รหัสวิชา']}</div>`;
                                        if(settings.show_name) innerHtml += `<div class="text-[11px] text-navy leading-tight">${slot['ชื่อวิชา']}</div>`;
                                        
                                        if(settings.show_teacher && type === 'student') {
                                            let teacherName = String(slot['ชื่อครูผู้สอน'] || '');
                                            let cleanName = teacherName.replace(/^(นาย|นางสาว|นาง|น\.ส\.|ว่าที่\s?ร\.ต\.|ว่าที่ร้อยตรี|ครู)\s*/g, '').trim();
                                            let displayTeacher = cleanName ? 'ครู' + cleanName.split(' ')[0] : '';
                                            innerHtml += `<div class="text-[10px] text-blue-700 mt-1">${displayTeacher}</div>`;
                                        }
                                        
                                        if(settings.show_room && type === 'teacher') innerHtml += `<div class="text-[11px] text-gray-600 font-medium mt-1">ห้อง: <span class="text-red-600">${slot['ห้องเรียน']}</span></div>`;
                                        
                                        if(slot['สถานที่เรียน']) innerHtml += `<div class="text-[9px] text-gray-600 mt-0.5">${slot['สถานที่เรียน']}</div>`;
                                        
                                        // สำหรับตารางครู ถ้ามีซ้อนทับกันหลายห้องจะแสดงห้องกำกับ
                                        if (type === 'teacher' && slots.length > 1) {
                                             innerHtml += `<div class="text-[9px] text-purple-600 font-semibold mt-0.5">[${slot['ห้องเรียน']}]</div>`;
                                        }

                                        return `<div class="border-b border-blue-200 pb-1 mb-1 last:border-0 last:pb-0 last:mb-0">${innerHtml}</div>`;
                                    }).join('');
                                    
                                    tds += `<td class="border border-navy p-1 text-center align-top bg-blue-50">${cellContent}</td>`;
                                } else {
                                    tds += `<td class="border border-navy p-2 text-center text-gray-300 align-middle">-</td>`;
                                }
                            }
                        }
                        trs += `<tr><td class="border border-navy p-2 font-bold text-center bg-navy text-white w-20 align-middle">${day}</td>${tds}</tr>`;
                    });

                    // สร้างชื่อไฟล์ตามเงื่อนไข (เพื่อใช้ตอนดาวน์โหลด)
                    let cleanSubtitle = tableData.subtitle.replace(/&nbsp;\|&nbsp;/g, '_').replace(/<[^>]*>?/gm, '').replace(/[:/\s]+/g, '-');
                    let filename = `ตาราง${tableData.type === 'student' ? 'เรียน' : 'สอน'}_${cleanSubtitle}.jpg`;

                    // ใส่ Container ตารางแต่ละอันต่อกัน
                    allHtml += `
                        <div class="timetable-page bg-white p-8 w-[1000px] shadow-lg relative border-t-4 border-navy rounded-sm" data-filename="${filename}">
                            <div class="flex items-center justify-center mb-6 relative">
                                <img src="${settings.logo || 'https://www.ns.ac.th/wp-content/uploads/2024/12/cropped-logo-sq.png'}" class="absolute left-0 w-24 h-24 object-contain app-logo">
                                <div class="text-center">
                                    <h2 class="text-2xl font-bold text-navy">${schoolName}</h2>
                                    <h3 class="text-xl font-bold text-gold">ตาราง${tableData.type === 'student' ? 'เรียน' : 'สอน'} ภาคเรียนที่ ${settings.term}/${settings.year}</h3>
                                    <p class="text-sm font-semibold mt-1 text-gray-700">${tableData.subtitle}</p>
                                </div>
                            </div>
                            <table class="w-full border-collapse border-2 border-navy text-sm">
                                <thead>
                                    <tr><th class="border border-navy p-2 bg-navy text-white">วัน/คาบ</th>${thsTemplate}</tr>
                                </thead>
                                <tbody>${trs}</tbody>
                            </table>
                            <div class="mt-4 text-right text-[10px] text-gray-500">จัดทำโดย ระบบจัดตารางสอนออนไลน์ - ${schoolName} | พัฒนาโดย ครูมูฮัมหมัดตัซกีน บาราเฮง ครูโรงเรียนนราสิกขาลัย</div>
                        </div>
                    `;
                });

                document.getElementById('timetableCanvas').innerHTML = allHtml;
            }

            window.downloadAsJPG = async () => {
                const pages = document.querySelectorAll('.timetable-page');
                if(pages.length === 0) return Swal.fire('แจ้งเตือน', 'ไม่มีข้อมูลตารางให้ดาวน์โหลด', 'warning');
                
                // แสดงป๊อปอัพโหลดระหว่างกำลังแคปภาพ
                Swal.fire({
                    title: 'กำลังเตรียมดาวน์โหลด...',
                    text: 'กรุณารอสักครู่ ระบบกำลังสร้างภาพและดาวน์โหลดตารางทั้งหมด ' + pages.length + ' ภาพ',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                // วนลูปดาวน์โหลดทีละภาพแบบหน่วงเวลา เพื่อไม่ให้เบราว์เซอร์บล็อค
                for(let i = 0; i < pages.length; i++) {
                    const page = pages[i];
                    const filename = page.getAttribute('data-filename') || `Timetable_${Date.now()}_${i+1}.jpg`;

                    try {
                        const canvas = await html2canvas(page, { scale: 2, backgroundColor: '#ffffff' });
                        const link = document.createElement('a');
                        link.download = filename;
                        link.href = canvas.toDataURL('image/jpeg', 0.9);
                        link.click();
                        
                        // หน่วงเวลา 0.5 วินาที ต่อการดาวน์โหลด 1 รูป
                        await new Promise(resolve => setTimeout(resolve, 500));
                    } catch(err) {
                        console.error("Error generating image: ", err);
                    }
                }
                
                Swal.fire('สำเร็จ', 'ดาวน์โหลดตารางเสร็จสิ้นทั้งหมด ' + pages.length + ' ไฟล์', 'success');
            }
        }

        // --- 8. ประมวลคำสั่งสอน ---

            // ฟังก์ชันแปลงตัวเลขเป็นเลขไทย

                        <style>

                                margin: 20px auto; 
                                max-width: 21cm; 
                                background-color: white;
                                box-shadow: 0 0 10px rgba(0,0,0,0.1);
                                box-sizing: border-box;
                                text-align: justify;
                            }
                            
                            /* ตราครุฑ สูง 3 ซม. */
                            .garuda-container { text-align: center; margin-bottom: 20px; }
                            .garuda-container img { height: 3cm; width: auto; }
                            
                            .order-header { text-align: center; font-weight: bold; margin-bottom: 10px; font-size: 16pt; line-height: 1.5; }
                            .order-title { text-align: center; font-weight: bold; margin-bottom: 0; font-size: 16pt; line-height: 1.5; }
                            .content { text-align: justify; margin-bottom: 0; }
                            
                            /* ย่อหน้า 2.5 ซม. */
                            .content p { text-indent: 2.5cm; margin: 0; line-height: 1.5; }
                            
                            table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 16pt; page-break-inside: auto; }
                            tr { page-break-inside: avoid; page-break-after: auto; }
                            th, td { border: 1px solid #000; padding: 4px 8px; text-align: center; vertical-align: middle; line-height: 1.5; }
                            th { font-weight: bold; background-color: #f8f9fa; }
                            td.text-left { text-align: left; }
                            
                            /* สั่ง ณ วันที่ กดแท็บ 1 ครั้ง จากย่อหน้า ทั้งนี้ตั้งแต่ (ย่อหน้า 2.5 + แท็บ 2.5 = 5.0 ซม) */
                            .order-date-section { margin-left: 5cm; margin-top: 0; margin-bottom: 0; line-height: 1.5; }
                            .signature-section { margin-left: 50%; text-align: center; line-height: 1.5; }
                            
                            .btn-print {
                                display: block; width: 200px; margin: -10px auto 30px auto; padding: 12px;
                                background-color: #2563eb; color: white; text-align: center; 
                                text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer;
                                border: none; font-family: 'Sarabun', sans-serif; font-size: 14pt;
                            }
                            .btn-print:hover { background-color: #1d4ed8; }
                            
                            .group-header { margin-top: 20px; margin-bottom: 10px; font-size: 16pt; font-weight: bold; line-height: 1.5; }
                            .teacher-header { margin-top: 15px; margin-bottom: 5px; font-size: 16pt; font-weight: bold; margin-left: 2.5cm; line-height: 1.5; }
                            .avoid-break { page-break-inside: avoid; }
                            
                            @page { 
                                size: A4 portrait; 
                                /* ระยะขอบมาตรฐานงานสารบรรณ บน 2.5ซม, ขวา 2ซม, ล่าง 2ซม, ซ้าย 3ซม */
                                margin: 2.5cm 2cm 2cm 3cm; 
                            }
                            
                            @media print {
                                body { padding: 0; margin: 0; max-width: 100%; box-shadow: none; background-color: transparent; }
                                .btn-print { display: none !important; }
                                .page-break { page-break-before: always; }
                            }
                        </style>
                    </head>
                    <body>
                        <button onclick="window.print()" class="btn-print">🖨️ สั่งพิมพ์ / บันทึก PDF</button>
                        
                        ${garudaBase64 ? `<div class="garuda-container"><img src="${garudaBase64}" alt="ตราครุฑ"></div>` : `<div class="garuda-container" style="height: 3cm;"></div>`}
                        
                        <div class="order-header">
                            คำสั่ง${schoolName}<br>
                            ที่ ${toThaiNum(orderNumber)}
                        </div>
                        
                        <div class="order-title">
                            เรื่อง แต่งตั้งครูผู้สอนและมอบหมายภาระงานสอน ภาคเรียนที่ ${toThaiNum(termInput)} ปีการศึกษา ${toThaiNum(yearInput)}
                        </div>
                        
                        <div style="margin: 0 auto; text-align: center; line-height: 1.5; overflow: hidden; white-space: nowrap; width: 8cm;">
                            --------------------------------------------------------------------------------------------------------------------------------
                        </div>
                        
                        <div style="font-size: 12pt; height: 12pt; line-height: 12pt;">&nbsp;</div>
                        
                        <div class="content">
                            <p>เพื่อให้การจัดการเรียนการสอนของ${schoolName} ภาคเรียนที่ ${toThaiNum(termInput)} ปีการศึกษา ${toThaiNum(yearInput)} ดำเนินไปด้วยความเรียบร้อย มีประสิทธิภาพ และเกิดประสิทธิผลสูงสุดต่อนักเรียน อาศัยอำนาจตามความในมาตรา ๒๗ แห่งพระราชบัญญัติระเบียบข้าราชการครูและบุคลากรทางการศึกษา พ.ศ. ๒๕๔๗</p>
                            
                            <div style="font-size: 6pt; height: 6pt; line-height: 6pt;">&nbsp;</div>
                            
                            <p>จึงแต่งตั้งให้ข้าราชการครูและบุคลากรทางการศึกษา ปฏิบัติหน้าที่สอนและมีภาระงานสอนตามตารางแนบท้ายคำสั่งนี้ และขอให้บุคลากรที่ได้รับการแต่งตั้งปฏิบัติหน้าที่ด้วยความรับผิดชอบ และตั้งใจ เพื่อให้เกิดผลดีต่อทางราชการ</p>
                            
                            <div style="font-size: 6pt; height: 6pt; line-height: 6pt;">&nbsp;</div>
                            
                            <p>ทั้งนี้ ตั้งแต่ ${toThaiNum(effectiveDate)} เป็นต้นไป</p>
                            
                            <div style="font-size: 12pt; height: 12pt; line-height: 12pt;">&nbsp;</div>
                        </div>
                        
                        <div class="order-date-section">
                            สั่ง ณ ${toThaiNum(orderDate)}
                        </div>
                        
                        <div style="font-size: 16pt; line-height: 1.5;">
                            <br><br><br><br>
                        </div>
                        
                        <div class="signature-section">
                            <div>(${directorName})</div>
                            <div>ผู้อำนวยการ${schoolName}</div>
                        </div>
                        
                        <div style="clear: both;" class="page-break"></div>
                        
                        <!-- หน้า 2 เป็นต้นไป: บัญชีแนบท้ายแยกตามกลุ่มสาระและรายบุคคล -->
                        <div style="text-align: center; font-size: 16pt; margin-bottom: 10px;">
                            - ๒ -
                        </div>
                        
                        <div style="text-align: center; font-weight: bold; margin-bottom: 20px; font-size: 16pt; line-height: 1.5;">
                            บัญชีแนบท้ายคำสั่ง${schoolName} ที่ ${toThaiNum(orderNumber)}<br>
                            สรุปภาระงานสอน ภาคเรียนที่ ${toThaiNum(termInput)} ปีการศึกษา ${toThaiNum(yearInput)}
                        </div>
                `;

                // จัดกลุ่มครูตามกลุ่มสาระการเรียนรู้
                let departments = {};
                subjectGroups.forEach(g => departments[g] = []);

                teachers.forEach(t => {
                    let name = t['ชื่อ-สกุล'];
                    let group = t['กลุ่มสาระการเรียนรู้'];
                    if (!departments[group]) departments[group] = [];
                    
                    let schedule = processedData.teacher[name] || [];
                    
                    let courseMap = {};
                    
                    schedule.forEach(s => {
                        let cCode = s['รหัสวิชา'];
                        let room = s['ห้องเรียน'];
                        
                        if (!courseMap[cCode]) {
                            courseMap[cCode] = {
                                name: s['ชื่อวิชา'],
                                rooms: new Set(),
                                uniquePeriods: new Set()
                            };
                        }
                        
                        if (room && room !== '-') {
                            courseMap[cCode].rooms.add(room);
                            // เก็บ คาบสอนแยกตามห้อง เพื่อให้ได้ชั่วโมงรวมที่ถูกต้องตามจำนวนห้อง
                            courseMap[cCode].uniquePeriods.add(s['วัน'] + '_' + s['คาบที่'] + '_' + room);
                        } else if (cCode === 'กิจกรรม') {
                             // สำหรับกิจกรรมครู
                            courseMap[cCode].uniquePeriods.add(s['วัน'] + '_' + s['คาบที่'] + '_activity');
                        } else {
                            courseMap[cCode].uniquePeriods.add(s['วัน'] + '_' + s['คาบที่'] + '_noroom');
                        }
                    });
                    
                    // แปลงข้อมูลเป็น Array สำหรับวิชาทั้งหมดของครูท่านนี้
                    let courses = Object.keys(courseMap).map(code => {
                        let c = courseMap[code];
                        let roomsArr = Array.from(c.rooms).sort();
                        // ดึงระดับชั้นจากคำนำหน้าของห้องเรียน (เช่น "ม.4/1" -> "ม.4")
                        let grades = new Set(roomsArr.map(r => r.split('/')[0].trim()));
                        return {
                            code: code,
                            name: c.name,
                            grade: Array.from(grades).join(', ') || '-',
                            rooms: roomsArr.join(', ') || '-',
                            hours: c.uniquePeriods.size // นับชั่วโมงตามจำนวนห้องที่สอนจริง
                        };
                    });
                    
                    let totalHours = courses.reduce((sum, c) => sum + c.hours, 0);
                    
                    // แสดงเฉพาะครูที่มีชั่วโมงสอน หรือเป็นครูผู้สอนปกติ
                    if (totalHours > 0 || t['บทบาท'] === 'user') {
                        departments[group].push({
                            name: name,
                            courses: courses,
                            totalHours: totalHours
                        });
                    }
                });

                let groupIndex = 1;
                // วนลูปสร้างตารางตามกลุ่มสาระ
                subjectGroups.forEach(group => {
                    let groupTeachers = departments[group];
                    // เรียงตามชื่อ
                    groupTeachers.sort((a, b) => a.name.localeCompare(b.name));

                    if (groupTeachers && groupTeachers.length > 0) {
                        orderHtml += `<div class="group-header">${toThaiNum(groupIndex)}. กลุ่มสาระการเรียนรู้${group}</div>`;
                        
                        groupTeachers.forEach((t, tIndex) => {
                            let teacherIndexStr = toThaiNum(groupIndex + '.' + (tIndex + 1));
                            orderHtml += `
                                <div class="avoid-break">
                                    <div class="teacher-header">${teacherIndexStr} ${t.name}</div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th width="15%">รหัสวิชา</th>
                                                <th width="35%">รายวิชาที่รับผิดชอบ</th>
                                                <th width="15%">ระดับชั้น</th>
                                                <th width="20%">ห้องที่รับผิดชอบ</th>
                                                <th width="15%">จำนวนชั่วโมง</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                            `;
                            
                            if (t.courses.length > 0) {
                                t.courses.forEach((c) => {
                                    orderHtml += `
                                        <tr>
                                            <td>${toThaiNum(c.code)}</td>
                                            <td class="text-left">${toThaiNum(c.name)}</td>
                                            <td>${toThaiNum(c.grade)}</td>
                                            <td>${toThaiNum(c.rooms)}</td>
                                            <td>${toThaiNum(c.hours)}</td>
                                        </tr>
                                    `;
                                });
                            } else {
                                orderHtml += `<tr><td colspan="5" style="color: #666; font-style: italic;">ไม่มีภาระงานสอนในระบบ</td></tr>`;
                            }
                            
                            orderHtml += `
                                            <tr>
                                                <td colspan="4" style="font-weight: bold; text-align: right; padding-right: 20px; background-color: #f8f9fa;">รวมจำนวนชั่วโมงสอน/สัปดาห์</td>
                                                <td style="font-weight: bold; background-color: #f8f9fa;">${toThaiNum(t.totalHours)}</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            `;
                        });
                        groupIndex++;
                    }
                });

                orderHtml += `
                    </body>
                    </html>
                `;

                Swal.close();
                
                // เปิดหน้าต่างใหม่เพื่อแสดงเอกสารคำสั่ง
                let printWin = window.open('', '_blank');
                printWin.document.write(orderHtml);
                printWin.document.close();
            }
        }

    </script>
</body>
</html>
